<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Praise FM</title>
    <style>
        /* --- AQUI COMEÇA O DESIGN (CSS) --- */
        :root {
            --primary-color: #fff;
            --secondary-color: rgba(255, 255, 255, 0.6);
            --bg-gradient-1: #4a0e0e;
            --bg-gradient-2: #8b0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--primary-color);
        }

        /* Fundo com Blur */
        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, var(--bg-gradient-2), #000);
            filter: blur(60px);
            opacity: 0.8;
            transition: background 1s ease;
        }

        .player-container {
            width: 100%;
            max-width: 380px; 
            /* O segredo para o tamanho celular é esse max-width */
            height: 100%;
            max-height: 800px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: center;
            padding-bottom: 20px;
        }
        .grip {
            width: 40px;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .artwork-container {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            transform: scale(1);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .artwork-container.paused {
            transform: scale(0.85);
            opacity: 0.8;
        }

        .artwork-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Isso impede a imagem de estourar */
        }

        .track-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .text-area {
            flex: 1;
            padding-right: 10px;
        }

        .song-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            font-size: 18px;
            color: var(--secondary-color);
            font-weight: 400;
        }

        .more-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary-color);
            padding: 5px;
        }

        .progress-area {
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            position: relative;
        }

        .progress-bar-fill {
            width: 100%;
            height: 100%;
            background: var(--secondary-color);
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--secondary-color);
            margin-top: 8px;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .play-btn {
            width: 70px;
            height: 70px;
        }

        .skip-btn {
            width: 40px;
        }

        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .volume-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            position: relative;
        }

        .volume-fill {
            position: absolute;
            height: 100%;
            background: #fff;
            border-radius: 3px;
            width: 80%;
        }

        .volume-slider {
            position: absolute;
            width: 100%;
            height: 100%;
            top:0;
            opacity:0;
            cursor:pointer;
        }

        .bottom-icons {
            display: flex;
            justify-content: space-around;
            color: var(--secondary-color);
        }
        
        svg { fill: currentColor; }
    </style>
</head>
<body>

    <div class="background-blur" id="bgBlur"></div>

    <div class="player-container">
        <div class="top-bar">
            <div class="grip"></div>
        </div>

        <div class="artwork-container paused" id="artContainer">
            <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=1000&auto=format&fit=crop" alt="Album Art" class="artwork-img" id="albumArt">
        </div>

        <div class="track-info">
            <div class="text-area">
                <div class="song-title" id="trackName">Praise FM</div>
                <div class="artist-name" id="artistName">Rádio Ao Vivo</div>
            </div>
            <button class="more-btn">•••</button>
        </div>

        <div class="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">Ao Vivo</span>
                <span>Transmitindo</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn skip-btn">
                <svg width="30" height="30" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button class="control-btn play-btn" id="playPauseBtn">
                <svg id="iconPlay" width="50" height="50" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" style="display:none;" width="50" height="50" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <button class="control-btn skip-btn">
                <svg width="30" height="30" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>

        <div class="volume-area">
            <svg width="16" height="16" viewBox="0 0 24 24" style="opacity: 0.6;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <div class="volume-track">
                <div class="volume-fill" id="volFill"></div>
                <input type="range" min="0" max="1" step="0.01" value="0.8" id="volumeSlider" class="volume-slider">
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" style="opacity: 0.6;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>

        <div class="bottom-icons">
            <div class="bottom-icon">💬</div>
            <div class="bottom-icon">📡</div>
            <div class="bottom-icon">☰</div>
        </div>
    </div>

    <script>
        // --- AQUI COMEÇA A LÓGICA (JS) ---
        const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
        const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";
        
        const audio = new Audio(STREAM_URL);
        const playPauseBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const artContainer = document.getElementById('artContainer');
        const volumeSlider = document.getElementById('volumeSlider');
        const volFill = document.getElementById('volFill');
        const albumArtEl = document.getElementById('albumArt');
        const trackNameEl = document.getElementById('trackName');
        const artistNameEl = document.getElementById('artistName');
        const bgBlur = document.getElementById('bgBlur');

        let isPlaying = false;

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                artContainer.classList.add('paused');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            } else {
                audio.play();
                isPlaying = true;
                artContainer.classList.remove('paused');
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audio.volume = val;
            volFill.style.width = (val * 100) + '%';
        });

        // API LAST.FM
        async function updateTrackInfo(artist, track) {
            if(!artist || !track) return;
            trackNameEl.innerText = track;
            artistNameEl.innerText = artist;

            const url = `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.track?.album?.image) {
                    const imgUrl = data.track.album.image.pop()['#text'];
                    if (imgUrl) {
                        albumArtEl.src = imgUrl;
                        bgBlur.style.background = `radial-gradient(circle at 50% 30%, #5a1e1e, #000)`;
                    }
                }
            } catch (e) { console.error(e); }
        }
        
        // Teste (se quiser ver funcionar, descomente a linha abaixo)
        // setTimeout(() => updateTrackInfo("PinkPantheress", "Boy's a liar"), 2000);
    </script>
</body>
</html>
