<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Praise FM U.S. — Live Player</title>

  <link href="style.css" rel="stylesheet">

  <!-- Ícones (volume, coração etc) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="container">
      
      <!-- Header com Favorito -->
      <div class="header">
        <button id="favorite-btn" class="favorite-btn">
          <i class="fa-regular fa-star"></i>
        </button>
      </div>

      <!-- Informação da Rádio -->
      <div class="content">
        <h1 class="station-title">Praise FM U.S.</h1>
        <p class="station-desc">Your home for worship & praise</p>

        <!-- Capa da Música -->
        <div id="cover-wrapper" class="show-image">
          <img id="cover" src="logo.webp" alt="Cover Art">
        </div>

        <!-- Informações da Música -->
        <div class="show-info">
          <div class="live-indicator">LIVE NOW</div>

          <div id="current-title" class="show-title">Loading...</div>
          <div id="current-artist" class="show-date"></div>
        </div>

        <!-- Botão Play -->
        <button id="play-btn" class="play-button">▶ Play</button>

        <!-- Controle de Volume -->
        <div class="volume-control">
          <i class="fa-solid fa-volume-high"></i>
          <input id="volume-slider" class="volume-slider" type="range" min="0" max="1" step="0.01">
        </div>

        <!-- Histórico -->
        <div class="history-section">
          <div class="history-title">Recently Played</div>
          <ul id="history-list" class="history-list"></ul>
        </div>

        <!-- Status -->
        <div id="status" class="status">Connecting...</div>

      </div>
  </div>

  <!-- Player de Áudio (necessário!) -->
  <audio id="audio-player" src="https://stream.zeno.fm/hvwifp8ezc6tv"></audio>

  <script src="script.js"></script>

</body>
</html>
