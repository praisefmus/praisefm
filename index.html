<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praise FM</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- CONTAINER PRINCIPAL -->
    <div class="app">

        <!-- CAPA NO CENTRO DA TELA -->
        <div class="cover-container">
            <img id="cover" src="image/logopraisefm.webp" alt="Cover Image">
        </div>

        <!-- TÍTULO DA MÚSICA -->
        <h2 id="track-title">Loading...</h2>

        <!-- PLAYER ESTILO SPOTIFY -->
        <div class="player-bar">
            <button id="playBtn" class="play-button">►</button>

            <input 
                type="range" 
                id="volumeSlider" 
                min="0" 
                max="1" 
                step="0.01" 
                value="0.7"
            />
        </div>

        <!-- RECENTLY PLAYED (APENAS UMA VEZ) -->
        <div class="recent-container">
            <h3>Recently Played</h3>
            <ul id="recentList"></ul>
        </div>
    </div>

    <!-- STREAM -->
    <audio id="audio" src="https://stream.zeno.fm/hvwifp8ezc6tv"></audio>

    <script src="script.js"></script>
</body>
</html>
