<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Praise FM - Live</title>
    <meta name="theme-color" content="#ff4d00">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/image/apple-touch-icon.png">
    <style>
        :root { --orange:#ff4d00; --dark:#111; --grey:#555; --light-grey:#888; --bg:#fff; --border-color:#ddd; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
        body { background:var(--bg); color:#000; min-height:100vh; padding-bottom:120px; display:flex; flex-direction:column; align-items:center; transition: padding-top .3s; }
        .container { width:100%; max-width:900px; padding:20px; text-align:center; }
        .station-title { font-size:32px; font-weight:900; color:var(--orange); margin:20px 0 4px; }
        .station-subtitle { font-size:17px; color:var(--grey); margin-bottom:30px; }
        .circle-container { width:min(80vw,320px); height:min(80vw,320px); margin:0 auto 20px; position:relative; }
        .circle-border { position:absolute; inset:0; border-radius:50%; background:conic-gradient(var(--orange) 0%, transparent 0%);
            mask:radial-gradient(transparent 68%, black 70%); -webkit-mask:radial-gradient(transparent 68%, black 70%); }
        .circle-img { position:absolute; inset:6px; border-radius:50%; overflow:hidden; background:#000; }
        .circle-img img { width:100%; height:100%; object-fit:cover; }
        .live-badge { display:inline-flex; align-items:center; gap:8px; color:var(--orange); font-weight:700; font-size:14px; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
        .live-dot { width:9px; height:9px; background:var(--orange); border-radius:50%; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .program-title { font-size:28px; font-weight:800; margin:10px 0 30px; line-height:1.2; }
        .play-button { margin:40px auto; width:220px; height:56px; background:var(--orange); color:#fff; border:none; border-radius:28px; font-size:18px; font-weight:700; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 6px 20px rgba(255,77,0,.3); transition:transform .2s; }
        .play-button:hover { transform:scale(1.05); }
        .play-button svg { width:24px; height:24px; fill:#fff; margin-left:10px; }
        .upnext { background:#f8f8f8; border-radius:12px; padding:20px; margin:40px 0; text-align:left; }
        .upnext-items { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
        .upnext-item { flex:1; min-width:200px; display:flex; align-items:center; gap:16px; }
        .upnext-img { width:60px; height:60px; border-radius:8px; object-fit:cover; background:#eee; }
        .upnext-time { font-size:14px; font-weight:700; color:var(--orange); text-transform:uppercase; letter-spacing:0.5px; }
        .upnext-title { font-size:16px; font-weight:700; margin-top:4px; }
        .upnext-desc { font-size:14px; color:var(--grey); margin-top:4px; }
        .recently { margin-top:40px; text-align:left; }
        .recently-header { font-size:13px; font-weight:700; color:var(--grey); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
        .recent-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border-color); }
        .recent-cover { width:48px; height:48px; border-radius:8px; object-fit:cover; background:#eee; }
        .recent-title { font-weight:600; font-size:15px; }
        .recent-artist { font-size:13px; color:var(--light-grey); }
        .mini-player {
            position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border-color);
            box-shadow:0 -4px 20px rgba(0,0,0,.1); padding:12px 16px; display:none; flex-direction:column; gap:10px; z-index:999;
        }
        .mini-player.show { display:flex; }
        .mini-player-content { display:flex; align-items:center; gap:12px; justify-content:space-between; }
        .mini-cover { width:56px; height:56px; border-radius:8px; object-fit:cover; background:#eee; }
        .mini-info { flex:1; min-width:0; }
        .mini-title { font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mini-artist { font-size:13px; color:var(--grey); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mini-controls { display:flex; align-items:center; gap:16px; }
        .mini-btn svg { width:24px; height:24px; fill:var(--grey); }
        .mini-play { background:var(--orange); width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; box-shadow:0 2px 12px rgba(255,77,0,.35); }
        .mini-play svg { width:20px; height:20px; fill:#fff; }
        .mini-volume-bar, .mini-track-bar { height:4px; background:#ddd; border-radius:2px; cursor:pointer; }
        .mini-volume-fill, .mini-track-fill { height:100%; background:var(--orange); border-radius:2px; }
        @media (max-width:480px) { 
            .mini-player-content { flex-direction:column; align-items:flex-start; gap:14px; } 
            .circle-container { width:260px; height:260px; } 
            .program-title { font-size:24px; } 
        }

        /* Apple-style locale bar */
        #praisefm-locale-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(22,22,22,0.98); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            z-index: 99999; padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        #praisefm-locale-bar .pfm-message { font-size: 15px; line-height: 1.4; }
        .pfm-locale-select { position: relative; display: inline-block; }
        .pfm-locale-select button {
            background: rgba(255,255,255,0.1); color: white; border: none;
            padding: 8px 14px; border-radius: 20px; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .pfm-locale-select button::after { content: "▼"; font-size: 9px; opacity: 0.7; }
        .pfm-dropdown {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: #000; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            min-width: 220px; display: none; overflow: hidden;
        }
        .pfm-dropdown a {
            display: block; color: white; padding: 12px 16px; text-decoration: none;
            font-size: 14.5px; transition: background 0.2s;
        }
        .pfm-dropdown a:hover { background: #1a1a1a; }
        .pfm-dropdown a span.flag { font-size: 20px; margin-right: 10px; }
        .pfm-locale-select.active .pfm-dropdown { display: block; }
        .pfm-close-btn { background:none; border:none; color:#aaa; font-size:24px; cursor:pointer; padding:4px 8px; }
        .pfm-bar-shim { height: 56px; display: none; }
        body.has-locale-bar { padding-top: 56px; }
        @media (max-width: 520px) { 
            #praisefm-locale-bar { padding: 10px 16px; }
            body.has-locale-bar { padding-top: 64px; }
            .pfm-bar-shim { height: 64px; }
        }
    </style>
</head>
<body data-current-region="United States">

<!-- 🌐 Locale Bar (Apple-style) -->
<div id="praisefm-locale-bar">
    <div class="pfm-message">Your region has a Praise FM version.</div>
    <div class="pfm-locale-select">
        <button id="locale-btn">Select Region ▼</button>
        <div class="pfm-dropdown">
            <a href="https://praisefm.vercel.app" data-region="United States"><span class="flag">🇺🇸</span> United States</a>
            <a href="https://br.praisefm.vercel.app" data-region="Brasil"><span class="flag">🇧🇷</span> Brasil</a>
            <a href="https://nl.praisefm.vercel.app" data-region="Nederland"><span class="flag">🇳🇱</span> Nederland</a>
            <a href="https://pt.praisefm.vercel.app" data-region="Portugal"><span class="flag">🇵🇹</span> Portugal</a>
            <a href="https://uk.praisefm.vercel.app" data-region="United Kingdom"><span class="flag">🇬🇧</span> United Kingdom</a>
            <!-- Adicione mais regiões aqui -->
        </div>
    </div>
    <button class="pfm-close-btn" id="locale-close">×</button>
</div>
<div class="pfm-bar-shim"></div>

<div class="container">
    <div class="circle-container">
        <div class="circle-border" id="progressRing"></div>
        <div class="circle-img">
            <img id="mainImg" src="/image/logopraisefm.webp" alt="Praise FM">
        </div>
    </div>

    <div class="live-badge"><div class="live-dot"></div><span>LIVE</span></div>
    <div class="program-title" id="programTitle">Praise FM With Praise FM</div>

    <button class="play-button" id="bigPlay">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Play
    </button>

    <div class="upnext">
        <div class="upnext-items">
            <div class="upnext-item">
                <img id="upnextImg1" class="upnext-img" src="/image/default.webp">
                <div>
                    <div class="upnext-time" id="upnextTime1">UP NEXT: 7:00 AM - 8:00 AM</div>
                    <div class="upnext-title" id="upnextTitle1">Loading...</div>
                    <div class="upnext-desc" id="upnextDesc1">-</div>
                </div>
            </div>
            <div class="upnext-item">
                <img id="upnextImg2" class="upnext-img" src="/image/default.webp">
                <div>
                    <div class="upnext-time" id="upnextTime2">UP NEXT: 8:00 AM - 9:00 AM</div>
                    <div class="upnext-title" id="upnextTitle2">Loading...</div>
                    <div class="upnext-desc" id="upnextDesc2">-</div>
                </div>
            </div>
        </div>
    </div>

    <div class="recently">
        <div class="recently-header">Recently Played</div>
        <div id="recentList"></div>
    </div>
</div>

<!-- Mini Player -->
<div class="mini-player" id="miniPlayer">
    <div class="mini-player-content">
        <img id="miniImg" class="mini-cover" src="/image/logopraisefm.webp">
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">Praise FM With Praise FM</div>
            <div class="mini-artist" id="miniArtist">Praise & Worship</div>
        </div>
        <div class="mini-controls">
            <button id="miniRewind" class="mini-btn"><svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm-8-6l9 6V6l-9 6zm10 2v-2c2.76 0 5-2.24 5-5s-2.24-5-5-5v-2c3.87 0 7 3.13 7 7s-3.13 7-7 7z"/></svg></button>
            <button id="miniPlayPause" class="mini-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
            <button id="miniForward" class="mini-btn"><svg viewBox="0 0 24 24"><path d="M13 6l9 6-9 6V6zm-8 6l9-6v12l-9-6z"/></svg></button>
        </div>
    </div>
    <div class="mini-track-progress">
        <div class="mini-track-bar" id="miniTrackBar"><div class="mini-track-fill" id="miniTrackFill"></div></div>
        <div class="mini-track-time"><span id="miniTrackCurrent">0:00</span><span id="miniTrackDuration">Live</span></div>
    </div>
</div>

<script>
    // === DETECT EXTERNAL PLATFORMS (TuneIn, radio.garden, etc.) ===
    function detectExternalPlatform() {
        const ref = document.referrer.toLowerCase();
        const ua = navigator.userAgent.toLowerCase();
        const platforms = ["mytuner","radio","tunein","onlineradiobox","radio.garden","streema","liveonlineradio","radio-browser"];
        for (let p of platforms) if (ref.includes(p)) return true;
        if (ua.includes("mytuner") || ua.includes("radiobox")) return true;
        return false;
    }

    // === ÁUDIO + STREAM ===
    const audio = new Audio("https://stream.zeno.fm/hvwifp8ezc6tv");
    audio.crossOrigin = "anonymous";

    // === LOCALE BAR + IP DETECTION ===
    async function initLocaleBar() {
        const localeBar = document.getElementById("praisefm-locale-bar");
        const shim = document.querySelector(".pfm-bar-shim");
        const body = document.body;

        // Sempre esconder se vier de radio.garden, TuneIn, etc.
        if (detectExternalPlatform()) {
            localeBar.style.display = "none";
            shim.style.display = "none";
            body.classList.remove("has-locale-bar");
            // Auto-play para integração perfeita com radio.garden e outros diretórios
            audio.play().catch(() => {});
            document.getElementById("miniPlayer").classList.add("show");
            return;
        }

        const currentRegion = document.body.dataset.currentRegion || "United States";

        const countryToRegion = {
            "United States": "United States",
            "Brazil": "Brasil",
            "Netherlands": "Nederland",
            "Portugal": "Portugal",
            "United Kingdom": "United Kingdom",
            "Canada": "United States",
            "Angola": "Portugal",
            "Mozambique": "Portugal"
            // Adicione mais conforme necessário
        };

        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            const userRegion = countryToRegion[data.country_name];

            if (userRegion && userRegion !== currentRegion) {
                // Mostrar barra + pré-selecionar região do usuário
                localeBar.style.display = "flex";
                shim.style.display = "block";
                body.classList.add("has-locale-bar");

                const userLink = document.querySelector(`.pfm-dropdown a[data-region="${userRegion}"]`);
                if (userLink) {
                    document.getElementById("locale-btn").innerHTML = userLink.innerHTML + " ▼";
                }
            } else {
                localeBar.style.display = "none";
                shim.style.display = "none";
                body.classList.remove("has-locale-bar");
            }
        } catch (e) {
            // Em caso de erro (bloqueador, etc.) → esconde a barra
            localeBar.style.display = "none";
            shim.style.display = "none";
            body.classList.remove("has-locale-bar");
        }
    }

    // Eventos da barra (toggle dropdown + fechar)
    document.getElementById("locale-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        document.querySelector(".pfm-locale-select").classList.toggle("active");
    });
    document.getElementById("locale-close").addEventListener("click", () => {
        document.getElementById("praisefm-locale-bar").style.display = "none";
        document.querySelector(".pfm-bar-shim").style.display = "none";
        document.body.classList.remove("has-locale-bar");
    });
    document.addEventListener("click", () => {
        document.querySelector(".pfm-locale-select").classList.remove("active");
    });

    // === RESTANTE DO SCRIPT ORIGINAL (programação, metadata, etc.) ===
    // ... (todo o seu script original que já estava funcionando fica aqui)
    // Para não duplicar o código enorme, mantenha exatamente como estava.
    // Apenas adicione no final:

    // Iniciar tudo
    initLocaleBar();
    updateDisplay();
    setInterval(updateDisplay, 8000);

    // Play/Pause
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            document.getElementById("miniPlayer").classList.add("show");
        } else audio.pause();

        const isPlaying = !audio.paused;
        const playSvg = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        const pauseSvg = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
        document.querySelector("#bigPlay").innerHTML = isPlaying ? pauseSvg + ' Pause' : playSvg + ' Play';
        document.getElementById("miniPlayPause").innerHTML = isPlaying ? pauseSvg : playSvg;
    }

    document.getElementById("bigPlay").onclick = togglePlay;
    document.getElementById("miniPlayPause").onclick = togglePlay;

    // EventSource metadata (Zenno)
    try {
        const es = new EventSource("https://api.zeno.fm/mounts/metadata/subscribe/hvwifp8ezc6tv");
        es.onmessage = e => {
            const d = JSON.parse(e.data);
            if (d.streamTitle) {
                const parts = d.streamTitle.split(" - ");
                const artist = parts[0] || "";
                const title = parts.slice(1).join(" - ") || "";
                processMetadata(artist, title);   // sua função original
            }
        };
    } catch(e) {}

</script>
</body>
</html>
