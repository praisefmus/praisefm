<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- GOOGLE ANALYTICS GA4 — Praise FM -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0RNK6G5WWL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }

      gtag('js', new Date());
      gtag('config', 'G-0RNK6G5WWL');
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Praise FM - Live</title>
    <meta name="theme-color" content="#ff4d00">
    <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon-32x32.png">

    <style>
        :root { --orange:#ff4d00; --dark:#111; --grey:#555; --light-grey:#888; --bg:#fff; --border-color:#ddd; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
        body { background:var(--bg); color:#000; min-height:100vh; padding-bottom:120px; display:flex; flex-direction:column; align-items:center; }
        .container { width:100%; max-width:900px; padding:20px; text-align:center; }
        .station-title { font-size:32px; font-weight:900; color:var(--orange); margin:20px 0 4px; }
        .station-subtitle { font-size:17px; color:var(--grey); margin-bottom:30px; }
        .circle-container { width:min(80vw,320px); height:min(80vw,320px); margin:0 auto 20px; position:relative; }
        .circle-border { position:absolute; inset:0; border-radius:50%; background:conic-gradient(var(--orange) 0%, transparent 0%);
            mask:radial-gradient(transparent 68%, black 70%); -webkit-mask:radial-gradient(transparent 68%, black 70%); }
        .circle-img { position:absolute; inset:6px; border-radius:50%; overflow:hidden; background:#000; }
        .circle-img img { width:100%; height:100%; object-fit:cover; }
        .live-badge { display:inline-flex; align-items:center; gap:8px; color:var(--orange); font-weight:700; font-size:14px; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
        .live-dot { width:9px; height:9px; background:var(--orange); border-radius:50%; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* 🎯 NOTIFICAÇÃO DISCRETA (Opção D) */
        #external-radio-toast {
            display:none;
            position:fixed;
            bottom:20px;
            right:20px;
            background:#111;
            color:white;
            padding:14px 18px;
            border-radius:14px;
            font-size:14px;
            box-shadow:0 4px 18px rgba(0,0,0,0.4);
            z-index:99999;
            max-width:260px;
            animation:fadeToast .4s ease-out;
        }
        #external-radio-toast button {
            margin-top:8px;
            background:#ff4d00;
            border:none;
            color:white;
            padding:6px 14px;
            border-radius:10px;
            font-size:13px;
            font-weight:700;
            cursor:pointer;
        }
        @keyframes fadeToast {
            from { opacity:0; transform:translateY(15px); }
            to { opacity:1; transform:translateY(0); }
        /* (continuação dos estilos existentes) */
    </style>
</head>

<body>

<!-- 🔔 Notificação discreta -->
<div id="external-radio-toast">
    Você veio de outra plataforma.<br>
    Ouça com mais qualidade aqui no site oficial.
    <button onclick="window.location.href='https://praisefm.vercel.app'">OUVIR</button>
</div>

<!-- Conteúdo original -->
<div class="container">
    <img src="/image/praisefm.png" width="180" style="margin-top:20px;">
    <div class="station-title">Praise FM — Praise & Worship</div>

    <div class="circle-container">
        <div class="circle-border" id="circleBorder"></div>
        <div class="circle-img">
            <img id="cover" src="/image/default.jpg">
        </div>
    </div>

    <div class="live-badge"><div class="live-dot"></div> LIVE</div>

    <div id="title" class="now-playing-title">Loading...</div>
    <div id="artist" class="now-playing-artist"></div>

    <div class="player-controls">
        <button id="play" class="player-button">Play</button>
        <button id="stop" class="player-button" style="background:#555;">Stop</button>
    </div>
</div>

<!-- Player Script Original -->
<script>
const audio = new Audio("https://stream.zeno.fm/f2z4h9m9k2zuv");

document.getElementById("play").onclick = () => {
    audio.play();
    document.getElementById("circleBorder").style.animation = "spin 8s linear infinite";
};

document.getElementById("stop").onclick = () => {
    audio.pause();
    document.getElementById("circleBorder").style.animation = "none";
};

/* Música atual */
async function loadTrack() {
    try {
        const r = await fetch("https://public.radio.co/stations/s8e3f0d4c4/status");
        const j = await r.json();

        const song = j.current_track?.title || "Praise FM";
        const artist = song.includes(" - ") ? song.split(" - ")[0] : "Artist";
        const title = song.includes(" - ") ? song.split(" - ")[1] : song;

        document.getElementById("title").innerText = title;
        document.getElementById("artist").innerText = artist;
        document.getElementById("cover").src = j.current_track?.artwork_url || "/image/default.jpg";
    } catch(e) {
        console.log("Erro ao obter faixa.");
    }
}
setInterval(loadTrack, 5000);
loadTrack();
</script>

<!-- 🔍 Detecção de Plataformas + Evento GA4 + Notificação -->
<script>
(function(){
    const ref = document.referrer.toLowerCase();
    const ua = navigator.userAgent.toLowerCase();

    const externalSources = [
        "mytuner", "radio.garden", "onlineradiobox",
        "tunein", "streema", "radio-browser",
        "liveonlineradio", "radio.net", "internet-radio"
    ];

    let isExternal = false;

    for (let p of externalSources) {
        if (ref.includes(p)) {
            isExternal = true;
            break;
        }
    }

    if (ua.includes("mytuner") || ua.includes("tunein") || ua.includes("radiobox")) {
        isExternal = true;
    }

    if (isExternal) {
        const toast = document.getElementById("external-radio-toast");
        toast.style.display = "block";

        if (typeof gtag === "function") {
            gtag('event', 'external_platform_listener', {
                source: ref || ua,
                page: location.href
            });
        }
    }
})();
</script>

</body>
</html>
