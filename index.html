<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praise FM U.S. — Live</title>

    <!-- FAVICONS -->
    <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/image/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/image/apple-touch-icon.png">

    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="top-header">
    <img src="/image/logopraisefm.webp" class="header-logo" alt="Praise FM Logo">
    <h1 class="header-title">Praise FM U.S.</h1>
</header>

<main class="container">

    <!-- COVER -->
    <div class="cover-wrapper">
        <img id="coverImg" src="/image/logopraisefm.webp" class="cover-img" alt="Now Playing">
    </div>

    <!-- NOW PLAYING TEXT -->
    <div class="now-playing">
        <span class="live-dot"></span> LIVE • <span id="currentTime"></span>
    </div>

    <h2 id="currentTitle" class="track-title">Praise FM U.S.</h2>

    <!-- PLAYER BUTTON -->
    <button id="playBtn" class="play-btn" aria-label="Play">
        ▶
    </button>

    <!-- VOLUME -->
    <div class="vol-box">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.7" />
    </div>

    <!-- STATUS -->
    <div id="status" class="status">Connecting…</div>

    <!-- RECENTLY PLAYED -->
    <section class="recent-section">
        <h3>Recently Played</h3>
        <ul id="historyList" class="history-list">
            <li class="empty">No songs yet…</li>
        </ul>
    </section>

</main>

<audio id="radioPlayer" preload="auto"></audio>
<script src="script.js" defer></script>
</body>
</html>
