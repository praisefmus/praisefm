<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praise FM Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="player">
  <div id="cover-container">
    <img id="cover" src="/image/logopraisefm.webp" alt="Capa ou logo">
    <div id="blur-background"></div>
  </div>
  <div id="song-info">
    <span id="artist">Artista</span> - <span id="track">Música</span>
  </div>
  <audio id="audio" controls autoplay>
    <source src="https://stream.zeno.fm/hvwifp8ezc6tv" type="audio/mpeg">
    Seu navegador não suporta o player de áudio.
  </audio>
</div>

<script src="player.js"></script>
</body>
</html>
