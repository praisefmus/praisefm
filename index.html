<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Praise FM U.S.</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/image/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/image/favicon-16x16.png">
  <link rel="manifest" href="/image/site.webmanifest">

  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <script src="https://kit.fontawesome.com/4d53d79e8b.js" crossorigin="anonymous"></script>
</head>

<body>

  <div class="container">

    <header class="header">
      <button id="favoriteBtn" class="favorite-btn">☆</button>
    </header>

    <div class="content">
      <h1 class="station-title">Praise FM U.S.</h1>
      <p class="station-desc">Positive. Encouraging. Praise.</p>

      <div id="showImage" class="show-image">
        <img id="coverImage" src="/image/logopraisefm.webp" alt="Cover Art">
      </div>

      <div class="show-info">
        <div id="liveIndicator" class="live-indicator">LIVE</div>
        <div id="currentTitle" class="show-title">Praise FM U.S.</div>
        <div id="currentDate" class="show-date"></div>
      </div>

      <button id="playButton" class="play-button">▶ Listen Live</button>

      <div class="volume-control">
        <i class="fas fa-volume-up"></i>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
      </div>

      <section class="history-section">
        <h2 class="history-title">Recently Played</h2>
        <ul id="historyList" class="history-list"></ul>
      </section>

      <div id="status" class="status">Connecting...</div>

    </div>
  </div>

  <audio id="audioPlayer"></audio>

  <script src="script.js"></script>

</body>
</html>
