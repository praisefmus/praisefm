<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
     content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Praise FM</title>
  <style>
    :root {
      --accent: #ff4d00;
      --bg: #0b0b0b;
      --border: #222;
      --panel: #111;
      --muted: #aaa;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding-bottom: 160px; background: var(--bg); color: #fff; font-family: sans-serif; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; text-align: center; }
    .program-circle { position: relative; width: 300px; height: 300px; margin: 0 auto; border-radius: 50%; border: 2px solid var(--border); overflow: hidden; background: var(--panel); }
    .program-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; z-index: 2; position: relative; }
    .progress-ring { position: absolute; inset: 0; transform: rotate(-90deg); }
    .progress-ring circle { fill: transparent; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .6s linear; }
    #programTitle { margin-top: 16px; font-size: 22px; font-weight: bold; }
    #programHost { font-size: 14px; color: var(--muted); margin-top: 4px; }
    #programTime { color: var(--accent); margin-top: 8px; }
    .nowplaying { margin-top: 12px; width: 90%; overflow: hidden; margin-left: auto; margin-right: auto; }
    .marquee { display: inline-block; white-space: nowrap; animation: scroll 10s linear infinite; }
    @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    #playBtn { margin-top: 16px; padding: 12px 24px; background: var(--accent); border: none; border-radius: 50px; color: #fff; font-size: 16px; cursor: pointer; }
    #recently { margin-top: 24px; width: 90%; margin-left: auto; margin-right: auto; text-align: left; }
    .recent-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .rec-cover { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; }
    .rec-meta { font-size: 14px; }
    .rec-artist { font-size: 12px; color: var(--muted); }

    /* Bottom player */
    #bottomPlayer { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 800px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; padding: 10px; opacity: 0; pointer-events: none; transition: opacity .3s; }
    #bottomPlayer.active { opacity: 1; pointer-events: auto; }
    .bp-cover { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; }
    .bp-meta { margin-left: 12px; text-align: left; }
    .bp-title { font-weight: bold; }
    .bp-sub { font-size: 12px; color: var(--muted); }

  </style>
  <body>
  <div class="container">
    <div class="station-title">Praise FM</div>
    <div class="station-desc">Praise & Worship</div>

    <div class="program-circle">
      <svg class="progress-ring" width="300" height="300">
        <circle id="prog" cx="150" cy="150" r="140" />
      </svg>
      <img id="circleImg" class="program-img" src="/image/logopraisefm.webp" alt="Program">
    </div>

    <div id="programTitle"></div>
    <div id="programHost"></div>
    <div id="programTime"></div>

    <div class="nowplaying"><div id="nowPlaying" class="marquee">…</div></div>

    <button id="playBtn">▶ Play</button>

    <div id="recently"></div>
  </div>

  <div id="bottomPlayer">
    <img id="bpCover" class="bp-cover" src="/image/logopraisefm.webp">
    <div class="bp-meta">
      <div id="bpTitle">Praise FM</div>
      <div id="bpSub">Live</div>
    </div>
  </div>

<script>
// lógica simplificada para testes iniciais de UI
function nowChicago(){ return new Date(new Date().toLocaleString("en-US",{timeZone: "America/Chicago"})); }
function formatTime(f){ const h=Math.floor(f), m=Math.round((f-h)*60); return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`; }

const programs = [
  { name:"Morning Show", host:"with Stancy Campbell", start:7, end:12, img:"/image/morningshowlogo.webp" },
  { name:"Midday Grace", host:"with Michael Grace", start:12.5, end:16, img:"/image/middaygracelogo.webp" }
];

function getCurrent(){
  const d = nowChicago(), h = d.getHours()+d.getMinutes()/60;
  for(const p of programs){
    if(h >= p.start && h < p.end) return p;
  }
  return programs[0];
}

function updateProg(){
  const p = getCurrent();
  document.getElementById("programTitle").textContent = p.name;
  document.getElementById("programHost").textContent = p.host;
  document.getElementById("programTime").textContent = formatTime(p.start) + " – " + formatTime(p.end);
  document.getElementById("circleImg").src = p.img;

  const now = nowChicago();
  const elapsed = ((now.getHours()+now.getMinutes()/60) - p.start) * 3600;
  const total = (p.end - p.start) * 3600;
  const progCircle = document.getElementById("prog");
  const radius = progCircle.r.baseVal.value;
  const circumference = 2 * Math.PI * radius;
  progCircle.style.strokeDasharray = circumference;
  progCircle.style.strokeDashoffset = circumference - (elapsed / total) * circumference;
}

updateProg();
setInterval(updateProg, 30000);

// dummy metadata
document.getElementById("playBtn").addEventListener("click", ()=>{
  document.getElementById("bottomPlayer").classList.add("active");
  document.getElementById("bpTitle").textContent = "Artista Exemplo";
  document.getElementById("bpSub").textContent = "Música Exemplo";
  document.getElementById("bpCover").src = "/image/logopraisefm.webp";
});
</script>

</body>
</html>
