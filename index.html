<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praise FM U.S. - Listen Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-attachment: fixed;
        }

        .player-container {
            width: 90%;
            max-width: 600px;
            min-width: 300px;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .cover-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
            border-radius: 24px 24px 0 0;
        }

        .cover-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a7a2a, #1a4a1a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .cover-placeholder i {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .song-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px 60px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 2;
        }

        .song-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            font-size: 1.2rem;
            color: #a0a0a0;
            font-weight: 500;
        }

        .controls-container {
            padding: 20px 25px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(30, 30, 30, 0.95);
        }

        .progress-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #555;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #00ff9d;
            width: 0%;
            border-radius: 2px;
            position: relative;
        }

        .progress::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }

        .main-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .control-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: white;
            color: black;
            font-size: 2rem;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .play-btn:hover {
             background: #f0f0f0;
             box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .additional-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }

        .additional-btn {
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
        }

        .additional-btn.active,
        .additional-btn:hover {
            color: white;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100px;
        }

        #volumeSlider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #555;
            border-radius: 2px;
            outline: none;
        }

        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        /* --- NOVO: Informações da Rádio --- */
        .station-footer {
            background: rgba(20, 20, 20, 0.9);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #ccc;
            border-top: 1px solid rgba(255, 255, 255, 0.1); /* Linha sutil separando */
        }

        .station-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .station-name {
            font-weight: 600;
            color: white; /* Nome da rádio em branco */
        }

        .live-indicator {
            color: #ff0000; /* Vermelho */
            font-weight: bold;
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; /* Efeito pulsante */
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }

        .chicago-time {
            font-weight: 500;
            color: #a0a0a0;
        }

        .social-icons a {
            color: white;
            margin-left: 15px;
            font-size: 1.1rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .social-icons a:hover {
            opacity: 1;
        }

        .cover-image {
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            transition: box-shadow 0.3s ease;
        }

        .cover-image.glow {
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.6);
        }

        @media (max-width: 600px) {
            .player-container {
                width: 95%;
                max-width: 400px;
            }
            .song-title { font-size: 1.6rem; }
            .artist-name { font-size: 1.1rem; }
            .main-controls { gap: 20px; }
            .control-btn { width: 45px; height: 45px; font-size: 1.3rem; }
            .play-btn { width: 55px; height: 55px; font-size: 1.8rem; }
        }

        @media (min-width: 1024px) {
            .player-container {
                width: 80%;
                max-width: 600px;
            }
            .song-title { font-size: 2rem; }
            .artist-name { font-size: 1.3rem; }
        }

    </style>
</head>
<body>

    <div class="player-container">
        <div class="cover-container">
            <img id="coverImage" class="cover-image" src="" alt="Current track artwork" style="display: none;">
            <div id="coverPlaceholder" class="cover-placeholder">
                <i class="fas fa-music"></i>
                <div>Praise FM U.S.</div>
            </div>
            <div class="song-info-overlay">
                <div class="song-title" id="songTitle">Streaming Live</div>
                <div class="artist-name" id="artistName">Praise & Worship</div>
            </div>
        </div>

        <div class="controls-container">
            <div class="progress-container">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="remainingTime">-0:00</span>
                </div>
                <div class="progress-bar">
                    <div class="progress" id="progressBar"></div>
                </div>
            </div>

            <div class="main-controls">
                <button class="control-btn" id="rewindBtn" title="Rewind">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-btn" id="playPauseBtn" title="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn" id="forwardBtn" title="Forward">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <div class="additional-controls">
                <button class="additional-btn" id="favoriteBtn" title="Favorite">
                    <i class="far fa-star"></i>
                </button>
                <div class="volume-container">
                    <i class="fas fa-volume-up" style="color:white;font-size:1rem;"></i>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                </div>
                 <button class="additional-btn" id="commentsBtn" title="Comments">
                    <i class="fas fa-comment"></i>
                </button>
                <button class="additional-btn" id="optionsBtn" title="Options">
                    <i class="fas fa-ellipsis-h"></i>
                </button>
            </div>
        </div>

        <!-- --- NOVO: Rodapé com Status e Hora --- -->
        <div class="station-footer">
            <div class="station-status">
                <span class="station-name">Praise FM U.S.</span>
                <span class="live-indicator">LIVE</span>
            </div>
            <div class="chicago-time" id="chicagoTime">Loading...</div>
            <div class="social-icons">
                <a href="https://www.facebook.com/praisefm.usa/" target="_blank" rel="noopener"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/fmpraise.usa/" target="_blank" rel="noopener"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <audio id="radioPlayer" preload="metadata">
        <source src="https://stream.zeno.fm/tobnzqsvykzvv" type="audio/mpeg">
    </audio>

    <script>
        const STREAM_URL = 'https://stream.zeno.fm/tobnzqsvykzvv';
        const STREAM_LOGO_URL = 'https://raw.githubusercontent.com/praisefmus/praisefm/main/image/logopraisefm.webp';
        const LASTFM_API_KEY = '3ce134e4f02accfff4367ada927e6dcd';

        const player = document.getElementById('radioPlayer');
        const coverImg = document.getElementById('coverImage');
        const coverPlaceholder = document.getElementById('coverPlaceholder');
        const songTitleEl = document.getElementById('songTitle');
        const artistNameEl = document.getElementById('artistName');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const remainingTimeEl = document.getElementById('remainingTime');
        const favoriteBtn = document.getElementById('favoriteBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const commentsBtn = document.getElementById('commentsBtn');
        const optionsBtn = document.getElementById('optionsBtn');
        const chicagoTimeEl = document.getElementById('chicagoTime'); // Elemento para a hora

        let isPlaying = false;
        let currentSong = '';
        let currentArtist = '';
        let currentCoverUrl = '';
        let currentTrackKey = '';
        let isSeeking = false;
        let totalDuration = 0;

        function showCover(url) {
            if (url && url !== STREAM_LOGO_URL) {
                coverImg.src = url;
                coverImg.style.display = 'block';
                coverPlaceholder.style.display = 'none';
                coverImg.classList.add('glow');
            } else {
                coverImg.style.display = 'none';
                coverPlaceholder.style.display = 'flex';
                coverImg.classList.remove('glow');
            }
        }

        async function fetchCoverFromLastFm(artist, track) {
            if (!artist || !track) return null;
            try {
                const response = await fetch(
                    `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`
                );
                const data = await response.json();
                const images = data.track?.album?.image;
                if (images && images.length > 0) {
                    const cover = images.find(img => img.size === 'extralarge') || images[images.length - 1];
                    const url = cover?.['#text']?.trim();
                    if (url && !url.includes('2a96cbd8b46e442fc41c2b86b821562f4c259d77.png') && !url.includes('6673a968842267b0b62b371850f88c6d6d8c0c3e.png')) {
                        return url;
                    }
                }
            } catch (error) {
                console.error("Error fetching cover from Last.fm:", error);
            }
            return null;
        }

        async function updateTrackInfo(song, artist) {
            if (!song || !artist || `${artist} - ${song}` === currentTrackKey) {
                return;
            }

            currentTrackKey = `${artist} - ${song}`;
            songTitleEl.textContent = song;
            artistNameEl.textContent = artist;

            let coverUrl = await fetchCoverFromLastFm(artist, song);
            if (coverUrl) {
                currentCoverUrl = coverUrl;
                showCover(coverUrl);
            } else {
                currentCoverUrl = STREAM_LOGO_URL;
                showCover(STREAM_LOGO_URL);
            }
        }

        async function checkStreamMetadata() {
            const simulatedSongs = [
                { title: "What A Beautiful Name", artist: "Hillsong Worship" },
                { title: "Reckless Love", artist: "Cory Asbury" },
                { title: "O Come To The Altar", artist: "Elevation Worship" },
                { title: "Good Good Father", artist: "Chris Tomlin" }
            ];

            const randomSong = simulatedSongs[Math.floor(Math.random() * simulatedSongs.length)];
            await updateTrackInfo(randomSong.title, randomSong.artist);
        }

        // --- Função para atualizar a hora de Chicago ---
        function updateChicagoTime() {
            const now = new Date();
            // Formata a hora no fuso horário de Chicago (CST/CDT)
            const chicagoTime = now.toLocaleString('en-US', {
                timeZone: 'America/Chicago',
                hour12: false, // Formato 24h
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            chicagoTimeEl.textContent = `Chicago: ${chicagoTime}`;
        }

        // Atualiza a hora a cada segundo
        setInterval(updateChicagoTime, 1000);
        // Atualiza imediatamente ao carregar
        updateChicagoTime();

        player.src = STREAM_URL;
        player.volume = volumeSlider.value;
        showCover(STREAM_LOGO_URL);

        player.play().then(() => {
            isPlaying = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            setInterval(checkStreamMetadata, 30000);
        }).catch(err => {
            console.warn("Autoplay bloqueado pelo navegador. Interação do usuário necessária.");
            isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        });

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                player.pause();
            } else {
                player.play();
            }
            isPlaying = !isPlaying;
            playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        });

        volumeSlider.addEventListener('input', () => {
            player.volume = volumeSlider.value;
        });

        player.addEventListener('timeupdate', () => {
            if (!isSeeking) {
                const currentTime = player.currentTime;
                totalDuration = 180;
                const progressPercent = (currentTime % totalDuration) / totalDuration * 100;
                progressBar.style.width = `${progressPercent}%`;

                const displayCurrent = formatTime(currentTime % totalDuration);
                const displayTotal = formatTime(totalDuration);
                currentTimeEl.textContent = displayCurrent;
                remainingTimeEl.textContent = `-${formatTime(totalDuration - (currentTime % totalDuration))}`;
            }
        });

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        favoriteBtn.addEventListener('click', () => {
            const icon = favoriteBtn.querySelector('i');
            if (icon.classList.contains('far')) {
                icon.classList.remove('far');
                icon.classList.add('fas', 'active');
                console.log("Favoritou:", currentTrackKey);
            } else {
                icon.classList.remove('fas', 'active');
                icon.classList.add('far');
                console.log("Desfavoritou:", currentTrackKey);
            }
        });

        rewindBtn.addEventListener('click', () => {
             console.log("Rewind pressionado - não funcional para stream.");
        });

        forwardBtn.addEventListener('click', () => {
             console.log("Forward pressionado - simulando próxima música.");
             checkStreamMetadata();
        });

        commentsBtn.addEventListener('click', () => {
             alert("Funcionalidade de comentários não implementada ainda.");
        });

        optionsBtn.addEventListener('click', () => {
             alert("Menu de opções aberto. Poderia conter equalizador, qualidade, etc.");
        });

        progressBar.parentElement.addEventListener('mousedown', (e) => {
            isSeeking = true;
            updateSeek(e);
        });

        document.addEventListener('mousemove', (e) => {
            if (isSeeking) {
                updateSeek(e);
            }
        });

        document.addEventListener('mouseup', () => {
            isSeeking = false;
        });

        function updateSeek(e) {
            const progressBarRect = progressBar.parentElement.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (e.clientX - progressBarRect.left) / progressBarRect.width));
            progressBar.style.width = `${percent * 100}%`;
        }

    </script>

</body>
</html>
