<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
<title>Praise FM - Live Radio</title>
<link rel="icon" href="./image/favicon-32x32.png">
<style>
:root{
  --accent:#ff4d00;
  --bg:#fff;
  --muted:#666;
  --card:#f7f7f7;
  --border:#e6e6e6;
  --shadow:0 10px 30px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{background:var(--bg);color:#0b0b0b;padding:18px;padding-bottom:140px;display:flex;justify-content:center}
.player-container{width:100%;max-width:980px;display:flex;flex-direction:column;align-items:center;gap:18px}

/* main program */
.program-circle{width:min(64vw,320px);height:min(64vw,320px);border-radius:50%;overflow:hidden;border:2px solid var(--border);display:flex;align-items:center;justify-content:center}
.program-img{width:96%;height:96%;border-radius:50%;object-fit:cover;transition:opacity .45s,transform .45s}
.program-circle.is-playing::before{content:"";position:absolute;inset:-6px;border-radius:50%;z-index:2;border:3px solid var(--accent);border-top-color:transparent;animation:ring-spin 4s linear infinite;pointer-events:none}
@keyframes ring-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* bottom player (BBC style) - adjusted layout */
.bottom-player-bar{
  position:fixed;
  left:16px;right:16px;bottom:18px;
  height:76px;
  background:#fff;border-radius:12px;box-shadow:var(--shadow);
  display:flex;align-items:center;padding:10px 14px;gap:12px;
  transform:translateY(120%);transition:transform .38s cubic-bezier(.2,.9,.2,1),opacity .22s;
  opacity:0;z-index:9999;
}
.bottom-player-bar.visible{transform:translateY(0);opacity:1}

/* left area: cover + text */
.bar-left {
  display:flex;align-items:center;gap:10px;flex:0 0 auto;
}
.bar-program-img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0}
.bar-program-meta{display:flex;flex-direction:column;min-width:0}
.bar-program-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-program-artists{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* center controls: flex-grow and center alignment */
.bar-center {
  display:flex;flex:1;align-items:center;justify-content:center;gap:12px;min-width:0;padding:0 8px;
}
.bar-controls{
  display:flex;align-items:center;gap:12px;background:transparent;
}
.bar-control-btn{background:none;border:0;cursor:pointer;font-size:18px;padding:6px;border-radius:8px}
.bar-seek-bar{width:260px;height:6px;background:rgba(0,0,0,0.06);border-radius:6px;overflow:hidden}
.bar-seek-progress{height:100%;background:var(--accent);width:0%}

/* right area: volume and extras */
.bar-right{display:flex;align-items:center;gap:12px;flex:0 0 auto}
.bar-volume-container{display:flex;align-items:center;gap:8px;width:140px}
.bar-volume-slider{-webkit-appearance:none;background:rgba(0,0,0,0.06);height:6px;border-radius:6px;width:100%}
.bar-volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
.bar-live{display:none}

/* responsive - small screens: stack a bit and shrink center controls */
@media (max-width:680px){
  .bottom-player-bar{left:10px;right:10px;height:76px;padding:8px;gap:8px}
  .bar-program-img{width:48px;height:48px}
  .bar-seek-bar{width:120px}
  .bar-volume-container{width:90px}
  .bar-center{padding:0 6px}
}
</style>
</head>
<body>
  <div class="player-container">
    <!-- (conteúdo principal mantido) -->
    <div style="text-align:center">
      <h1 style="color:var(--accent);font-size:28px;margin-bottom:4px">Praise FM</h1>
      <div style="color:#666;font-size:14px">Praise &amp; Worship</div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
      <div class="program-circle is-playing" id="programCircle">
        <img id="programImg" class="program-img" src="/image/morningshowlogo.webp" alt="program">
      </div>
      <div style="text-align:center">
        <div style="color:var(--accent);font-weight:700;margin-bottom:6px" id="programTime">07:00 - 12:00</div>
        <div style="font-weight:800;font-size:20px" id="programTitle">Morning Show</div>
        <div style="color:#666;margin-top:4px" id="programHosts">Praise FM Hosts</div>
      </div>

      <button id="playBtn" style="background:var(--accent);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer;margin-top:6px">Play</button>
    </div>
  </div>

  <!-- bottom player adjusted -->
  <div id="bottomPlayerBar" class="bottom-player-bar" aria-hidden="true">
    <div class="bar-left">
      <!-- Usei sua imagem de exemplo (uploaded) como fallback / demo -->
      <img id="barProgramImg" class="bar-program-img" src="/mnt/data/teste.png" alt="cover">
      <div class="bar-program-meta">
        <div class="bar-program-name" id="barProgramName">Morning Show</div>
        <div class="bar-program-artists" id="barProgramArtists">Praise FM Hosts</div>
      </div>
    </div>

    <div class="bar-center">
      <div class="bar-controls" role="group" aria-label="Player controls">
        <button class="bar-control-btn" id="barRew">⟲</button>
        <button class="bar-control-btn" id="barPlay">▶</button>
        <button class="bar-control-btn" id="barFwd">⟳</button>
        <div class="bar-seek-bar" aria-hidden="true"><div id="barSeek" class="bar-seek-progress"></div></div>
      </div>
    </div>

    <div class="bar-right">
      <div class="bar-volume-container">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        <input id="barVol" type="range" class="bar-volume-slider" min="0" max="1" step="0.01" value="0.8" aria-label="volume">
      </div>
    </div>
  </div>

<script>
/* minimal wiring to show/hide bottom player and center controls working with your stream logic */
/* integrate with your existing audio and metadata code as needed */

const mainPlayBtn = document.getElementById('playBtn');
const bottomBar = document.getElementById('bottomPlayerBar');
const barPlay = document.getElementById('barPlay');
const barRew = document.getElementById('barRew');
const barFwd = document.getElementById('barFwd');
const barSeek = document.getElementById('barSeek');
const barVol = document.getElementById('barVol');
let playing = false;

// example audio (you should use your STREAM_URL and existing audio element)
const audio = new Audio("https://stream.zeno.fm/hvwifp8ezc6tv");
audio.preload = "none";
audio.volume = Number(barVol.value);

// show bottom bar only when pressing main play (BBC style)
mainPlayBtn.addEventListener('click', async ()=>{
  if (!playing){
    // start stream
    audio.src = audio.src || "https://stream.zeno.fm/hvwifp8ezc6tv";
    try {
      await audio.play();
      playing = true;
      mainPlayBtn.textContent = "Pause";
      barPlay.textContent = "❚❚";
      bottomBar.classList.add('visible');
      bottomBar.setAttribute('aria-hidden','false');
    } catch(e){
      // autoplay blocked -> still show UI so user can click there
      bottomBar.classList.add('visible');
      bottomBar.setAttribute('aria-hidden','false');
    }
  } else {
    audio.pause();
    playing = false;
    mainPlayBtn.textContent = "Play";
    barPlay.textContent = "▶";
    // keep bottom bar visible after pause (like BBC). If prefer hide, uncomment:
    // bottomBar.classList.remove('visible');
  }
});

// bottom play toggles same audio
barPlay.addEventListener('click', ()=>{
  if (!playing){
    audio.play(); playing=true; barPlay.textContent="❚❚"; mainPlayBtn.textContent="Pause";
  } else {
    audio.pause(); playing=false; barPlay.textContent="▶"; mainPlayBtn.textContent="Play";
  }
});

// simple rew/fwd (best-effort)
barRew.addEventListener('click', ()=>{ try{ audio.currentTime = Math.max(0,(audio.currentTime||0)-20); }catch(e){} });
barFwd.addEventListener('click', ()=>{ try{ audio.currentTime = (audio.currentTime||0)+20; }catch(e){} });

// volume
barVol.addEventListener('input', (e)=>{ audio.volume = Number(e.target.value); });

// fake seek progress for demo (replace with real program progress)
let demoPct = 0;
setInterval(()=>{
  if (playing){
    demoPct = (demoPct + 1) % 100;
    barSeek.style.width = demoPct + '%';
  }
}, 1000);

// responsive: if screen small, reduce seek width (CSS handles)
</script>
</body>
</html>
