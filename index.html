<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>Praise FM - Live Radio</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./image/favicon-32x32.png">
    <style>
        :root{
            --primary-color:#000;
            --secondary-color:#444;
            --accent-color:#ff4d00;
            --bg-light:#fff;
            --card-bg:#f6f6f6;
            --border-color:#e6e6e6;
        }
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
        body{
            background:var(--bg-light);
            color:var(--primary-color);
            padding:12px;
            padding-bottom:100px;
            display:flex;
            justify-content:center;
        }

        .player-container{
            width:100%;
            max-width:860px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:14px;
        }

        .station-title{font-size:26px;font-weight:800;color:var(--accent-color)}
        .station-desc{font-size:14px;color:var(--secondary-color)}

        /* Program Circle */
        .program-area{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
        .program-circle{
            width:min(56vw,240px);
            height:min(56vw,240px);
            border-radius:50%;
            position:relative;
            border:2px solid var(--border-color);
            overflow:hidden;
            background:#fafafa;
            --progress-deg:0deg;
        }
        .program-img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .program-circle.is-playing::before{
            content:"";
            position:absolute;
            inset:-6px;
            border-radius:50%;
            z-index:1;
            background:conic-gradient(var(--accent-color) var(--progress-deg), rgba(0,0,0,0.08) var(--progress-deg));
            -webkit-mask: radial-gradient(circle, transparent 68%, black 69%);
            mask: radial-gradient(circle, transparent 68%, black 69%);
            transition:--progress-deg 1s linear;
        }

        .program-label{text-align:center}
        .program-status{font-size:12px;color:var(--accent-color);font-weight:700;display:flex;justify-content:center;gap:8px;align-items:center}
        .program-name{font-size:20px;font-weight:800;margin-top:6px}
        .program-artists{font-size:14px;color:var(--secondary-color);margin-top:4px}

        .play-btn{
            background:var(--accent-color);
            color:#fff;border:none;border-radius:8px;padding:12px 18px;font-weight:800;cursor:pointer;
            display:flex;gap:10px;align-items:center;
        }

        /* Recents */
        .recents-container{width:100%;margin-top:8px}
        .recents-title{font-size:13px;color:#666;font-weight:700;text-transform:uppercase;margin-bottom:8px}
        .recent-item{display:flex;align-items:center;gap:12px;padding:8px;border-radius:8px;background:var(--card-bg);border:1px solid var(--border-color);margin-bottom:8px}
        .recent-cover{width:56px;height:56px;border-radius:6px;object-fit:cover;background:#eaeaea}
        .recent-info{flex:1;min-width:0}
        .recent-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .recent-artist{font-size:13px;color:var(--secondary-color);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .recent-time{font-size:12px;color:#888;margin-left:10px}

        /* Bottom Player Bar */
        .bottom-player-bar{
            position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-top:1px solid var(--border-color);box-shadow:0 -6px 20px rgba(0,0,0,0.05);z-index:999;
        }
        .bar-program-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
        .bar-program-img{width:56px;height:56px;border-radius:50%;object-fit:cover}
        .bar-program-text{min-width:0}
        .bar-program-name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .bar-program-artists{font-size:13px;color:var(--secondary-color);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

        .bar-controls{display:flex;align-items:center;gap:12px}
        .bar-control-btn{background:none;border:none;cursor:pointer;font-size:18px}
        .bar-seek-bar{width:160px;height:6px;background:rgba(0,0,0,0.08);border-radius:6px;overflow:hidden}
        .bar-seek-progress{height:100%;background:var(--accent-color);width:0%}
        .bar-volume-container{display:flex;align-items:center;gap:8px;width:140px;margin-left:20px}
        .bar-volume-slider{-webkit-appearance:none;background:rgba(0,0,0,0.08);height:6px;border-radius:6px;width:100%}
        .bar-volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent-color)}
        .bar-volume-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent-color)}

        /* Hide LIVE badge per request */
        .bar-live{display:none}

        /* Responsive */
        @media (max-width:560px){
            .program-circle{width:60vw;height:60vw}
            .bar-seek-bar{width:100px}
            .bar-volume-container{width:100px;margin-left:10px}
            .recent-cover{width:100%;height:120px}
            .recent-item{flex-direction:column;align-items:flex-start}
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="station-title">Praise FM</div>
        <div class="station-desc">Louvor e Adoração</div>

        <div class="program-area">
            <div class="program-circle" id="programCircle">
                <img id="programImg" class="program-img" src="/image/logopraisefm.webp" alt="Program artwork">
            </div>
            <div class="program-label">
                <div class="program-status" id="programStatus"><span id="programTimeDisplay">--:-- - --:--</span></div>
                <div class="program-name" id="programNameDisplay">Praise FM</div>
                <div class="program-artists" id="programArtistsDisplay">Various Artists</div>
            </div>
        </div>

        <button class="play-btn" id="playPauseBtn" aria-label="Play / Pause">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
            <span id="playBtnText">Play</span>
        </button>

        <div class="recents-container">
            <div class="recents-title">Recently Played</div>
            <div id="recentsList"></div>
        </div>

    </div>

    <div class="bottom-player-bar" id="bottomPlayerBar">
        <div class="bar-program-info">
            <img src="/image/logopraisefm.webp" id="barProgramImg" class="bar-program-img" alt="Program">
            <div class="bar-program-text">
                <div class="bar-program-name" id="barProgramName">Praise FM</div>
                <div class="bar-program-artists" id="barProgramArtists">Various Artists</div>
            </div>
        </div>

        <div class="bar-controls">
            <div class="bar-seek-bar"><div class="bar-seek-progress" id="barSeekProgress"></div></div>
            <button class="bar-control-btn" id="barRewindBtn" title="Rewind 20s">⟲</button>
            <button class="bar-control-btn" id="barPlayPauseBtn" title="Play/Pause">▶</button>
            <button class="bar-control-btn" id="barForwardBtn" title="Forward 20s">⟳</button>

            <div class="bar-volume-container">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
                <input id="barVolumeSlider" class="bar-volume-slider" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
            </div>
            <div class="bar-live" id="barLive">LIVE</div>
        </div>
    </div>

<script>
/* --------------- CONFIG --------------- */
const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
const ZENO_ID = "hvwifp8ezc6tv";
const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";

/* Local images (make sure filenames exist in /image/) */
const IMG_DEFAULT = "/image/logopraisefm.webp";
const IMG_COMMERCIAL = "/image/commercial break.png";
const IMG_SPOT = "/image/spot.webp";
const IMG_MIDDAY_GRACE = "/image/middaygracelogo.webp";
const IMG_MIDNIGHT_GRACE = "/image/midnightgracelogo.webp";
const IMG_MORNING_SHOW = "/image/morningshowlogo.webp";
const IMG_CARPOOL = "/image/praisefmcarpoollogo.webp";
const IMG_CLASSIC = "/image/praisefmclassiclogo.webp";
const IMG_FUTURE_ARTISTS = "/image/praisefmfutureartistslogo.webp";
const IMG_POP = "/image/praisefmpoplogo.webp";
const IMG_SUNDAY_WITH_CHRIST = "/image/sundaywithchristlogo.webp";
const IMG_LIVING_THE_MESSAGE = "/image/livingthemessage.webp";
const IMG_NONSTOP = "/image/praisefmnonstop.webp";

/* --------------- DOM --------------- */
const programCircle = document.getElementById('programCircle');
const programImg = document.getElementById('programImg');
const programNameDisplay = document.getElementById('programNameDisplay');
const programArtistsDisplay = document.getElementById('programArtistsDisplay');
const programStatus = document.getElementById('programStatus');
const programTimeDisplay = document.getElementById('programTimeDisplay');

const playBtn = document.getElementById('playPauseBtn');
const playBtnText = document.getElementById('playBtnText');
const barPlayPauseBtn = document.getElementById('barPlayPauseBtn');
const barRewindBtn = document.getElementById('barRewindBtn');
const barForwardBtn = document.getElementById('barForwardBtn');
const barVolumeSlider = document.getElementById('barVolumeSlider');
const barSeekProgress = document.getElementById('barSeekProgress');
const bottomPlayerBar = document.getElementById('bottomPlayerBar');
const barProgramImg = document.getElementById('barProgramImg');
const barProgramName = document.getElementById('barProgramName');
const barProgramArtists = document.getElementById('barProgramArtists');
const recentsList = document.getElementById('recentsList');

/* --------------- STATE --------------- */
const audio = new Audio(STREAM_URL);
let isPlaying = false;
let progressInterval = null;
let progressType = null; // 'program' or 'song' or null
let totalDuration = 0;
let startTime = 0; // epoch ms when current progress started
const RECENTLY_PLAYED = [];
const MAX_RECENTS = 4;

/* --------------- Time helpers (Chicago) --------------- */
const TZ = "America/Chicago";
function nowChicago() {
    return new Date(new Date().toLocaleString("en-US", { timeZone: TZ }));
}
function hourChicago() { return nowChicago().getHours(); }
function dayChicago() { return nowChicago().getDay(); } // 0 Sun - 6 Sat
function toTimeString(h,m=0){ return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0'); }
function formatTimeRange(startH, endH){
    return `${toTimeString(startH)} - ${toTimeString(endH)}`;
}

/* --------------- PROGRAM SCHEDULE (priority checked top->bottom) ---------------
Rules implemented from your spec:
- Midnight Grace 00:00-06:00 (everyday)
- 06:00-07:00 music-only (no ring)
- Morning Show 07:00-12:00 (everyday) BUT Sunday With Christ replaces Morning Show on Sundays
- Living The Message: everyday at 09:00 (replay) and 10:00 (main) — 30 min each (insert into Morning Show)
- Midday Grace 12:00-18:00 (everyday) — but at 12:00 on certain days Future Artists / Classics (30 min) override
- Future Artists Mon/Wed/Fri at 12:00-12:30 and 20:00-20:30
- Classics Tue/Thu/Sat at 12:00-12:30 and 20:00-20:30
- Praise FM Non Stop 16:00-17:00 (music-only)
- Carpool Mon-Fri 18:00-20:00
- POP daily 22:00-22:30 (30 min)
- Sunday With Christ Sunday 07:00-12:00
All program entries that are "program" will have ring; music-only slots will not.
-----------------------------------------------------------------------------*/

const SCHEDULE = [
    // Specific short programs (30 mins) - dayOfWeek: array or null for everyday
    { name:"Future Artists", img:IMG_FUTURE_ARTISTS, days:[1,3,5], times:[ {start:12,end:12.5}, {start:20,end:20.5} ], durationMinutes:30, isProgram:true },
    { name:"Praise FM Classics", img:IMG_CLASSIC, days:[2,4,6], times:[ {start:12,end:12.5}, {start:20,end:20.5} ], durationMinutes:30, isProgram:true },
    { name:"Praise FM POP", img:IMG_POP, days:null, times:[ {start:22,end:22.5} ], durationMinutes:30, isProgram:true },

    // Living The Message (replay 09:00 and main 10:00) - 30 min each day
    { name:"Living The Message (Replay)", img:IMG_LIVING_THE_MESSAGE, days:null, times:[ {start:9,end:9.5} ], durationMinutes:30, isProgram:true },
    { name:"Living The Message", img:IMG_LIVING_THE_MESSAGE, days:null, times:[ {start:10,end:10.5} ], durationMinutes:30, isProgram:true },

    // Carpool Mon-Fri
    { name:"Praise FM Carpool", img:IMG_CARPOOL, days:[1,2,3,4,5], start:18, end:20, isProgram:true },

    // Sunday special
    { name:"Sunday With Christ", img:IMG_SUNDAY_WITH_CHRIST, days:[0], start:7, end:12, isProgram:true },

    // Regular long programs
    { name:"Midnight Grace", img:IMG_MIDNIGHT_GRACE, days:null, start:0, end:6, isProgram:true },
    // 06:00 - 07:00 music-only (handled below)
    { name:"Morning Show", img:IMG_MORNING_SHOW, days:null, start:7, end:12, isProgram:true },
    { name:"Midday Grace", img:IMG_MIDDAY_GRACE, days:null, start:12, end:18, isProgram:true },

    // Non stop music (16-17 music only)
    { name:"Praise FM Non Stop", img:IMG_NONSTOP, days:null, start:16, end:17, isProgram:false },

    // Carpool already above - duplicates avoided
];

/* --------------- Helper: determine current program --------------- */
function isTimeInRange(now, startHourFloat, endHourFloat) {
    // startHourFloat can be non-integer (e.g., 12.5 = 12:30)
    const h = now.getHours();
    const minutes = now.getMinutes();
    const currentFloat = h + (minutes/60);
    return currentFloat >= startHourFloat && currentFloat < endHourFloat;
}

function findScheduledProgram(now) {
    // Check specific entries with times array (30-min blocks) first (they are listed first in SCHEDULE)
    const day = now.getDay();
    for (const entry of SCHEDULE) {
        if (entry.times) {
            // times is array of {start,end}
            for (const t of entry.times) {
                if (isTimeInRange(now, t.start, t.end)) {
                    if (entry.days && !entry.days.includes(day)) continue;
                    return {
                        name: entry.name,
                        img: entry.img,
                        isProgram: !!entry.isProgram,
                        startFloat: t.start,
                        endFloat: t.end,
                        durationMs: (t.end - t.start) * 60 * 60 * 1000
                    };
                }
            }
        } else if (typeof entry.start === 'number' && typeof entry.end === 'number') {
            if (isTimeInRange(now, entry.start, entry.end)) {
                if (entry.days && !entry.days.includes(day)) continue;
                return {
                    name: entry.name,
                    img: entry.img,
                    isProgram: !!entry.isProgram,
                    startFloat: entry.start,
                    endFloat: entry.end,
                    durationMs: (entry.end - entry.start) * 60 * 60 * 1000
                };
            }
        }
    }

    // Special case: 06:00-07:00 music-only
    if (isTimeInRange(now, 6, 7)) {
        return { name: "Music", img: IMG_DEFAULT, isProgram:false, startFloat:6, endFloat:7, durationMs:0 };
    }

    // Default fallback if none found: show Praise FM (no ring)
    return { name: "Praise FM", img: IMG_DEFAULT, isProgram:false, startFloat:0, endFloat:24, durationMs:0 };
}

/* --------------- UI Update for current schedule --------------- */
function applyCurrentProgram() {
    const now = nowChicago();
    const program = findScheduledProgram(now);

    // set display text/time
    const start = program.startFloat;
    const end = program.endFloat;
    const startH = Math.floor(start);
    const startM = (start % 1) * 60;
    const endH = Math.floor(end);
    const endM = (end % 1) * 60;
    programTimeDisplay.innerText = `${String(startH).padStart(2,'0')}:${String(startM===0?0:startM).padStart(2,'0')} - ${String(endH).padStart(2,'0')}:${String(endM===0?0:endM).padStart(2,'0')}`;

    programNameDisplay.innerText = program.name;
    programArtistsDisplay.innerText = program.isProgram ? "Praise FM Hosts" : "Various Artists";
    barProgramName.innerText = program.name;
    barProgramArtists.innerText = program.isProgram ? "Praise FM Hosts" : "Various Artists";

    // images
    programImg.src = program.img || IMG_DEFAULT;
    barProgramImg.src = program.img || IMG_DEFAULT;

    // progress handling
    if (program.isProgram && program.durationMs > 0) {
        progressType = 'program';
        totalDuration = program.durationMs;
        // compute startTime as the start of that scheduled block TODAY in Chicago timezone
        const nowLocal = nowChicago();
        const startDate = new Date(nowLocal);
        startDate.setHours(Math.floor(program.startFloat), Math.round((program.startFloat % 1) * 60), 0, 0);
        startTime = startDate.getTime();
        programCircle.classList.add('is-playing');
        startProgressInterval();
    } else {
        // music-only or none
        progressType = null;
        totalDuration = 0;
        programCircle.classList.remove('is-playing');
        programCircle.style.setProperty('--progress-deg','0deg');
        barSeekProgress.style.width = '0%';
        if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
    }
}

/* --------------- Progress interval --------------- */
function startProgressInterval() {
    if (progressInterval) clearInterval(progressInterval);
    if (!totalDuration || !progressType) return;

    progressInterval = setInterval(() => {
        if (!isPlaying) return;
        const now = Date.now();
        const elapsed = now - startTime;
        const pct = Math.max(0, Math.min(1, elapsed / totalDuration)) * 100;
        if (progressType === 'program') {
            programCircle.style.setProperty('--progress-deg', `${pct*3.6}deg`);
            barSeekProgress.style.width = `${pct}%`;
        } else if (progressType === 'song') {
            barSeekProgress.style.width = `${pct}%`;
        }

        if (pct >= 100) {
            // program ended; refresh program UI (next program may begin)
            clearInterval(progressInterval);
            progressInterval = null;
            programCircle.classList.remove('is-playing');
            barSeekProgress.style.width = '0%';
            // apply next program immediately
            applyCurrentProgram();
        }
    }, 1000);
}

/* --------------- Recently played logic (only songs, keep 4) --------------- */
function updateRecents(track, artist, cover, timeAgo = "Now") {
    if (!track) return;
    const lowerArtist = (artist||"").toLowerCase();
    const lowerTrack = (track||"").toLowerCase();

    // Blocklist for non-music
    const blockKeywords = ["commercial","spot","station id","praise fm","break","ad","show","program"];
    if (blockKeywords.some(k => lowerArtist.includes(k) || lowerTrack.includes(k))) return;

    // Add to head if different from last
    if (RECENTLY_PLAYED.length > 0 && RECENTLY_PLAYED[0].title === track && RECENTLY_PLAYED[0].artist === artist) {
        // refresh timestamp
        RECENTLY_PLAYED[0].timeAgo = timeAgo;
        renderRecents();
        return;
    }

    RECENTLY_PLAYED.unshift({ title: track, artist: artist, cover: cover || IMG_DEFAULT, timeAgo });
    if (RECENTLY_PLAYED.length > MAX_RECENTS) RECENTLY_PLAYED.splice(MAX_RECENTS);

    renderRecents();
}

function renderRecents() {
    recentsList.innerHTML = "";
    RECENTLY_PLAYED.forEach(item=>{
        const el = document.createElement('div');
        el.className = 'recent-item';
        el.innerHTML = `
            <img class="recent-cover" src="${item.cover}" alt="cover">
            <div class="recent-info">
                <div class="recent-title">${item.title}</div>
                <div class="recent-artist">${item.artist}</div>
            </div>
            <div class="recent-time">${item.timeAgo}</div>
        `;
        recentsList.appendChild(el);
    });
}

/* --------------- Metadata processing (Zeno & LastFM) --------------- */
async function processMetadata(artist, track) {
    // Basic sanitization
    artist = (artist||"").trim();
    track = (track||"").trim();

    // Block non-music names quickly
    const blockLower = ["commercial","spot","station id","ad break","praise fm"];
    const key = (artist + " " + track).toLowerCase();
    if (!track || blockLower.some(k => key.includes(k))) {
        // Show program art if current schedule is a program; else station art
        applyCurrentProgram();
        return;
    }

    // Try fetching cover + duration from Last.fm
    let cover = IMG_DEFAULT;
    let durationMs = 210000; // default 3.5 min
    try {
        const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`);
        const data = await res.json();
        if (data && data.track) {
            if (data.track.duration) {
                durationMs = parseInt(data.track.duration) || durationMs;
            }
            if (data.track.album && data.track.album.image) {
                // pick largest available
                const imgObj = data.track.album.image.find(i=>i.size==='extralarge') || data.track.album.image.slice(-1)[0];
                if (imgObj && imgObj['#text']) cover = imgObj['#text'];
            }
        }
    } catch(e){
        console.warn("LastFM fetch failed", e);
    }

    // Update UI for song
    programImg.src = cover || IMG_DEFAULT;
    barProgramImg.src = cover || IMG_DEFAULT;
    programNameDisplay.innerText = track;
    barProgramName.innerText = track;
    programArtistsDisplay.innerText = artist || "Unknown";
    barProgramArtists.innerText = artist || "Unknown";

    // set song progress
    progressType = 'song';
    totalDuration = durationMs;
    startTime = Date.now();
    programCircle.classList.remove('is-playing');
    programCircle.style.setProperty('--progress-deg','0deg');
    startProgressInterval();

    // add to recently played (only music)
    updateRecents(track, artist, cover, "Now");
}

/* --------------- Zeno eventsource metadata --------------- */
function setupZeno() {
    try {
        const es = new EventSource(`https://api.zeno.fm/mounts/metadata/subscribe/${ZENO_ID}`);
        es.onmessage = function(e){
            try {
                const d = JSON.parse(e.data);
                if (d.streamTitle) {
                    // assume "Artist - Track" or sometimes "Artist - Title - extra"
                    const parts = d.streamTitle.split(' - ');
                    const artist = parts[0]?.trim() || "";
                    const track = parts.slice(1).join(' - ').trim() || "";
                    // Process
                    processMetadata(artist, track);
                }
            } catch(err){}
        };
        es.onerror = function(){ /* silent */ };
    } catch(e) {
        console.warn("EventSource not available:", e);
    }
}

/* --------------- Audio controls and UI wiring --------------- */
function updatePlayUI(isNowPlaying){
    if (isNowPlaying) {
        playBtnText.innerText = "Pause";
        barPlayPauseBtn.innerText = "❚❚";
    } else {
        playBtnText.innerText = "Play";
        barPlayPauseBtn.innerText = "▶";
    }
}

function togglePlayPause(){
    if (!isPlaying) {
        if (audio.src !== STREAM_URL) audio.src = STREAM_URL;
        audio.play().then(()=>{
            isPlaying = true;
            updatePlayUI(true);
            bottomPlayerBar.style.display = "flex";
            // If currently a program active, ensure progress runs
            if (progressType === 'program' || progressType === 'song') startProgressInterval();
        }).catch(e=>{
            console.warn("Play failed:", e);
        });
    } else {
        audio.pause();
        isPlaying = false;
        updatePlayUI(false);
        // Pause progress
    }
}

playBtn.addEventListener('click', togglePlayPause);
barPlayPauseBtn.addEventListener('click', togglePlayPause);

barRewindBtn.addEventListener('click', ()=> {
    try { audio.currentTime = Math.max(0, (audio.currentTime || 0) - 20); startTime += 20000; } catch(e){}
});
barForwardBtn.addEventListener('click', ()=> {
    try { audio.currentTime = (audio.currentTime || 0) + 20; startTime -= 20000; } catch(e){}
});

barVolumeSlider.addEventListener('input', (e)=> {
    audio.volume = Number(e.target.value);
});

/* reconnect on stream error */
audio.addEventListener('error', ()=>{
    console.warn("Stream error, retrying in 3s...");
    setTimeout(()=>{ audio.src = STREAM_URL; if (isPlaying) audio.play().catch(()=>{}); }, 3000);
});

/* --------------- Init & periodic checks --------------- */
function init(){
    // initial UI program
    applyCurrentProgram();
    renderRecents();

    // setup zeno metadata
    setupZeno();

    // every 15s check schedule to pick up new program start/stop
    setInterval(applyCurrentProgram, 15000);
}

init();

</script>
