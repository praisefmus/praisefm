<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praise FM U.S. — Live Player</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #111;
      text-align: center;
    }

    .container {
      max-width: 450px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    #currentSubtitle {
      font-size: 15px;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    #coverImg {
      width: 270px;
      height: 270px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.15);
      margin-bottom: 15px;
      transition: opacity .3s;
    }

    #playBtn {
      margin-top: 10px;
      padding: 10px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #005eff;
      color: #fff;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.7;
    }

    #volumeSlider {
      width: 150px;
      margin: 10px 0;
    }

    .history-title {
      margin-top: 25px;
      font-weight: bold;
      font-size: 18px;
    }

    #historyList {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .history-img img {
      width: 50px;
      height: 50px;
      border-radius: 6px;
      object-fit: cover;
    }

    .history-text {
      text-align: left;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Praise FM U.S.</h1>
    <div id="currentSubtitle">Your home for worship & praise</div>

    <img id="coverImg" src="image/logopraisefm.webp" alt="Cover Art" />

    <div id="currentTitle">LIVE NOW</div>
    <div id="status">Loading...</div>

    <button id="playBtn">▶ Play</button>
    <br>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">

    <div class="history-title">Recently Played</div>
    <ul id="historyList"></ul>

    <audio id="radioPlayer"></audio>
  </div>

  <script src="script.js"></script>

</body>
</html>
