<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Praise FM - Live & On Demand</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0RNK6G5WWL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0RNK6G5WWL');
    </script>
    
    <link rel="icon" type="image/png" sizes="32x32" href="./image/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./image/favicon-16x16.png">
    <link rel="shortcut icon" type="image/x-icon" href="./image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="./image/apple-touch-icon.png">

    <style>
        /* --- CSS --- */
        :root {
            --primary-color: #fff;
            --secondary-color: #e0e0e0; /* Texto secundário mais claro para contraste */
            --accent-color: #ff4d00;
            --bg-dark: #121212;
            --glass-bg: rgba(20, 20, 20, 0.6); /* Fundo mais escuro para o card da música */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--primary-color);
        }

        .background-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 30%, #222, #000);
            filter: blur(90px); 
            opacity: 0.6; 
            transition: background 1s ease;
        }

        .player-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 24px;
            position: relative;
            max-width: 100%;
            /* Sombra de texto para legibilidade sem o box de fundo */
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* --- 1. CÍRCULO DO PROGRAMA --- */
        .program-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 20px; 
        }

        .program-circle {
            width: min(70vw, 280px); 
            height: min(70vw, 280px);
            border-radius: 50%;
            background-color: #000;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            --progress-deg: 0deg;
        }

        .program-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #111; 
            position: relative; z-index: 2;
        }

        /* Anel de Progresso */
        .program-circle.is-playing::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 50%;
            z-index: -1;
            background: conic-gradient(
                var(--accent-color) var(--progress-deg), 
                rgba(255, 255, 255, 0.05) var(--progress-deg)
            );
            -webkit-mask: radial-gradient(transparent 68%, black 69%);
            mask: radial-gradient(transparent 68%, black 69%);
            transition: --progress-deg 1s linear;
        }

        .program-label { margin-top: 30px; text-align: center; opacity: 0; animation: fadeIn 1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .program-name { font-size: clamp(22px, 5vw, 32px); font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .program-status { font-size: 13px; color: var(--accent-color); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; text-shadow: none; }
        .live-dot { width: 8px; height: 8px; background-color: var(--accent-color); border-radius: 50%; box-shadow: 0 0 10px var(--accent-color); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        /* --- 2. CONTROLES --- */
        .controls-area {
            width: 100%; display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 30px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); /* Sombra nos ícones */
        }
        .control-btn { background: none; border: none; color: #fff; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center;}
        .control-btn:active { transform: scale(0.9); }
        
        .play-btn { 
            width: 80px; height: 80px; 
            background: var(--accent-color); 
            border-radius: 50%; 
            box-shadow: 0 10px 25px rgba(255, 77, 0, 0.3); 
            color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .play-btn svg { width: 36px; height: 36px; fill: white; }
        .play-btn svg.play-icon { margin-left: 6px; }
        
        .skip-btn svg { width: 32px; height: 32px; opacity: 0.8; }
        .skip-btn:hover svg { opacity: 1; }

        /* --- 3. CARTÃO "NOW PLAYING" --- */
        .now-playing-card {
            width: 100%; max-width: 500px;
            background-color: var(--glass-bg); /* Fundo semi-transparente */
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; padding: 15px 20px; 
            display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .song-cover { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; background-color: #333; margin-right: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .song-info { flex: 1; overflow: hidden; text-shadow: none; }
        .song-title { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; margin-bottom: 4px; }
        .song-artist { font-size: 15px; color: var(--secondary-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lyrics-btn { opacity: 0.7; cursor: pointer; background:none; border:none; color:white; padding: 10px; transition: opacity 0.2s; }
        .lyrics-btn:hover { opacity: 1; }

        /* --- EXTRAS (Volume) --- */
        .volume-container { width: 90%; max-width: 400px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; opacity: 0.9; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .volume-slider { flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.3); height: 6px; border-radius: 3px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        /* --- DATA E HORA --- */
        .datetime-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.15); /* Borda sutil */
            margin-top: auto; 
        }
        .date-display {
            font-size: 14px;
            color: var(--secondary-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .clock-display {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-color);
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        /* --- DESKTOP (SEM RETÂNGULO) --- */
        @media (min-width: 768px) {
            /* Removemos a imagem de fundo de pattern para ficar mais limpo */
            body { background-color: #050505; }

            .player-container { 
                max-width: 800px; /* Mais largo para respirar */
                height: 95vh; 
                max-height: 1200px; 
                
                /* AQUI ESTÁ A MUDANÇA: FUNDO TRANSPARENTE E SEM BORDA */
                background-color: transparent; 
                border: none;
                box-shadow: none;
                backdrop-filter: none; 
                
                justify-content: space-between; 
                gap: 20px; 
                padding-bottom: 40px;
            }

            .program-area { margin-top: 60px; }
            .program-circle { width: 400px; height: 400px; } /* Círculo bem grande */
            .program-circle.is-playing::before { top: -12px; left: -12px; right: -12px; bottom: -12px; }
            
            .program-name { font-size: 48px; margin-bottom: 15px; } /* Texto maior */
            .program-status { font-size: 16px; }
            
            .play-btn { width: 100px; height: 100px; }
            .play-btn svg { width: 45px; height: 45px; }
            
            .now-playing-card { max-width: 650px; padding: 25px 35px; }
            .song-cover { width: 90px; height: 90px; }
            .song-title { font-size: 24px; }
            .song-artist { font-size: 20px; }
            
            .clock-display { font-size: 48px; }
            .date-display { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="background-blur" id="bgBlur"></div>

    <div class="player-container">
        
        <div class="program-area">
            <div class="program-circle" id="programCircle">
                <img src="/image/logopraisefm.webp" id="programImg" class="program-img" alt="Program Logo">
            </div>
            <div class="program-label">
                <div class="program-status"><div class="live-dot"></div> LIVE ON AIR</div>
                <div class="program-name" id="programNameDisplay">Praise FM</div>
            </div>
        </div>

        <div class="controls-area">
            <button class="control-btn skip-btn" onclick="skip(-15)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
            </button>
            
            <button class="control-btn play-btn" id="playPauseBtn">
                <svg id="iconPlay" class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" class="pause-icon" style="display:none;" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <button class="control-btn skip-btn" onclick="skip(15)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
            </button>
        </div>

        <div class="now-playing-card">
            <img src="/image/logopraisefm.webp" id="songCover" class="song-cover" alt="Song Cover">
            <div class="song-info">
                <div class="song-title" id="trackTitle">Loading...</div>
                <div class="song-artist" id="trackArtist">Praise FM</div>
            </div>
            <button class="lyrics-btn" id="lyricsBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </button>
        </div>

        <div class="volume-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
        </div>

        <div class="datetime-container">
            <div class="date-display" id="dateDisplay">Loading Date...</div>
            <div class="clock-display" id="clockDisplay">--:--</div>
        </div>

    </div>
    
    <canvas id="colorCanvas" style="display:none;"></canvas>

    <script>
        // --- CONFIGURAÇÕES ---
        const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
        const ZENO_ID = "hvwifp8ezc6tv"; 
        const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";

        // --- IMAGENS LOCAIS ---
        const IMG_DEFAULT = "/image/logopraisefm.webp"; 
        const IMG_COMMERCIAL = "/image/commercial break.png"; 
        const IMG_SPOT = "/image/spot.webp";

        // LOGOS DE PROGRAMAS 
        const IMG_MIDDAY_GRACE = "/image/middaygracelogo.webp"; 
        const IMG_MIDNIGHT_GRACE = "/image/midnightgracelogo.webp";
        const IMG_MORNING_SHOW = "/image/morningshowlogo.webp";
        const IMG_CARPOOL = "/image/praisefmcarpoollogo.webp"; 
        const IMG_CLASSIC = "/image/praisefmclassiclogo.webp";
        const IMG_FUTURE_ARTISTS = "/image/praisefmfutureartistslogo.webp";
        const IMG_POP = "/image/praisefmpoplogo.webp";
        const IMG_SUNDAY_MORNING = "/image/sundaymorninglogo.webp";

        // --- DOM ELEMENTS ---
        const audio = new Audio(STREAM_URL);
        const playBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const programCircle = document.getElementById('programCircle');
        const programImg = document.getElementById('programImg');
        const programNameDisplay = document.getElementById('programNameDisplay');
        const songCover = document.getElementById('songCover');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const bgBlur = document.getElementById('bgBlur');
        const colorCanvas = document.getElementById('colorCanvas');
        const ctx = colorCanvas.getContext('2d', {willReadFrequently: true});
        
        const dateDisplay = document.getElementById('dateDisplay');
        const clockDisplay = document.getElementById('clockDisplay');

        let isPlaying = false;
        let progressInterval = null; 

        // --- RELÓGIO E DATA CHICAGO ---
        function updateChicagoTime() {
            const now = new Date();
            const optionsTime = { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true };
            const timeString = now.toLocaleTimeString('en-US', optionsTime);
            const optionsDate = { timeZone: 'America/Chicago', weekday: 'long', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', optionsDate);

            clockDisplay.innerText = timeString;
            dateDisplay.innerText = dateString;
        }

        // --- ATUALIZAÇÃO VISUAL ---
        function updateDisplay(programImage, programName, songImage, songTitle, songArtist, isMusicalTrack, durationMs = 0) {
            // 1. Círculo do Programa
            if (programImg.src !== programImage && !programImg.src.endsWith(programImage)) {
                programImg.src = programImage;
            }
            programNameDisplay.innerText = programName;

            // 2. Cartão da Música
            let safeSongImage = songImage;
            if (!songImage.startsWith('/image/') && !songImage.startsWith('data:')) {
                safeSongImage = 'https://corsproxy.io/?' + encodeURIComponent(songImage);
            }
            if (songCover.src !== safeSongImage && !songCover.src.endsWith(safeSongImage)) {
                songCover.src = safeSongImage;
                updateBackground(safeSongImage);
            }
            trackTitle.innerText = songTitle;
            trackArtist.innerText = songArtist;

            // 3. Anel de Progresso
            if (progressInterval) clearInterval(progressInterval);
            
            if (isMusicalTrack) {
                programCircle.classList.add('is-playing');
                startProgressMonitor(durationMs);
            } else {
                programCircle.classList.remove('is-playing');
                programCircle.style.setProperty('--progress-deg', '0deg');
            }
        }

        // --- FUNÇÃO DO ANEL ---
        function startProgressMonitor(durationMs) {
            const totalDuration = durationMs > 0 ? durationMs : 210000; 
            const startTime = Date.now();

            progressInterval = setInterval(() => {
                if (!isPlaying) return; 

                const elapsed = Date.now() - startTime;
                const percentage = Math.min(elapsed / totalDuration, 1); 
                const degrees = percentage * 360;

                programCircle.style.setProperty('--progress-deg', `${degrees}deg`);

                if (percentage >= 1) {
                    clearInterval(progressInterval);
                }
            }, 1000);
        }

        // --- FUNDO COLORIDO ---
        function updateBackground(imgUrl) {
            if(imgUrl.includes('/image/')) {
                bgBlur.style.background = `radial-gradient(circle at 50% 30%, #222, #000)`;
                return;
            }
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = imgUrl;
            img.onload = () => {
                try {
                    colorCanvas.width = 1; colorCanvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1);
                    const [r,g,b] = ctx.getImageData(0,0,1,1).data;
                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, rgb(${r},${g},${b}), #000)`;
                } catch(e) {}
            }
        }

        // --- LÓGICA PRINCIPAL ---
        async function processMetadata(artist, track) {
            const artistLow = artist.toLowerCase();
            const trackLow = track.toLowerCase();
            
            let currentProgramImg = IMG_DEFAULT;
            let currentProgramName = "Praise FM"; 
            let currentSongImg = IMG_DEFAULT;
            let isMusic = true;
            let songDuration = 0; 

            console.log(`Zeno: ${artist} - ${track}`);

            const programMap = {
                "midday": [IMG_MIDDAY_GRACE, "Midday Grace"],
                "mid-day": [IMG_MIDDAY_GRACE, "Midday Grace"],
                "midnight": [IMG_MIDNIGHT_GRACE, "Midnight Grace"],
                "morning show": [IMG_MORNING_SHOW, "The Morning Show"],
                "carpool": [IMG_CARPOOL, "Carpool"],
                "classic": [IMG_CLASSIC, "Praise FM Classic"],
                "future": [IMG_FUTURE_ARTISTS, "Future Artists"],
                "pop": [IMG_POP, "Praise FM Pop"],
                "sunday": [IMG_SUNDAY_MORNING, "Sunday Morning"]
            };

            let foundProgram = false;
            for (const key in programMap) {
                if (artistLow.includes(key) || trackLow.includes(key)) {
                    currentProgramImg = programMap[key][0];
                    currentProgramName = programMap[key][1];
                    currentSongImg = programMap[key][0];
                    isMusic = false; 
                    foundProgram = true;
                    break;
                }
            }

            if (trackLow.includes("commercial") || trackLow.includes("ad break")) {
                updateDisplay(IMG_COMMERCIAL, "Commercial Break", IMG_COMMERCIAL, "Commercial Break", "Praise FM", false);
                return;
            }
            if (trackLow.includes("station id") || trackLow.includes("spot")) {
                updateDisplay(IMG_SPOT, "Station ID", IMG_SPOT, "Station ID", "Praise FM", false);
                return;
            }

            if (foundProgram) {
                updateDisplay(currentProgramImg, currentProgramName, currentSongImg, track, artist, false);
                return;
            }

            try {
                const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`);
                const data = await res.json();
                
                if (data.track) {
                    if (data.track.album && data.track.album.image) {
                        const img = data.track.album.image.find(i => i.size === 'extralarge')['#text'];
                        if (img) {
                            currentSongImg = img;
                            currentProgramImg = img; 
                        }
                    }
                    if (data.track.duration) {
                        songDuration = parseInt(data.track.duration);
                    }
                }
            } catch(e) { console.log("Erro LastFM", e); }

            updateDisplay(currentProgramImg, "Praise FM", currentSongImg, track, artist, true, songDuration);
        }

        // --- CONTROLES DE ÁUDIO ---
        audio.addEventListener('error', (e) => {
            console.log("Erro no stream, tentando reconectar...");
            setTimeout(() => {
                audio.src = STREAM_URL;
                audio.play().catch(e => console.log("Autoplay bloqueado"));
            }, 3000);
        });

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            } else {
                if (audio.src !== STREAM_URL) audio.src = STREAM_URL;
                audio.play().then(() => {
                    isPlaying = true;
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                }).catch(e => {
                    console.error("Autoplay prevented", e);
                    trackTitle.innerText = "Click to Play";
                });
            }
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => { audio.volume = e.target.value; });

        document.getElementById('lyricsBtn').addEventListener('click', () => {
            const q = `${trackArtist.innerText} ${trackTitle.innerText}`;
            window.open(`https://genius.com/search?q=${encodeURIComponent(q)}`, '_blank');
        });

        function setupZeno() {
            const es = new EventSource(`https://api.zeno.fm/mounts/metadata/subscribe/${ZENO_ID}`);
            es.onmessage = (e) => {
                try {
                    const d = JSON.parse(e.data);
                    if (d.streamTitle) {
                        const [artist, song] = d.streamTitle.split(' - ');
                        processMetadata(artist?.trim() || "Praise FM", song?.trim() || "");
                    }
                } catch(err) {}
            };
        }

        function skip(sec) {}

        setupZeno();
        setInterval(updateChicagoTime, 1000);
        updateChicagoTime(); 
    </script>
</body>
</html>
