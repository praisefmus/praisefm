<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praise FM U.S. — Listen Live</title>

  <!-- SEO & tema -->
  <meta name="description" content="Listen live to Praise FM U.S. — Praise & Worship Radio." />
  <meta name="theme-color" content="#ff527c" />

  <!-- FAVICONS -->
  <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/praisefmus/praisefm/main/image/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/praisefmus/praisefm/main/image/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/praisefmus/praisefm/main/image/apple-touch-icon.png" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0RNK6G5iWL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0RNK6G5iWL');
  </script>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Ícones -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />

  <!-- CSS Externo -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <div class="container">
      <header class="header">
        <button
          class="favorite-btn"
          id="favoriteBtn"
          title="Favorite this song"
          aria-label="Favorite this song"
          aria-pressed="false"
        >☆</button>
      </header>
      <section class="content">
        <h1 class="station-title">Praise FM U.S.</h1>
        <p class="station-desc">Praise & Worship</p>
        <figure class="show-image" id="showImage" role="img" aria-label="Album cover">
          <img
            id="coverImg"
            src=""
            alt="Current song album cover"
            width="200"
            height="200"
            loading="lazy"
          />
        </figure>
        <div class="show-info">
          <span class="live-indicator">LIVE • <span id="currentTime">—</span></span>
          <h2 class="show-title">
            <span id="currentTitle">Loading...</span>
          </h2>
          <p class="show-date" id="currentDate">—</p>
        </div>
        <button
          class="play-button"
          id="playBtn"
          aria-label="Play or pause radio"
          aria-pressed="false"
        >▶ Play</button>
        <div class="volume-control">
          <label for="volumeSlider" class="sr-only">Adjust volume</label>
          <i class="fas fa-volume-up" aria-hidden="true"></i>
          <input
            type="range"
            class="volume-slider"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="0.7"
            aria-valuemin="0"
            aria-valuemax="1"
            aria-valuenow="0.7"
            role="slider"
          />
        </div>
        <section class="history-section">
          <h3 class="history-title">Recently Played</h3>
          <ul class="history-list" id="historyList" role="list">
            <li style="text-align:center;color:#666;padding:16px;">No songs yet...</li>
          </ul>
        </section>
        <footer class="status" id="status">Connecting to stream... • Real-time updates</footer>
      </section>
    </div>
  </main>

  <audio id="radioPlayer" preload="auto" aria-hidden="true"></audio>

  <!-- JS Externo -->
  <script src="script.js" defer></script>
</body>
</html>
