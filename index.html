<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praise FM — Praise & Worship</title>

<style>
:root {
  --accent: #ff5a00;
  --text: #ffffff;
  --bg: #000000;
  --subtext: #cccccc;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: var(--bg);
  color: var(--text);
}

/* ---------- CIRCLE PROGRAM / MUSIC ---------- */
.program-circle {
  position: relative;
  width: clamp(240px, 26vw, 340px);
  height: clamp(240px, 26vw, 340px);
  margin: 40px auto 10px;
}

.program-img,
.music-img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  position: relative;
  z-index: 2;
}

/* PROGRESS RING */
.progress-ring {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  transform: rotate(-90deg);
  z-index: 1;
}
.progress-ring circle {
  fill: transparent;
  stroke: var(--accent);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear;
}

/* NOW PLAYING TEXT */
#nowPlaying {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 10px;
  overflow: hidden;
  white-space: nowrap;
  width: 90%;
  margin-left: auto;
  margin-right: auto;
}

.marquee {
  display: inline-block;
  animation: scroll-left 12s linear infinite;
}

@keyframes scroll-left {
  from { transform: translateX(100%); }
  to   { transform: translateX(-100%); }
}

/* ---------- PLAYER BUTTON ---------- */
#playBtn {
  background: var(--accent);
  border: none;
  padding: 18px 32px;
  border-radius: 40px;
  font-size: 18px;
  color: #fff;
  cursor: pointer;
  margin: 10px auto;
  display: block;
}

/* ---------- RECENTLY PLAYED BBC STYLE ---------- */
#recently {
  width: 94%;
  margin: 20px auto;
  text-align: left;
}
.recent-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid #222;
  font-size: 14px;
}
.recent-item img {
  width: 46px;
  height: 46px;
  border-radius: 8px;
  object-fit: cover;
  background: #111;
}

/* ---------- BOTTOM PLAYER BBC ---------- */
#bottomPlayer {
  position: fixed;
  bottom: -120px;
  left: 0;
  width: 100%;
  background: #111;
  height: 120px;
  display: flex;
  align-items: center;
  gap: 14px;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s ease;
  border-top: 3px solid var(--accent);
}

#bottomPlayer.active {
  bottom: 0;
  opacity: 1;
  pointer-events: auto;
}

#bottomImg {
  width: 90px;
  height: 90px;
  border-radius: 8px;
  object-fit: cover;
  margin-left: 8px;
}

#bottomTitle {
  font-size: 16px;
  white-space: nowrap;
  overflow: hidden;
  width: 180px;
}

#volume {
  width: 100px;
}

audio { display: none; }
</style>
</head>

<body>

<h2 id="programTitle">Morning Show</h2>

<div class="program-circle">
  <svg class="progress-ring">
    <circle id="progressStroke" r="50%" cx="50%" cy="50%"></circle>
  </svg>
  <img id="circleImg" class="program-img" src="/image/morningshowlogo.webp">
</div>

<div id="nowPlaying"><span class="marquee">Carregando...</span></div>

<button id="playBtn">▶ Play</button>

<h3>Recent Tracks</h3>
<div id="recently"></div>

<!-- BOTTOM BBC PLAYER -->
<div id="bottomPlayer">
  <img id="bottomImg" src="/image/morningshowlogo.webp">
  <div id="bottomTitle"><span class="marquee">Praise FM — Live Stream</span></div>
  <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
</div>

<audio id="audio" src="https://stream.zeno.fm/hvwifp8ezc6tv"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const bottomPlayer = document.getElementById("bottomPlayer");
const circleImg = document.getElementById("circleImg");
const bottomImg = document.getElementById("bottomImg");
const nowPlayingEl = document.getElementById("nowPlaying");
const recentContainer = document.getElementById("recently");

const programs = [
  { name:"Morning Show",start:7,end:12,img:"/image/morningshowlogo.webp" },
  { name:"Midday Grace",start:12,end:18,img:"/image/midday.webp" }
];

function nowChicago(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Chicago"}));
}

function currentProgram(){
  const now = nowChicago();
  const h = now.getHours() + now.getMinutes()/60;
  return programs.find(p => h>=p.start && h<p.end) || null;
}

function applyProgram(){
  const p = currentProgram();
  if(p){
    document.getElementById("programTitle").textContent = p.name;
    circleImg.src = p.img;
  }
}

function updateProgress(){
  const p = currentProgram();
  const ring = document.querySelector(".progress-ring");
  const stroke = document.getElementById("progressStroke");
  if(!p){
    ring.style.display="none";
    return;
  }
  ring.style.display="block";
  const now = nowChicago();
  const h = now.getHours()+now.getMinutes()/60;
  const progTime=(p.end-p.start)*60;
  const elapsed=((h-p.start)*60);
  let progress=Math.min(Math.max(elapsed/progTime,0),1);
  const radius=circleImg.offsetWidth/2-6;
  const circ=2*Math.PI*radius;
  stroke.setAttribute("r",radius);
  stroke.setAttribute("cx",circleImg.offsetWidth/2);
  stroke.setAttribute("cy",circleImg.offsetHeight/2);
  stroke.style.strokeDasharray=`${circ} ${circ}`;
  stroke.style.strokeDashoffset=circ-progress*circ;
}

function handleMetadata(track="Live", artist="Praise FM", cover="/image/morningshowlogo.webp"){
  nowPlayingEl.innerHTML = `<span class="marquee">${artist} — ${track}</span>`;
  bottomImg.src = cover;
  const rItem = document.createElement("div");
  rItem.className="recent-item";
  rItem.innerHTML = `<img src="${cover}"><span>${artist} — ${track}</span>`;
  recentContainer.prepend(rItem);
  if(recentContainer.children.length>4) recentContainer.removeChild(recentContainer.lastChild);
}

setInterval(()=>{
  applyProgram();
  updateProgress();
  handleMetadata("Sample Track","Unknown Artist","/image/morningshowlogo.webp");
},60000);

playBtn.addEventListener("click",()=>{
  audio.play();
  bottomPlayer.classList.add("active");
});
</script>

</body>
</html>
