    <style>
        /* --- CSS (DESIGN - DEFAULT) --- */
        :root {
            --primary-color: #fff;
            --secondary-color: rgba(255, 255, 255, 0.6);
            --accent-color: #ff3b30; /* Laranja/Vermelho (Cor do Anel) */
            --bg-dark: #1c1c1e;
            --bg-gradient-2: #282828; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--primary-color);
        }

        .background-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 30%, var(--bg-gradient-2), #000);
            filter: blur(60px); 
            opacity: 0.8; 
            transition: background 1s ease;
            background-image: linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 1px 1px;
        }

        .player-container {
            width: 100%; max-width: 380px; height: 100%; max-height: 800px;
            padding: 20px 24px; display: flex; flex-direction: column;
            justify-content: flex-start; 
            position: relative; overflow: hidden;
        }

        .top-bar { display: flex; justify-content: center; padding-bottom: 10px; }
        .grip { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; }


        /* --- NOVO LAYOUT DE ARTE E LOGO --- */

        .media-area {
            width: 100%;
            margin-top: 30px; 
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 1. LOGO DO PROGRAMA (GRANDE E REDONDO) */
        .program-logo-container {
            width: 180px; 
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background-color: #1a1a1a;
            margin-bottom: 30px;
            position: relative; /* ESSENCIAL para o anel */
        }

        /* --- Rotating Ring Indicator (Laranja Rodando) - REFORÇADO E CORRIGIDO --- */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .program-logo-container.is-song-playing::before {
            content: '';
            position: absolute;
            top: -12px; /* Aumenta o afastamento */
            left: -12px;
            right: -12px;
            bottom: -12px;
            border: 12px solid transparent; /* Aumenta a espessura da borda */
            border-top-color: var(--accent-color); 
            border-right-color: var(--accent-color); 
            border-radius: 50%;
            animation: spin 1.5s linear infinite; /* Rotação mais rápida */
            z-index: 0;
            opacity: 1; /* Garante visibilidade total */
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.7); /* Adiciona um brilho */
            transition: all 0.3s ease;
        }

        .program-logo-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: relative; 
            z-index: 1;
            transition: opacity 0.3s ease;
        }


        /* 2. ARTE DA MÚSICA ATUAL (MINIATURA) */
        .artwork-container {
            display: flex; 
            width: 100%; 
            height: 60px; 
            padding: 10px;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.05); 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            
            transform: scale(1);
            opacity: 1;
        }

        .artwork-container.paused { 
            transform: scale(1);
            opacity: 1;
        }

        .artwork-img { 
            width: 40px; 
            height: 40px; 
            object-fit: cover; 
            border-radius: 4px;
            margin-right: 15px;
            transition: opacity 0.5s ease; 
        }


        /* 3. INFO DA MÚSICA (DENTRO DA MINIATURA) */
        .track-info-mini {
            flex: 1; 
            overflow: hidden; 
            white-space: nowrap;
        }

        .song-title-mini { 
            font-size: 16px; 
            font-weight: 600; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .artist-name-mini { 
            font-size: 14px; 
            color: var(--secondary-color); 
            font-weight: 400; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* 4. BOTÃO DE LETRAS DENTRO DO NOVO CONTÊINER */
        .more-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            color: var(--primary-color); 
            padding: 5px; 
            font-size: 20px; 
            transition: color 0.3s; 
        }
        .more-btn:hover { color: var(--accent-color); }


        /* INFO (ÁREA CENTRAL QUE CONTINUA) */
        .track-info { 
            display: none; 
        }

        /* PROGRESS */
        .progress-area { margin-bottom: 10px; position: relative; padding-top: 20px; } 
        .progress-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--accent-color); border-radius: 2px; transition: width 0.1s linear; }
        .seek-slider { position: absolute; top: 15px; width: 100%; height: 15px; opacity: 0; cursor: pointer; }

        .time-info { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--secondary-color); margin-top: 8px; font-weight: 600; }

        /* LIVE BADGE */
        @keyframes pulse-red { 0% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); } 50% { opacity: 0.5; text-shadow: none; } 100% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); } }
        .live-badge { color: var(--accent-color); font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; background-color: var(--accent-color); border-radius: 50%; animation: pulse-red 2s infinite; }
        .chicago-time { font-variant-numeric: tabular-nums; }

        /* CONTROLS */
        .controls { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .control-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .control-btn:active { transform: scale(0.9); }
        .play-btn { width: 70px; height: 70px; }
        .skip-btn { width: 40px; }

        /* VOLUME */
        .volume-area { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .volume-track { flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; position: relative; }
        .volume-fill { position: absolute; height: 100%; background: #fff; border-radius: 3px; width: 80%; }
        .volume-slider { position: absolute; width: 100%; height: 100%; top:0; opacity:0; cursor:pointer; }

        /* FOOTER */
        .bottom-icons { display: flex; justify-content: space-around; color: var(--secondary-color); z-index: 10; margin-top: auto; } 
        .bottom-icon { cursor: pointer; padding: 10px; }

        /* --- DRAWER MENU (ON DEMAND) --- */
        .drawer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            transform: translateY(110%); transition: transform 0.3s ease-out;
            z-index: 20; display: flex; flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .drawer.open { transform: translateY(0); }
        
        .drawer-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .drawer-title { font-weight: 700; font-size: 18px; }
        .close-drawer { background: none; border: none; color: var(--accent-color); font-size: 16px; font-weight: 600; cursor: pointer; }

        .episode-list { flex: 1; overflow-y: auto; padding: 0 20px; }
        .episode-item {
            display: flex; align-items: center; padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .ep-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; margin-right: 15px; }
        .ep-info { flex: 1; }
        .ep-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .ep-desc { font-size: 12px; color: var(--secondary-color); }

        .back-to-live {
            display: none;
            margin-top: 5px;
            background-color: rgba(255, 59, 48, 0.2);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px; 
            align-self: flex-start;
        }
        
        svg { fill: currentColor; }

        /* --- Media Query para Telas de PC (Desktop/Laptops) --- */
        @media (min-width: 600px) {
            
            .player-container {
                max-width: 500px; 
                max-height: 90vh; 
                padding: 40px; 
                border-radius: 20px; 
                background-color: rgba(0, 0, 0, 0.2); 
                backdrop-filter: blur(15px); 
            }

            .program-logo-container {
                width: 250px; 
                height: 250px;
            }
            
            .program-logo-container.is-song-playing::before {
                top: -15px; 
                left: -15px;
                right: -15px;
                bottom: -15px;
                border: 15px solid transparent;
                border-top-color: var(--accent-color); 
                border-right-color: var(--accent-color);
            }

            .artwork-container {
                width: 100%;
                max-width: 400px;
                margin: 20px auto; 
            }

            .song-title-mini { 
                font-size: 18px; 
            }
            
            .artist-name-mini { 
                font-size: 16px; 
            }

            .live-badge, .time-info span {
                font-size: 14px;
            }

            .play-btn { width: 80px; height: 80px; }
            .skip-btn { width: 50px; }
        }
    </style>
</head>
<body>

            <div class="bottom-icon" aria-label="Queue Tab"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg></div>
            <div class="bottom-icon" id="menuBtn" aria-label="Open On Demand Menu"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></div>

    <script>
        // --- CONFIGURAÇÕES ---
        const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
        const ZENO_ID = "hvwifp8ezc6tv"; 
        const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";
        
        // --- IMAGENS LOCAIS (USANDO CAMINHO ABSOLUTO /image/ E NOMES EM MINÚSCULAS) ---
        const IMG_DEFAULT = "/image/logopraisefm.webp"; 
        const IMG_COMMERCIAL = "/image/commercial break.png"; 
        const IMG_SPOT = "/image/spot.webp";
        
        // LOGOS DE PROGRAMAS 
        const IMG_MIDDAY_GRACE = "/image/middaygracelogo.webp";
        const IMG_MIDNIGHT_GRACE = "/image/midnightgracelogo.webp";
        const IMG_MORNING_SHOW = "/image/morningshowlogo.webp";
        const IMG_CARPOOL = "/image/praisefmcarpoollogo.webp"; 
        const IMG_CLASSIC = "/image/praisefmclassiclogo.webp";
        const IMG_FUTURE_ARTISTS = "/image/praisefmfutureartistslogo.webp";
        const IMG_POP = "/image/praisefmpoplogo.webp";
        const IMG_SUNDAY_MORNING = "/image/sundaymorninglogo.webp";

        // --- LISTA ON DEMAND ---
        const episodes = [
            {
                title: "Morning Prayer",
                artist: "Pastor John",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", 
                img: "https://images.unsplash.com/photo-1445445290350-16a3b8541d5c?w=200&fit=crop"
            },
            {
                title: "Worship Session #42",
                artist: "Praise Team",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", 
                img: "https://images.unsplash.com/photo-1510915361894-db8b60106cb1?w=200&fit=crop"
            }
        ];

        // --- DOM ELEMENTS ---
        const audio = new Audio(STREAM_URL);
        const playPauseBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');

        // Elementos de Imagem
        const programLogoEl = document.getElementById('programLogo'); 
        const programLogoContainerEl = document.getElementById('programLogoContainer');
        const artContainer = document.getElementById('artContainer');
        const albumArtEl = document.getElementById('albumArt'); 

        // Elementos de Texto e Barra
        const volumeSlider = document.getElementById('volumeSlider');
        const volFill = document.getElementById('volFill');
        const trackNameEl = document.getElementById('trackName'); 
        const artistNameEl = document.getElementById('artistName'); 
        const bgBlur = document.getElementById('bgBlur');
        const clockDisplay = document.getElementById('clockDisplay');
        
        // On Demand Elements
        const drawer = document.getElementById('drawer');
        const menuBtn = document.getElementById('menuBtn');
        const closeDrawer = document.getElementById('closeDrawer');
        const episodeList = document.getElementById('episodeList');
        const liveBadge = document.getElementById('liveBadge');
        const timeDisplay = document.getElementById('timeDisplay');
        const seekSlider = document.getElementById('seekSlider');
        const progressFill = document.getElementById('progressFill');
        const btnBackLive = document.getElementById('btnBackLive');
        
        // Botão de Letras
        const lyricsBtn = document.getElementById('lyricsBtn');

        // Canvas para pegar cores
        const colorCanvas = document.getElementById('colorCanvas');
        const ctx = colorCanvas.getContext('2d', { willReadFrequently: true });

        let isPlaying = false;
        let isLive = true;
        let eventSource = null;

        // --- FUNÇÃO PARA ATIVAR/DESATIVAR O ANEL ROTATIVO ---
        function setProgramLogoActiveState(isActive) {
            if (isActive) {
                programLogoContainerEl.classList.add('is-song-playing');
            } else {
                programLogoContainerEl.classList.remove('is-song-playing');
            }
        }
        
        // --- FUNÇÃO CORRIGIDA setMedia ---
        function setMedia(programImageUrl, trackImageUrl, trackTitle, artistName, audioSource = STREAM_URL) {
            trackNameEl.innerText = trackTitle;
            artistNameEl.innerText = artistName;
            
            // 1. ATUALIZA LOGO DO PROGRAMA (CÍRCULO GRANDE) - Deve ser sempre o logo da rádio ou o logo do programa
            if (programLogoEl.src !== programImageUrl) {
                programLogoEl.src = programImageUrl;
                programLogoEl.alt = `${trackTitle} by ${artistName} program logo`;
                
                // Se a imagem do círculo mudou, precisamos forçar o recálculo do fundo.
                updateBlurredBackground(programImageUrl);
            }
            
            // 2. ATUALIZA CAPA DA MÚSICA (MINIATURA)
            let finalTrackImageUrl = trackImageUrl;
            
            // Só aplica o proxy se NÃO for uma URL LOCAL
            if (!trackImageUrl.startsWith('/image/') && !trackImageUrl.startsWith('data:')) {
                finalTrackImageUrl = 'https://corsproxy.io/?' + encodeURIComponent(trackImageUrl);
            }
            
            if (albumArtEl.src !== finalTrackImageUrl) {
                albumArtEl.src = finalTrackImageUrl; 
            } 

            albumArtEl.alt = `${trackTitle} by ${artistName} album art`;


            if (audio.src !== audioSource) {
                audio.src = audioSource;
            }
        }
        
        // --- LISTENERS E FUNÇÕES AUXILIARES ---

        albumArtEl.onload = () => {
            const currentSrc = albumArtEl.src;
            if (currentSrc) {
                // Se a imagem for local (programa, spot, comercial), mantém o background escuro.
                if (currentSrc.includes('/image/') && !currentSrc.includes('logopraisefm.webp')) {
                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, #282828, #000)`; 
                } else {
                    // Tenta obter a cor para capas do Last.fm ou logo padrão
                    updateBlurredBackground(currentSrc);
                }
            }
        };

        // --- CONTROLES PRINCIPAIS E RASTREAMENTO GA4 ---
        playPauseBtn.addEventListener('click', togglePlay);
        
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                artContainer.classList.add('paused');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                updateUIState(false);
                
                if (typeof gtag === 'function') {
                    gtag('event', 'player_control', {
                        'media_type': isLive ? 'radio_stream' : 'on_demand_episode',
                        'action': 'pause',
                        'track_name': trackNameEl.innerText,
                        'artist_name': artistNameEl.innerText
                    });
                }


            } else {
                audio.play();
                isPlaying = true;
                artContainer.classList.remove('paused');
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                updateUIState(true);

                if (typeof gtag === 'function') {
                    gtag('event', 'player_control', {
                        'media_type': isLive ? 'radio_stream' : 'on_demand_episode',
                        'action': 'play',
                        'track_name': trackNameEl.innerText,
                        'artist_name': artistNameEl.innerText
                    });
                }

            }
            playPauseBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
        }

        // Volume
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
            volFill.style.width = (e.target.value * 100) + '%';
        });

        // --- LÓGICA DE FUNDO (BLUR) ---
        
        async function getColorFromImage(imgUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = imgUrl; 

                img.onload = () => {
                    try {
                        colorCanvas.width = 1; 
                        colorCanvas.height = 1;
                        ctx.drawImage(img, 0, 0, 1, 1); 
                        const pixelData = ctx.getImageData(0, 0, 1, 1).data;
                        const color = `rgb(${pixelData[0]}, ${pixelData[1]}, ${pixelData[2]})`;
                        resolve(color);
                    } catch (e) {
                        reject(null);
                    }
                };
                img.onerror = () => reject(null);
            });
        }
        
        function updateBlurredBackground(imgSrc) {
            // Não tenta extrair cor de imagens locais ou imagens de programa (que não são capas de álbum)
            if (imgSrc.includes('/image/')) {
                 bgBlur.style.background = `radial-gradient(circle at 50% 30%, #282828, #000)`; 
                 return;
            }

            getColorFromImage(imgSrc).then(color => {
                if (color) {
                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, ${color}, #000)`;
                } else {
                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, #282828, #000)`; 
                }
            }).catch(() => {
                bgBlur.style.background = `radial-gradient(circle at 50% 30%, #282828, #000)`; 
            });
        }


        // --- LÓGICA LIVE VS ON DEMAND ---

        // 1. Voltar para LIVE
        btnBackLive.addEventListener('click', goLive);

        function goLive() {
            isLive = true;
            btnBackLive.style.display = 'none';
            liveBadge.style.display = 'flex';
            timeDisplay.style.display = 'none';
            seekSlider.style.display = 'none';
            lyricsBtn.style.display = 'block'; 
            
            audio.src = STREAM_URL;
            audio.play();
            isPlaying = true;
            updateUIState(true);
            playPauseBtn.setAttribute('aria-label', 'Pause'); 
            
            if(!eventSource) setupZenoMetadata();
            
            // Ambos Logos (Fixo e Miniatura) voltam para o default da rádio, e anel ATIVO
            setMedia(IMG_DEFAULT, IMG_DEFAULT, "Praise FM", "Live from Chicago");
            setProgramLogoActiveState(true); 
        }

        // 2. Tocar Episódio On Demand
        function playEpisode(index) {
            const ep = episodes[index];
            isLive = false;

            if(eventSource) {
                eventSource.close();
                eventSource = null;
            }

            setMedia(ep.img || IMG_DEFAULT, ep.img || IMG_DEFAULT, ep.title, ep.artist, ep.url);
            setProgramLogoActiveState(true); 
            
            btnBackLive.style.display = 'inline-block';
            liveBadge.style.display = 'none';
            timeDisplay.style.display = 'block';
            seekSlider.style.display = 'block';
            lyricsBtn.style.display = 'none'; 
            
            audio.play();
            isPlaying = true;
            updateUIState(true);
            playPauseBtn.setAttribute('aria-label', 'Pause'); 
            
            drawer.classList.remove('open');

            if (typeof gtag === 'function') {
                gtag('event', 'on_demand_play', {
                    'track_name': ep.title,
                    'artist_name': ep.artist
                });
            }
        }

        // 3. Barra de Progresso (On Demand)
        audio.addEventListener('timeupdate', () => {
            if (!isLive && audio.duration && isFinite(audio.duration)) {
                const pct = (audio.currentTime / audio.duration) * 100;
                seekSlider.value = pct;
                progressFill.style.width = pct + "%";
                timeDisplay.innerText = formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
            }
        });

        seekSlider.addEventListener('input', (e) => {
            if (!isLive && audio.duration && isFinite(audio.duration)) {
                const seekTime = (e.target.value / 100) * audio.duration;
                audio.currentTime = seekTime;
            }
        });

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return min + ":" + (sec < 10 ? "0" + sec : sec);
        }
        
        function skip(sec) {
            if (!isLive && audio.duration) {
                audio.currentTime += sec;

                if (typeof gtag === 'function') {
                    gtag('event', 'media_seek', {
                        'media_type': isLive ? 'radio_stream' : 'on_demand_episode',
                        'seek_direction': sec > 0 ? 'forward' : 'backward',
                        'seek_amount': Math.abs(sec) + 's',
                    });
                }
            }
        }

        function updateUIState(playing) {
            if(playing) {
                artContainer.classList.remove('paused');
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            } else {
                artContainer.classList.add('paused');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            }
        }

        // --- MENU DRAWER ---
        menuBtn.addEventListener('click', () => {
            drawer.classList.add('open');
            if (typeof gtag === 'function') {
                gtag('event', 'menu_open', {
                    'menu_name': 'on_demand'
                });
            }
        });

        closeDrawer.addEventListener('click', () => drawer.classList.remove('open'));

        function renderEpisodes() {
            episodeList.innerHTML = "";
            episodes.forEach((ep, index) => {
                const div = document.createElement('div');
                div.className = "episode-item";
                div.onclick = () => playEpisode(index);
                div.innerHTML = `
                    <img src="${ep.img}" class="ep-img" alt="Artwork for ${ep.title} by ${ep.artist}">
                    <div class="ep-info">
                        <div class="ep-title">${ep.title}</div>
                        <div class="ep-desc">${ep.artist}</div>
                    </div>
                `;
                episodeList.appendChild(div);
            });
        }
        
        // --- FUNÇÃO PARA LETRAS (LYRICS) ---
        lyricsBtn.addEventListener('click', openLyrics);

        function openLyrics() {
            const artist = artistNameEl.innerText.trim();
            const track = trackNameEl.innerText.trim();
            
            if (lyricsBtn.style.display === 'none') {
                 alert("Letras não disponíveis para o item atual.");
                 return;
            }

            if (typeof gtag === 'function') {
                gtag('event', 'lyrics_search', {
                    'track_name': track,
                    'artist_name': artist
                });
            }

            const query = `${artist} ${track}`;
            const searchUrl = `https://genius.com/search?q=${encodeURIComponent(query)}`;

            window.open(searchUrl, '_blank');
        }

        // --- RELÓGIO CHICAGO ---
        function updateChicagoTime() {
            const now = new Date();
            const options = { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true };
            clockDisplay.innerText = now.toLocaleTimeString('en-US', options);
        }

        // --- INTEGRAÇÃO ZENO / LAST.FM ---
        function setupZenoMetadata() {
            const zenoUrl = `https://api.zeno.fm/mounts/metadata/subscribe/${ZENO_ID}`;
            eventSource = new EventSource(zenoUrl);

            eventSource.onmessage = function(e) {
                if(!isLive) return;

                try {
                    const data = JSON.parse(e.data);
                    if (data.streamTitle) {
                        const fullTitle = data.streamTitle;
                        const parts = fullTitle.split(' - ');
                        let artist = "Praise FM";
                        let song = fullTitle;
                        if (parts.length >= 2) {
                            artist = parts[0].trim();
                            song = parts[1].trim();
                        }
                        updateTrackInfo(artist, song);
                    }
                } catch (error) {}
            };
        }
        
        // --- LÓGICA DE BUSCA DE METADADOS (CORRIGIDA) ---
        async function updateTrackInfo(artist, track) {
            if(!isLive) return;

            // 1. DESATIVA O ANEL POR PADRÃO. SÓ SERÁ ATIVADO SE FOR UMA MÚSICA (REGRA 4).
            setProgramLogoActiveState(false); 

            const artistLow = artist.toLowerCase();
            const trackLow = track.toLowerCase();
            
            let programLogoUrl = IMG_DEFAULT; // Círculo Grande (default é o logo da rádio)
            let trackImageUrl = IMG_DEFAULT;  // Miniatura (default é o logo da rádio)
            
            lyricsBtn.style.display = 'block'; 


            // --- REGRA 1: COMMERCIAL BREAK ---
            if (trackLow.includes("commercial") || artistLow.includes("commercial") || trackLow.includes("ad break") || trackLow.includes("break")) {
                programLogoUrl = IMG_COMMERCIAL;
                trackImageUrl = IMG_COMMERCIAL;
                setMedia(programLogoUrl, trackImageUrl, "Commercial Break", "Praise FM");
                lyricsBtn.style.display = 'none'; 
                return; 
            }

            // --- REGRA 2: SPOTS / JINGLES / DEFAULT STATION ID ---
            if (trackLow.includes("spot") || artistLow.includes("spot") || trackLow.includes("station id") || artist === "Praise FM") {
                programLogoUrl = IMG_SPOT;
                trackImageUrl = IMG_SPOT;
                setMedia(programLogoUrl, trackImageUrl, track, artist);
                lyricsBtn.style.display = 'none'; 
                return;
            }
            
            // --- REGRA 3: PROGRAMAS TEMÁTICOS (USAM O LOGO DO PROGRAMA PARA AMBOS) ---
            let isProgram = false;

            // Midday Grace
            if (artistLow.includes("midday grace") || trackLow.includes("midday grace")) {
                programLogoUrl = IMG_MIDDAY_GRACE;
                isProgram = true;
            }
            // Midnight Grace
            else if (artistLow.includes("midnight grace") || trackLow.includes("midnight grace")) {
                programLogoUrl = IMG_MIDNIGHT_GRACE;
                isProgram = true;
            }
            // Morning Show
            else if (artistLow.includes("morning show") || trackLow.includes("morning show")) {
                programLogoUrl = IMG_MORNING_SHOW;
                isProgram = true;
            }
            // Praise FM Carpool
            else if (trackLow.includes("carpool")) {
                programLogoUrl = IMG_CARPOOL;
                isProgram = true;
            }
            // Praise FM Classic
            else if (artistLow.includes("classic") || trackLow.includes("classic")) {
                programLogoUrl = IMG_CLASSIC;
                isProgram = true;
            }
            // Praise FM Future Artists
            else if (artistLow.includes("future artists") || trackLow.includes("future artists")) {
                programLogoUrl = IMG_FUTURE_ARTISTS;
                isProgram = true;
            }
            // Praise FM Pop
            else if (artistLow.includes("pop") || trackLow.includes("pop")) {
                programLogoUrl = IMG_POP;
                isProgram = true;
            }
            // Sunday Morning
            else if (artistLow.includes("sunday morning") || trackLow.includes("sunday morning")) {
                programLogoUrl = IMG_SUNDAY_MORNING;
                isProgram = true;
            }

            if (isProgram) {
                trackImageUrl = programLogoUrl; // Miniatura também usa o logo do programa
                
                // Círculo Grande e Miniatura usam o logo do programa. Anel permanece DESATIVADO.
                setMedia(programLogoUrl, trackImageUrl, track, artist); 
                lyricsBtn.style.display = 'none';
                return; 
            }


            // --- REGRA 4: BUSCA NO LAST.FM (MÚSICAS) ---
            // Se chegou aqui, é uma MÚSICA.
            
            const lastfmUrl = `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`;
            
            try {
                const response = await fetch(lastfmUrl);
                const data = await response.json();

                if (data.track && data.track.album && data.track.album.image) {
                    const images = data.track.album.image;
                    const largeImage = images.find(img => img.size === 'extralarge' || img.size === 'large');
                    
                    if (largeImage && largeImage['#text']) {
                        trackImageUrl = largeImage['#text'];
                    }
                }
                
                // Círculo Grande: USA o IMG_DEFAULT (logo da rádio).
                programLogoUrl = IMG_DEFAULT; 
                
                // ATIVA O ANEL: É uma música! (Regra 4)
                setProgramLogoActiveState(true); 
                
                // programLogoUrl é o logo da rádio (círculo grande), trackImageUrl é a capa (miniatura)
                setMedia(programLogoUrl, trackImageUrl, track, artist); 

                if (typeof gtag === 'function') {
                    gtag('event', 'now_playing', {
                        'track_name': track,
                        'artist_name': artist,
                        'image_source': trackImageUrl === IMG_DEFAULT ? 'lastfm_fallback' : 'lastfm'
                    });
                }

            } catch (error) {
                // Se o Last.fm falhar: Anel ATIVADO. Imagem é o fallback default.
                setProgramLogoActiveState(true); 
                setMedia(programLogoUrl, IMG_DEFAULT, track, artist);
            }
        }
        
        // --- FINAL DO CÓDIGO ---

        // Inicialização
        setupZenoMetadata();
        renderEpisodes();
        updateChicagoTime();
        setInterval(updateChicagoTime, 1000);
        
        // Define o logo inicial e ativa o anel no início, pois a rádio está em "Live"
        setMedia(IMG_DEFAULT, IMG_DEFAULT, "Praise FM", "Live from Chicago"); 
        setProgramLogoActiveState(true); 

    </script>
