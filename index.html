<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
<title>Praise FM — Praise & Worship</title>
<style>
:root{
  --accent:#ff4d00;
  --bg:#0b0b0b;
  --panel:#0f0f0f;
  --muted:#bdbdbd;
  --border:#222;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Roboto,Arial}
body{background:var(--bg);color:#fff;text-align:center;padding-bottom:160px}

/* Circle Program */
.program-circle{
  width:clamp(240px,28vw,350px);
  height:clamp(240px,28vw,350px);
  border-radius:50%;
  margin:20px auto;
  position:relative;
}
.program-img{
  width:100%;height:100%;border-radius:50%;
  object-fit:cover;position:relative;z-index:2;
}
.progress-ring{
  width:100%;height:100%;
  position:absolute;top:0;left:0;
  transform:rotate(-90deg);z-index:1;
}
.progress-ring circle{
  fill:transparent;
  stroke:var(--accent);
  stroke-width:6;
  stroke-linecap:round;
  transition:stroke-dashoffset .8s linear;
}

/* Program text */
#programTitle{font-size:21px;font-weight:900;margin-top:6px}
#programHost{font-size:13px;color:var(--muted)}
#programTime{font-size:14px;color:var(--accent);margin-bottom:10px}

/* Now Playing marquee */
.nowplaying{width:92%;overflow:hidden;margin:8px auto 6px}
.marquee{
  display:inline-block;white-space:nowrap;
  animation:scroll 12s linear infinite;
}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* Play button */
#playBtn{
  margin-top:10px;background:var(--accent);
  border:none;padding:14px 26px;
  border-radius:50px;font-weight:800;font-size:18px;
  cursor:pointer;color:#fff;
}

/* Recently played */
#recently{width:94%;margin:20px auto}
.recent-item{
  display:grid;grid-template-columns:26px 50px 1fr;
  align-items:center;gap:8px;padding:8px;
  border-bottom:1px solid var(--border);
}
.rec-index{color:var(--muted);font-weight:700}
.rec-cover{width:50px;height:50px;border-radius:6px;object-fit:cover}
.rec-title{font-size:14px;font-weight:700}
.rec-artist{font-size:12px;color:var(--muted)}

/* UP NEXT + Later */
.schedule{display:flex;gap:12px;flex-wrap:wrap;width:94%;margin:20px auto}
.card{flex:1;min-width:260px;background:var(--panel);border-radius:12px;padding:12px;border:1px solid var(--border)}
.card h3{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;font-weight:900}
.s-row{display:flex;gap:8px;text-align:left}
.s-img{width:60px;height:60px;border-radius:8px;object-fit:cover}
.s-meta{flex:1;min-width:0;text-align:left}
.s-title{font-weight:900;font-size:14px}
.s-desc{font-size:12px;color:var(--muted);margin-top:3px}

/* BBC Bottom Player */
#bottomPlayer{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  width:calc(100% - 28px);
  background:var(--panel);border-radius:14px;
  display:flex;align-items:center;gap:14px;
  padding:10px 12px;border:1px solid var(--border);
  opacity:0;pointer-events:none;transition:.4s ease;
}
#bottomPlayer.active{opacity:1;pointer-events:auto}
#bpCover{width:64px;height:64px;border-radius:8px;object-fit:cover}
#bpTitle{font-weight:900;font-size:14px;text-align:left}
#bpSub{font-size:12px;color:var(--muted);text-align:left}
#volume{width:100px}
audio{display:none}

@media(max-width:600px){
 .program-circle{width:200px;height:200px}
 .s-img{width:46px;height:46px}
}
</style>
</head>
<body>

<h2 id="programTitle"></h2>
<div id="programHost"></div>
<div id="programTime"></div>

<div class="program-circle">
  <svg class="progress-ring"><circle id="progCircle" r="112" cx="120" cy="120"></circle></svg>
  <img id="circleImg" class="program-img" src="/image/logopraisefm.webp">
</div>

<div class="nowplaying">
  <div id="nowPlaying" class="marquee">Loading…</div>
</div>

<button id="playBtn">▶ Play</button>

<section id="recently"></section>

<div class="schedule">
  <div class="card">
    <h3>Up Next</h3>
    <div id="upNext" class="s-row"></div>
  </div>
  <div class="card">
    <h3>Later Today</h3>
    <div id="later"></div>
  </div>
</div>

<!-- BBC bottom player -->
<div id="bottomPlayer">
  <img id="bpCover" src="/image/logopraisefm.webp">
  <div>
    <div id="bpTitle">Praise FM</div>
    <div id="bpSub">LIVE</div>
  </div>
  <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8">
</div>

<audio id="audio" src="https://stream.zeno.fm/hvwifp8ezc6tv"></audio>

<script>
const TZ="America/Chicago";
const audio=document.getElementById("audio");
const bp=document.getElementById("bottomPlayer");
const bpImg=document.getElementById("bpCover");
const bpTitle=document.getElementById("bpTitle");
const bpSub=document.getElementById("bpSub");
const vol=document.getElementById("volume");
const programTitle=document.getElementById("programTitle");
const programHost=document.getElementById("programHost");
const programTime=document.getElementById("programTime");
const circleImg=document.getElementById("circleImg");
const progCircle=document.getElementById("progCircle");

function nowChicago(){return new Date(new Date().toLocaleString("en-US",{timeZone:TZ}))}
function h(n){return n.getHours()+n.getMinutes()/60}

const PROGRAMS=[
 {n:"Midnight Grace",h:"Praise FM Hosts",s:0,e:6,img:"/image/midnightgracelogo.webp"},
 {n:"Music",h:"",s:6,e:7,img:"/image/logopraisefm.webp"},
 {n:"Morning Show",h:"with Stancy Campbell",s:7,e:12,img:"/image/morningshowlogo.webp"},
 {n:"Midday Grace",h:"with Michael Grace",s:12.5,e:16,img:"/image/middaygracelogo.webp"},
 {n:"Praise FM Non Stop",h:"",s:16,e:17,img:"/image/praisefmnonstop.webp"},
 {n:"Carpool",h:"with Rachael Harris",s:18,e:20,img:"/image/praisefmcarpoollogo.webp"},
 {n:"Praise FM POP",h:"",s:22,e:22.5,img:"/image/praisefmpoplogo.webp"},
];
const TIMES=[
 {n:"Future Artists",h:"with Sarah Jordan",days:[1,3,5],slots:[{s:12,e:12.5},{s:20,e:20.5}],img:"/image/praisefmfutureartistslogo.webp"},
 {n:"Classics",h:"with Scott Turner",days:[2,4,6],slots:[{s:12,e:12.5},{s:20,e:20.5}],img:"/image/praisefmclassiclogo.webp"},
 {n:"Living The Message",h:"",days:null,slots:[{s:10,e:10.5},{s:21,e:21.5}],img:"/image/livingthemessage.webp"},
 {n:"Sunday With Christ",h:"with Matt Riley",days:[0],slots:[{s:7,e:12}],img:"/image/sundaywithchristlogo.webp"}
];

function curP(){
 const d=nowChicago(),day=d.getDay(),x=h(d);
 for(const s of TIMES){
  for(const t of s.slots){
   if(x>=t.s&&x<t.e&&(s.days==null||s.days.includes(day)))return{...s,...t};
  }
 }
 for(const p of PROGRAMS) if(x>=p.s&&x<p.e)return p;
 return{n:"Music",h:"",s:0,e:24,img:"/image/logopraisefm.webp"};
}

function fmt(f){
 const hh=Math.floor(f),mm=Math.round((f-hh)*60);
 return`${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
}

function findNext(){
 const d=nowChicago(),day=d.getDay(),t=h(d),L=[];
 for(const s of TIMES)
  for(const sl of s.slots)
   if(sl.s>t&&(s.days==null||s.days.includes(day)))
    L.push({n:s.n,h:s.h,s:sl.s,e:sl.e,img:s.img});
 for(const p of PROGRAMS)if(p.s>t)L.push(p);
 L.sort((a,b)=>a.s-b.s);
 return L[0];
}

function updUI(){
 const p=curP();
 circleImg.src=p.img;
 programTitle.textContent=`${p.n} ${p.h||""}`;
 programTime.textContent=`${fmt(p.s)} - ${fmt(p.e)}`;
 const nx=findNext();
 if(nx){
  document.getElementById("upNext").innerHTML=
   `<img class="s-img" src="${nx.img}">
    <div class="s-meta">
      <div class="s-title">${nx.n} ${nx.h||""}</div>
      <div class="s-desc">${fmt(nx.s)} - ${fmt(nx.e)}</div>
    </div>`;
 }
 updRing();
}

function updRing(){
 const p=curP(),d=nowChicago(),x=h(d);
 if(p.n==="Music"){document.querySelector(".progress-ring").style.display="none";return;}
 document.querySelector(".progress-ring").style.display="block";
 const total=(p.e-p.s)*60*60,el=(x-p.s)*60*60,r=112,c=2*Math.PI*r;
 progCircle.style.strokeDasharray=`${c}`;
 progCircle.style.strokeDashoffset=c-(c*(el/total));
}

let REC=[],MR=4;
function addRecent(t,a,c){
 if(!t||!a)return;
 REC.unshift({t,a,c});
 if(REC.length>MR)REC.pop();
 let htm="";
 REC.forEach((r,i)=>htm+=`
 <div class="recent-item">
   <div class="rec-index">${i+1}</div>
   <img src="${r.c}" class="rec-cover">
   <div><div class="rec-title">${r.t}</div><div class="rec-artist">${r.a}</div></div>
 </div>`);
 document.getElementById("recently").innerHTML=htm;
}

function meta(title){
 const parts=title.split(" - ");
 if(parts.length<2)return;
 const a=parts[0].trim(),t=parts.slice(1).join(" - ").trim();
 nowPlaying.innerHTML=`<div class="marquee">${a} — ${t}</div>`;
 bpImg.src=`https://source.boringavatar.com/marble/64/${encodeURIComponent(a+t)}`;
 bpTitle.textContent=a;
 bpSub.textContent=t;
 addRecent(t,a,bpImg.src);
}

new EventSource(`https://api.zeno.fm/mounts/metadata/subscribe/hvwifp8ezc6tv`)
 .onmessage=e=>{try{
  const d=JSON.parse(e.data);
  if(d.streamTitle)meta(d.streamTitle);
 }catch{}};

function play(){
 audio.play();
 bp.classList.add("active");
}
document.getElementById("playBtn").onclick=play;
vol.oninput=e=>audio.volume=e.target.value;

setInterval(updUI,30000);
updUI();
</script>
</body>
</html>
