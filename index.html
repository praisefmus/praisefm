<html lang="en">
<head>

      gtag('js', new Date());
      gtag('config', 'G-0RNK6G5WWL');

    <link rel="icon" type="image/png" sizes="32x32" href="./image/favicon-32x32.png">

    <style>
        /* --- CSS --- */
        :root {
            --primary-color: #fff;
            --secondary-color: #e0e0e0;
            --accent-color: #ff4d00; /* Orange */
            --bg-dark: #121212;
            --glass-bg: rgba(20, 20, 20, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center; /* Centraliza verticalmente */
            overflow-y: auto; 
            color: var(--primary-color);
        }

        .background-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 30%, #222, #000);
            filter: blur(90px); 
            opacity: 0.6; 
            transition: background 1s ease;
        }

        .player-container {
            width: 100%; 
            max-width: 450px; /* Limita a largura para mobile e centraliza o bloco */
            display: flex; 
            flex-direction: column; /* Coloca os itens um abaixo do outro */
            align-items: center; /* Centraliza os itens dentro do container */
            padding: 20px;
            position: relative;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            gap: 20px; /* Espaço entre os principais blocos */
        }
        
        /* === 1. PROGRAM AREA (Only Circle) === */
        .program-area {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza o círculo e o texto */
            margin-bottom: 20px;
        }

        /* --- REMOVED: .program-square --- */

        .program-circle-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza o círculo e o texto */
            margin-top: 0; /* Não precisa de margin-top extra */
        }
        
        .program-circle {
            width: min(70vw, 300px); /* Tamanho do círculo para mobile e desktop */
            height: min(70vw, 300px);
            border-radius: 50%;
            background-color: #000;
            z-index: 2;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            --progress-deg: 0deg;
        }

        .program-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #111; 
            position: relative; z-index: 2;
        }

        /* Progress Ring */
        .program-circle.is-playing::before {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            z-index: -1;
            background: conic-gradient(
                var(--accent-color) var(--progress-deg), 
                rgba(255, 255, 255, 0.05) var(--progress-deg)
            );
            -webkit-mask: radial-gradient(transparent 68%, black 69%);
            mask: radial-gradient(transparent 68%, black 69%);
        }

        .program-label { margin-top: 20px; text-align: center; }

        .program-status { 
            font-size: 12px; color: var(--accent-color); font-weight: 800; letter-spacing: 2px; 
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; 
            gap: 8px; animation: flash 2s infinite ease-in-out;
        }
        
        .live-dot { width: 8px; height: 8px; background-color: var(--accent-color); border-radius: 50%; box-shadow: 0 0 8px var(--accent-color); }
        .program-name { font-size: 24px; font-weight: 800; margin-top: 5px; letter-spacing: -0.5px; line-height: 1.1;}

        /* === 2. CONTROLS === */
        .controls-area {
            display: flex; justify-content: center; align-items: center; gap: 30px; 
            margin: 10px 0;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            width: 100%;
            align-self: center;
        }
        .control-btn { background: none; border: none; color: #fff; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center;}
        .control-btn:active { transform: scale(0.9); }
        .play-btn { width: 70px; height: 70px; background: var(--accent-color); border-radius: 50%; box-shadow: 0 8px 20px rgba(255, 77, 0, 0.4); color: white; display: flex; align-items: center; justify-content: center; }
        .play-btn svg { width: 30px; height: 30px; fill: white; }
        .play-btn svg.play-icon { margin-left: 4px; }
        .skip-btn svg { width: 28px; height: 28px; opacity: 0.8; }


        /* === 3. METADATA WRAPPER (Full Width, Centralized) === */
        .metadata-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center; /* Centraliza os cards de metadados */
        }

        /* --- NOW PLAYING CARD --- */
        .now-playing-card {
            width: 90%; /* Ajuste a largura para o card */
            max-width: 380px; /* Limita a largura máxima */
            background-color: var(--glass-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; padding: 12px 18px; 
            display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .song-cover { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background-color: #333; margin-right: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .song-info { flex: 1; overflow: hidden; text-shadow: none; }
        .song-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; margin-bottom: 2px; }
        .song-artist { font-size: 14px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lyrics-btn { opacity: 0.8; cursor: pointer; background:none; border:none; color:white; padding: 8px; }

        /* --- VOLUME --- */
        .volume-container { 
            width: 80%; 
            max-width: 300px;
            display: flex; align-items: center; gap: 12px; 
            background-color: rgba(0,0,0,0.4); 
            padding: 8px 15px;
            border-radius: 20px;
            align-self: center; /* Centraliza o controle de volume */
            margin-left: 0; /* Remove o margin-left */
        }
        .volume-slider { flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.3); height: 4px; border-radius: 2px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; }

        /* --- RECENTLY PLAYED --- */
        .recents-container {
            width: 100%; 
            padding: 10px 0;
            margin-bottom: 40px; 
            text-align: center; /* Centraliza o título */
        }
        .recents-title { font-size: 14px; font-weight: 700; color: #999; text-transform: uppercase; margin-bottom: 10px; padding: 0 18px; }
        .recent-item { 
            display: flex; align-items: center; padding: 8px 18px; 
            transition: background-color 0.2s; border-radius: 0;
            width: 90%; /* Ajusta a largura dos itens recentes */
            max-width: 380px; /* Limita a largura máxima */
            margin: 0 auto; /* Centraliza os itens recentes */
        }
        .recent-cover { width: 35px; height: 35px; border-radius: 4px; object-fit: cover; background-color: #333; margin-right: 15px; }
        .recent-info { flex: 1; overflow: hidden; }
        .recent-title { font-size: 14px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recent-artist { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }


        /* === MOBILE FIRST: NO MEDIA QUERIES === */
        /* Removidas as media queries para desktop, pois o layout agora é universalmente centralizado */

        @keyframes flash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
        }
    </style>
</head>
<body>

    <div class="background-blur" id="bgBlur"></div>

    <div class="player-container">
        
        <div class="left-column"> <div class="program-area">
                <div class="program-circle-wrapper">
                    <div class="program-circle" id="programCircle">
                        <img src="/image/logopraisefm.webp" id="programImg" class="program-img" alt="Program Logo">
                    </div>
                    <div class="program-label">
                        <div class="program-status"><div class="live-dot"></div> LIVE ON AIR</div>
                        <div class="program-name" id="programNameDisplay">Praise FM</div>
                    </div>
                </div>
            </div>

            <div class="controls-area">
                <button class="control-btn skip-btn" onclick="skip(-15)" aria-label="Skip Back 15 Seconds">

                </button>
                
                <button class="control-btn play-btn" id="playPauseBtn" aria-label="Play / Pause">
                    <svg id="iconPlay" class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>

                </button>

                <button class="control-btn skip-btn" onclick="skip(15)" aria-label="Skip Forward 15 Seconds">

                </button>

        <div class="metadata-wrapper">
            
            <div class="now-playing-card">
                <img src="/image/logopraisefm.webp" id="songCover" class="song-cover" alt="Song Cover">
                <div class="song-info">
                    <div class="song-title" id="trackTitle">Loading...</div>
                    <div class="song-artist" id="trackArtist">Praise FM</div>
                </div>
                <button class="lyrics-btn" id="lyricsBtn" aria-label="View Lyrics">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                </button>
            </div>

            <div class="volume-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="min-width:20px"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
            </div>

            <div class="recents-container">
                <div class="recents-title">Recently Played</div>
                <div id="recentsList">
                    </div>

        </div>

    </div>
    
    <canvas id="colorCanvas" style="display:none;"></canvas>

    <script>
        // --- CONFIGURATION ---
        const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
        const ZENO_ID = "hvwifp8ezc6tv"; 
        const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";
        const CHICAGO_TIMEZONE = "America/Chicago";

        // --- LOCAL IMAGES (Assuming these paths are correct in your project) ---
        const IMG_DEFAULT = "/image/logopraisefm.webp"; 
        const IMG_COMMERCIAL = "/image/commercial break.png"; 
        const IMG_SPOT = "/image/spot.webp";
        const IMG_MIDDAY_GRACE = "/image/middaygracelogo.webp"; 
        const IMG_MIDNIGHT_GRACE = "/image/midnightgracelogo.webp";
        const IMG_MORNING_SHOW = "/image/morningshowlogo.webp";
        const IMG_CARPOOL = "/image/praisefmcarpoollogo.webp"; 
        const IMG_CLASSIC = "/image/praisefmclassiclogo.webp";
        const IMG_FUTURE_ARTISTS = "/image/praisefmfutureartistslogo.webp";
        const IMG_POP = "/image/praisefmpoplogo.webp";
        const IMG_SUNDAY_MORNING = "/image/sundaymorninglogo.webp";

        // --- DOM ELEMENTS ---
        const audio = new Audio(STREAM_URL);
        const playBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const programCircle = document.getElementById('programCircle');
        const programImg = document.getElementById('programImg');
        const programNameDisplay = document.getElementById('programNameDisplay');
        const songCover = document.getElementById('songCover');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const bgBlur = document.getElementById('bgBlur');
        const colorCanvas = document.getElementById('colorCanvas');
        const ctx = colorCanvas.getContext('2d', {willReadFrequently: true});

        // --- GLOBAL STATE ---
        let isPlaying = false;
        let progressInterval = null; 
        const RECENTLY_PLAYED = [];
        const MAX_RECENTS = 5;
        const CARPOOL_START_HOUR = 18; // 6 PM Chicago
        const CARPOOL_END_HOUR = 20;   // 8 PM Chicago
        
        // --- TIME FUNCTIONS (Used only for CARPOOL program logic) ---
        function isTimeBetween(startHour, endHour) {
            const nowChicago = new Date(new Date().toLocaleString("en-US", { timeZone: CHICAGO_TIMEZONE }));
            
            const start = new Date(nowChicago);
            start.setHours(startHour, 0, 0, 0);

            const end = new Date(nowChicago);
            end.setHours(endHour, 0, 0, 0);

            return nowChicago.getTime() >= start.getTime() && nowChicago.getTime() < end.getTime();
        }

        // --- RECENT TRACKS FUNCTION ---
        function updateRecents(track, artist, cover) {
            if (track === "Loading..." || track.toLowerCase().includes("commercial") || track.toLowerCase().includes("station id")) return;

            if (RECENTLY_PLAYED.length > 0 && 
                RECENTLY_PLAYED[0].title === track && 
                RECENTLY_PLAYED[0].artist === artist) {
                return;
            }
            
            RECENTLY_PLAYED.unshift({ title: track, artist: artist, cover: cover || IMG_DEFAULT });
            if (RECENTLY_PLAYED.length > MAX_RECENTS) {
                RECENTLY_PLAYED.pop();
            }

            const recentsList = document.getElementById('recentsList');
            recentsList.innerHTML = '';

            // Skip the current playing song (index 0)
            for (let i = 1; i < RECENTLY_PLAYED.length; i++) {
                const item = RECENTLY_PLAYED[i];
                const itemHtml = `
                    <div class="recent-item">
                        <img src="${item.cover}" class="recent-cover" alt="${item.title} Cover">
                        <div class="recent-info">
                            <div class="recent-title">${item.title}</div>
                            <div class="recent-artist">${item.artist}</div>
                        </div>
                    </div>
                `;
                recentsList.innerHTML += itemHtml;
            }
        }

        // --- PROGRESS RING FUNCTION (Program or Music) ---
        function startProgressMonitor(totalDurationMs, isProgramProgress = false) {
            if (isProgramProgress && progressInterval) return;

            if (isProgramProgress && !isPlaying) return; 

            let totalDuration;
            let startTimeMs; 

            if (isProgramProgress) {
                if (progressInterval) clearInterval(progressInterval);
                
                const nowChicago = new Date(new Date().toLocaleString("en-US", { timeZone: CHICAGO_TIMEZONE }));
                const startOfProgram = new Date(nowChicago);
                startOfProgram.setHours(CARPOOL_START_HOUR, 0, 0, 0);

                if (nowChicago.getTime() >= startOfProgram.getTime()) {
                    startTimeMs = startOfProgram.getTime();
                } else {
                    return; 
                }

                totalDuration = (CARPOOL_END_HOUR - CARPOOL_START_HOUR) * 60 * 60 * 1000; 
            } else {
                // MUSIC LOGIC
                if (progressInterval) clearInterval(progressInterval);
                totalDuration = totalDurationMs > 0 ? totalDurationMs : 210000; 
                startTimeMs = Date.now();
            }

            const startTime = startTimeMs;

            progressInterval = setInterval(() => {
                if (!isPlaying) return; 

                let percentage;
                if (isProgramProgress) {
                    const nowChicago = new Date(new Date().toLocaleString("en-US", { timeZone: CHICAGO_TIMEZONE }));
                    const endOfProgram = new Date(nowChicago);
                    endOfProgram.setHours(CARPOOL_END_HOUR, 0, 0, 0);
                    
                    const currentElapsed = nowChicago.getTime() - startTime;
                    percentage = Math.min(currentElapsed / totalDuration, 1);
                    
                    if (nowChicago.getTime() >= endOfProgram.getTime()) {
                        percentage = 1; 
                        clearInterval(progressInterval);
                    }
                } else {
                    const elapsed = Date.now() - startTime;
                    percentage = Math.min(elapsed / totalDuration, 1); 
                    if (percentage >= 1) {
                        clearInterval(progressInterval);
                        setTimeout(setupZeno, 5000); 
                    }
                }

                const degrees = percentage * 360;
                programCircle.style.setProperty('--progress-deg', `${degrees}deg`);

            }, 1000);
        }

        // --- VISUAL UPDATE AND RING LOGIC ---
        function updateDisplay(programImage, programName, songImage, songTitle, songArtist, isMusicalTrack, durationMs = 0) {
            // 1. Program Circle
            if (programImg.src !== programImage && !programImg.src.endsWith(programImage)) {
                programImg.src = programImage;
            }
            programNameDisplay.innerText = programName;

            // 2. Music Card / Background
            let safeSongImage = songImage;
            if (!songImage.startsWith('/image/') && !songImage.startsWith('data:')) {
                safeSongImage = 'https://corsproxy.io/?' + encodeURIComponent(songImage);
            }
            if (songCover.src !== safeSongImage && !songCover.src.endsWith(safeSongImage)) {
                songCover.src = safeSongImage;
                updateBackground(safeSongImage);
            }
            trackTitle.innerText = songTitle;
            trackArtist.innerText = songArtist;

            // 3. Progress Ring
            if (isMusicalTrack) {
                programCircle.classList.add('is-playing');
            } else {
                programCircle.classList.remove('is-playing');
                programCircle.style.setProperty('--progress-deg', '0deg');
                if (progressInterval) clearInterval(progressInterval);
            }
        }
        
        // --- COLOUR BACKGROUND ---
        function updateBackground(imgUrl) {
            if(imgUrl.includes('/image/')) {
                bgBlur.style.background = `radial-gradient(circle at 50% 30%, #222, #000)`;
                return;
            }
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = imgUrl;
            img.onload = () => {
                try {
                    colorCanvas.width = 1; colorCanvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1);
                    const [r,g,b] = ctx.getImageData(0,0,1,1).data;
                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, rgb(${r},${g},${b}), #000)`;
                } catch(e) {}
            }
        }

        // --- MAIN LOGIC (Metadata) ---
        async function processMetadata(artist, track) {
            const artistLow = artist.toLowerCase();
            const trackLow = track.toLowerCase();
            
            let currentSongImg = IMG_DEFAULT;
            let songDuration = 0; 

            let finalCircleImg = IMG_DEFAULT;
            let finalCircleName = "Praise FM"; 
            let finalRingStatus = true; 

            let isCarpoolTime = isTimeBetween(CARPOOL_START_HOUR, CARPOOL_END_HOUR);

            // 0. FORCE CARPOOL STATE (6 PM - 8 PM Chicago)
            if (isCarpoolTime) {
                finalCircleImg = IMG_CARPOOL;
                finalCircleName = "Carpool";
                finalRingStatus = true; 
                if (isPlaying) startProgressMonitor(0, true); 
            } 

            // 1. COMMERCIALS AND IDENTIFIERS CHECK
            if (trackLow.includes("commercial") || trackLow.includes("ad break")) {
                updateDisplay(IMG_COMMERCIAL, "Commercial Break", IMG_COMMERCIAL, "Commercial Break", "Praise FM", false);
                return;
            }
            if (trackLow.includes("station id") || trackLow.includes("spot") || (artistLow === "praise fm" && trackLow === "praise fm")) {
                updateDisplay(IMG_SPOT, "Station ID", IMG_SPOT, "Station ID", "Praise FM", false);
                return;
            }

            // 2. OTHER NON-PERSISTENT PROGRAMS CHECK (Only if not in Carpool Time)
            if (!isCarpoolTime) { 
                const programMap = {
                    "midday": [IMG_MIDDAY_GRACE, "Midday Grace"],
                    "midnight": [IMG_MIDNIGHT_GRACE, "Midnight Grace"],
                    "morning show": [IMG_MORNING_SHOW, "The Morning Show"],
                    "classic": [IMG_CLASSIC, "Praise FM Classic"],
                    "future": [IMG_FUTURE_ARTISTS, "Future Artists"],
                    "pop": [IMG_POP, "Praise FM Pop"],
                    "sunday": [IMG_SUNDAY_MORNING, "Sunday Morning"]
                };

                let programMatch = null;
                for (const key in programMap) {
                    if (artistLow.includes(key) || trackLow.includes(key)) {
                        programMatch = programMap[key]; 
                        break;
                    }
                }

                if (programMatch) {
                    const [img, name] = programMatch;
                    updateDisplay(img, name, img, name, "Praise FM", false); 
                    updateRecents(name, "Praise FM", img);
                    return;
                }
            }

            // 3. IF WE REACH HERE, IT IS MUSIC.

            // A. Fetch Music Details (Cover/Duration)
            try {
                const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`);
                const data = await res.json();
                
                if (data.track) {
                    if (data.track.album && data.track.album.image) {
                        const img = data.track.album.image.find(i => i.size === 'extralarge')['#text'];
                        if (img) {
                            currentSongImg = img;
                            if (!isCarpoolTime) finalCircleImg = img; 
                        }
                    }
                    if (data.track.duration) {
                        songDuration = parseInt(data.track.duration);
                    }
                }
            } catch(e) { console.log("LastFM Error", e); }
            
            // B. Music Ring Logic (If NOT CARPOOL)
            if (!isCarpoolTime && isPlaying) {
                 programCircle.classList.add('is-playing');
                 startProgressMonitor(songDuration, false); 
            }

            // C. Update Recents
            updateRecents(track, artist, currentSongImg);

            // D. Final Call
            updateDisplay(
                finalCircleImg, finalCircleName,   // Circle
                currentSongImg, track, artist,     // Music Card
                finalRingStatus, songDuration      // Ring
            );
        }

        // --- AUDIO CONTROLS ---
        audio.addEventListener('error', (e) => {
            console.log("Stream error, attempting to reconnect...");
            setTimeout(() => {
                audio.src = STREAM_URL;
                audio.play().catch(e => console.log("Autoplay blocked"));
