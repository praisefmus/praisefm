<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praise FM - Live & On Demand</title>
    
    <link rel="icon" type="image/png" href="image/favicon.png">

    <style>
        /* --- CSS (DESIGN) --- */
        :root {
            --primary-color: #fff;
            --secondary-color: rgba(255, 255, 255, 0.6);
            --accent-color: #ff3b30;
            --bg-dark: #1c1c1e;
            --bg-gradient-2: #8b0000; /* Cor padrão para o fundo, será sobrescrita */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--primary-color);
        }

        .background-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            /* Cor inicial, será definida por JS */
            background: radial-gradient(circle at 50% 30%, var(--bg-gradient-2), #000);
            filter: blur(60px); opacity: 0.8; transition: background 1s ease;
        }

        .player-container {
            width: 100%; max-width: 380px; height: 100%; max-height: 800px;
            padding: 20px 24px; display: flex; flex-direction: column;
            justify-content: space-between; position: relative; overflow: hidden;
        }

        .top-bar { display: flex; justify-content: center; padding-bottom: 10px; }
        .grip { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* ARTWORK */
        .artwork-container {
            width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 20px;
            transform: scale(1); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background-color: #1a1a1a; position: relative;
        }
        .artwork-container.paused { transform: scale(0.85); opacity: 0.8; }
        .artwork-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }

        /* INFO */
        .track-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .text-area { flex: 1; padding-right: 10px; }
        .song-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { font-size: 18px; color: var(--secondary-color); font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* Adicionando cor e ajuste para o botão de letras */
        .more-btn { background: none; border: none; cursor: pointer; color: var(--primary-color); padding: 5px; font-size: 20px; transition: color 0.3s; }
        .more-btn:hover { color: var(--accent-color); }


        /* PROGRESS */
        .progress-area { margin-bottom: 10px; position: relative; }
        .progress-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--secondary-color); border-radius: 2px; transition: width 0.1s linear; }
        .seek-slider { position: absolute; top: -5px; width: 100%; height: 15px; opacity: 0; cursor: pointer; }
        
        .time-info { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--secondary-color); margin-top: 8px; font-weight: 600; }

        /* LIVE BADGE */
        @keyframes pulse-red { 0% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); } 50% { opacity: 0.5; text-shadow: none; } 100% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); } }
        .live-badge { color: var(--accent-color); font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; background-color: var(--accent-color); border-radius: 50%; animation: pulse-red 2s infinite; }
        .chicago-time { font-variant-numeric: tabular-nums; }

        /* CONTROLS */
        .controls { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .control-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .control-btn:active { transform: scale(0.9); }
        .play-btn { width: 70px; height: 70px; }
        .skip-btn { width: 40px; }

        /* VOLUME */
        .volume-area { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .volume-track { flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; position: relative; }
        .volume-fill { position: absolute; height: 100%; background: #fff; border-radius: 3px; width: 80%; }
        .volume-slider { position: absolute; width: 100%; height: 100%; top:0; opacity:0; cursor:pointer; }

        /* FOOTER */
        .bottom-icons { display: flex; justify-content: space-around; color: var(--secondary-color); z-index: 10; }
        .bottom-icon { cursor: pointer; padding: 10px; }

        /* --- DRAWER MENU (ON DEMAND) --- */
        .drawer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            transform: translateY(110%); transition: transform 0.3s ease-out;
            z-index: 20; display: flex; flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .drawer.open { transform: translateY(0); }
        
        .drawer-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .drawer-title { font-weight: 700; font-size: 18px; }
        .close-drawer { background: none; border: none; color: var(--accent-color); font-size: 16px; font-weight: 600; cursor: pointer; }

        .episode-list { flex: 1; overflow-y: auto; padding: 0 20px; }
        .episode-item {
            display: flex; align-items: center; padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .ep-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; margin-right: 15px; }
        .ep-info { flex: 1; }
        .ep-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .ep-desc { font-size: 12px; color: var(--secondary-color); }

        .back-to-live {
            display: none;
            margin-top: 5px;
            background-color: rgba(255, 59, 48, 0.2);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        svg { fill: currentColor; }
    </style>
</head>
<body>

    <div class="background-blur" id="bgBlur"></div>

    <div class="player-container">
        <div class="top-bar">
            <div class="grip"></div>
        </div>

        <div class="artwork-container paused" id="artContainer">
            <img src="image/logopraisefm.webp" alt="Album Art" class="artwork-img" id="albumArt">
        </div>

        <div class="track-info">
            <div class="text-area">
                <div class="song-title" id="trackName">Praise FM</div>
                <div class="artist-name" id="artistName">Live from Chicago</div>
                <button id="btnBackLive" class="back-to-live">Return to Live</button>
            </div>
            <button class="more-btn" id="lyricsBtn">•••</button>
        </div>

        <div class="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <input type="range" min="0" max="100" value="0" class="seek-slider" id="seekSlider">
            
            <div class="time-info">
                <div class="live-badge" id="liveBadge">
                    <div class="live-dot"></div> LIVE
                </div>
                <span id="timeDisplay" style="display:none;">0:00 / 0:00</span>
                <span class="chicago-time" id="clockDisplay">--:--</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn skip-btn" onclick="skip(-15)"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></button>
            
            <button class="control-btn play-btn" id="playPauseBtn">
                <svg id="iconPlay" width="55" height="55" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" style="display:none;" width="55" height="55" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <button class="control-btn skip-btn" onclick="skip(15)"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></button>
        </div>

        <div class="volume-area">
            <svg width="18" height="18" viewBox="0 0 24 24" style="opacity: 0.6;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <div class="volume-track">
                <div class="volume-fill" id="volFill"></div>
                <input type="range" min="0" max="1" step="0.01" value="0.8" id="volumeSlider" class="volume-slider">
            </div>
            <svg width="22" height="22" viewBox="0 0 24 24" style="opacity: 0.6;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>

        <div class="bottom-icons">
            <div class="bottom-icon"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 10h2v2H5zm0 4h2v2H5z"/></svg></div>
            <div class="bottom-icon"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg></div>
            <div class="bottom-icon" id="menuBtn"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></div>
        </div>

        <div class="drawer" id="drawer">
            <div class="drawer-header">
                <span class="drawer-title">On Demand</span>
                <button class="close-drawer" id="closeDrawer">Done</button>
            </div>
            <div class="episode-list" id="episodeList">
                </div>
        </div>
    </div>
    
    <canvas id="colorCanvas" style="display:none;"></canvas>

    <script>
        // --- CONFIGURAÇÕES ---
        const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
        const ZENO_ID = "hvwifp8ezc6tv"; 
        const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";
        
        // --- IMAGENS LOCAIS ---
        const IMG_DEFAULT = "image/logopraisefm.webp"; 
        const IMG_COMMERCIAL = "image/commercial break.png";
        const IMG_SPOT = "image/spot.webp";

        // --- LISTA ON DEMAND (MANTENHA OS SEUS LINKS MP3/IMG AQUI) ---
        const episodes = [
            {
                title: "Morning Prayer",
                artist: "Pastor John",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // Link MP3 Exemplo
                img: "https://images.unsplash.com/photo-1445445290350-16a3b8541d5c?w=200&fit=crop"
            },
            {
                title: "Worship Session #42",
                artist: "Praise Team",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", // Link MP3 Exemplo
                img: "https://images.unsplash.com/photo-1510915361894-db8b60106cb1?w=200&fit=crop"
            }
        ];

        // --- DOM ELEMENTS ---
        const audio = new Audio(STREAM_URL);
        const playPauseBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const artContainer = document.getElementById('artContainer');
        const volumeSlider = document.getElementById('volumeSlider');
        const volFill = document.getElementById('volFill');
        const albumArtEl = document.getElementById('albumArt');
        const trackNameEl = document.getElementById('trackName');
        const artistNameEl = document.getElementById('artistName');
        const bgBlur = document.getElementById('bgBlur');
        const clockDisplay = document.getElementById('clockDisplay');
        
        // On Demand Elements
        const drawer = document.getElementById('drawer');
        const menuBtn = document.getElementById('menuBtn');
        const closeDrawer = document.getElementById('closeDrawer');
        const episodeList = document.getElementById('episodeList');
        const liveBadge = document.getElementById('liveBadge');
        const timeDisplay = document.getElementById('timeDisplay');
        const seekSlider = document.getElementById('seekSlider');
        const progressFill = document.getElementById('progressFill');
        const btnBackLive = document.getElementById('btnBackLive');
        
        // NOVO: Botão de Letras
        const lyricsBtn = document.getElementById('lyricsBtn');

        // Canvas para pegar cores
        const colorCanvas = document.getElementById('colorCanvas');
        const ctx = colorCanvas.getContext('2d', { willReadFrequently: true });

        let isPlaying = false;
        let isLive = true;
        let eventSource = null;

        // --- INICIALIZAR ---
        setupZenoMetadata();
        renderEpisodes();
        updateChicagoTime();
        setInterval(updateChicagoTime, 1000);
        // Garante que o estado inicial é LIVE com o logo padrão
        setMedia(IMG_DEFAULT, "Praise FM", "Live from Chicago");

        // --- LISTENERS E FUNÇÕES AUXILIARES ---

        // Ouve quando a imagem do álbum termina de carregar para atualizar o fundo
        albumArtEl.onload = () => {
            const currentSrc = albumArtEl.src;
            if (currentSrc) {
                updateBlurredBackground(currentSrc);
            }
        };

        // --- CONTROLES PRINCIPAIS ---
        playPauseBtn.addEventListener('click', togglePlay);
        
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                artContainer.classList.add('paused');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            } else {
                audio.play();
                isPlaying = true;
                artContainer.classList.remove('paused');
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            }
        }

        // Volume
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
            volFill.style.width = (e.target.value * 100) + '%';
        });

        // --- LÓGICA DE FUNDO (BLUR) ---
        
        // Função para extrair a cor dominante de uma imagem
        async function getColorFromImage(imgUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous"; // Tenta resolver CORS
                img.src = imgUrl;

                img.onload = () => {
                    try {
                        colorCanvas.width = 1; 
                        colorCanvas.height = 1;
                        ctx.drawImage(img, 0, 0, 1, 1); 
                        const pixelData = ctx.getImageData(0, 0, 1, 1).data;
                        const color = `rgb(${pixelData[0]}, ${pixelData[1]}, ${pixelData[2]})`;
                        resolve(color);
                    } catch (e) {
                        reject(null); // Falha na leitura (Provável CORS Block)
                    }
                };
                img.onerror = () => reject(null);
            });
        }
        
        // Função principal para atualizar o fundo borrado
        function updateBlurredBackground(imgSrc) {
            // Verifica se é uma das imagens LOCAIS (Commercial ou Logo Padrão)
            if (imgSrc.includes(encodeURI(IMG_COMMERCIAL))) {
                 // Fundo Cinza para Comercial
                 bgBlur.style.background = `radial-gradient(circle at 50% 30%, #333, #000)`; 
            } else if (imgSrc.includes(encodeURI(IMG_DEFAULT)) || imgSrc.includes(encodeURI(IMG_SPOT))) {
                 // Fundo Vermelho Padrão para Logo e Spot
                 bgBlur.style.background = `radial-gradient(circle at 50% 30%, #8b0000, #000)`; 
            } else {
                // Tenta pegar a cor da capa se for uma música (Dynamic Color)
                getColorFromImage(imgSrc).then(color => {
                    if (color) {
                        // Sucesso: Aplica a cor dominante suavizada
                        bgBlur.style.background = `radial-gradient(circle at 50% 30%, ${color}, #000)`;
                    } else {
                        // Fallback 1: Falha no CORS. Usa uma cor suave genérica para a música
                        bgBlur.style.background = `radial-gradient(circle at 50% 30%, #5a1e1e, #000)`; 
                    }
                }).catch(() => {
                    // Fallback 2: Erro de API/conexão. Usa a mesma cor suave.
                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, #5a1e1e, #000)`; 
                });
            }
        }


        // --- LÓGICA LIVE VS ON DEMAND ---

        // Função unificada para definir o estado da mídia (Live ou On Demand)
        function setMedia(imageUrl, trackTitle, artistName, audioSource = STREAM_URL) {
            trackNameEl.innerText = trackTitle;
            artistNameEl.innerText = artistName;
            
            if (albumArtEl.src !== imageUrl) {
                albumArtEl.src = imageUrl; 
            } else {
                updateBlurredBackground(imageUrl);
            }

            if (audio.src !== audioSource) {
                audio.src = audioSource;
            }
        }

        // 1. Voltar para LIVE
        btnBackLive.addEventListener('click', goLive);

        function goLive() {
            isLive = true;
            btnBackLive.style.display = 'none';
            liveBadge.style.display = 'flex';
            timeDisplay.style.display = 'none';
            seekSlider.style.display = 'none';
            
            audio.src = STREAM_URL;
            audio.play();
            isPlaying = true;
            updateUIState(true);
            
            if(!eventSource) setupZenoMetadata();
            
            // Define o estado inicial do live com a imagem padrão
            setMedia(IMG_DEFAULT, "Praise FM", "Live from Chicago");
        }

        // 2. Tocar Episódio On Demand
        function playEpisode(index) {
            const ep = episodes[index];
            isLive = false;

            if(eventSource) {
                eventSource.close();
                eventSource = null;
            }

            setMedia(ep.img || IMG_DEFAULT, ep.title, ep.artist, ep.url);
            
            btnBackLive.style.display = 'inline-block';
            liveBadge.style.display = 'none';
            timeDisplay.style.display = 'block';
            seekSlider.style.display = 'block';
            
            audio.play();
            isPlaying = true;
            updateUIState(true);
            
            drawer.classList.remove('open');
        }

        // 3. Barra de Progresso (On Demand)
        audio.addEventListener('timeupdate', () => {
            if (!isLive && audio.duration && isFinite(audio.duration)) {
                const pct = (audio.currentTime / audio.duration) * 100;
                seekSlider.value = pct;
                progressFill.style.width = pct + "%";
                timeDisplay.innerText = formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
            }
        });

        seekSlider.addEventListener('input', (e) => {
            if (!isLive && audio.duration && isFinite(audio.duration)) {
                const seekTime = (e.target.value / 100) * audio.duration;
                audio.currentTime = seekTime;
            }
        });

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return min + ":" + (sec < 10 ? "0" + sec : sec);
        }
        
        function skip(sec) {
            if (!isLive && audio.duration) {
                audio.currentTime += sec;
            }
        }

        function updateUIState(playing) {
            if(playing) {
                artContainer.classList.remove('paused');
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            } else {
                artContainer.classList.add('paused');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            }
        }

        // --- MENU DRAWER ---
        menuBtn.addEventListener('click', () => drawer.classList.add('open'));
        closeDrawer.addEventListener('click', () => drawer.classList.remove('open'));

        function renderEpisodes() {
            episodeList.innerHTML = "";
            episodes.forEach((ep, index) => {
                const div = document.createElement('div');
                div.className = "episode-item";
                div.onclick = () => playEpisode(index);
                div.innerHTML = `
                    <img src="${ep.img}" class="ep-img">
                    <div class="ep-info">
                        <div class="ep-title">${ep.title}</div>
                        <div class="ep-desc">${ep.artist}</div>
                    </div>
                `;
                episodeList.appendChild(div);
            });
        }
        
        // --- FUNÇÃO PARA LETRAS (LYRICS) ---
        lyricsBtn.addEventListener('click', openLyrics);

        function openLyrics() {
            // Pega o nome do artista e da música atual
            const artist = artistNameEl.innerText.trim();
            const track = trackNameEl.innerText.trim();
            
            // Bloqueia se estiver em 'Praise FM - Live from Chicago' ou comercial/spot
            if (artist.includes("Praise FM") || track.toLowerCase().includes("commercial") || track.toLowerCase().includes("spot")) {
                alert("Letras não disponíveis para o Live Stream ou Jingle/Comercial.");
                return;
            }

            // Cria um URL de busca no Last.fm para as letras
            const baseUrl = "https://www.last.fm/music/";
            const searchUrl = `${baseUrl}${encodeURIComponent(artist)}/_/${encodeURIComponent(track)}/+lyrics`;

            // Abre o link em uma nova aba
            window.open(searchUrl, '_blank');
        }

        // --- RELÓGIO CHICAGO ---
        function updateChicagoTime() {
            const now = new Date();
            const options = { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true };
            clockDisplay.innerText = now.toLocaleTimeString('en-US', options);
        }

        // --- INTEGRAÇÃO ZENO / LAST.FM ---
        function setupZenoMetadata() {
            const zenoUrl = `https://api.zeno.fm/mounts/metadata/subscribe/${ZENO_ID}`;
            eventSource = new EventSource(zenoUrl);

            eventSource.onmessage = function(e) {
                if(!isLive) return;

                try {
                    const data = JSON.parse(e.data);
                    if (data.streamTitle) {
                        const fullTitle = data.streamTitle;
                        const parts = fullTitle.split(' - ');
                        let artist = "Praise FM";
                        let song = fullTitle;
                        if (parts.length >= 2) {
                            artist = parts[0].trim();
                            song = parts[1].trim();
                        }
                        updateTrackInfo(artist, song);
                    }
                } catch (error) {}
            };
        }
        
        // --- LÓGICA DE BUSCA DE METADADOS (APLICANDO FUNDO DINÂMICO) ---
        async function updateTrackInfo(artist, track) {
            if(!isLive) return;

            const artistLow = artist.toLowerCase();
            const trackLow = track.toLowerCase();
            
            let fallbackImage = IMG_DEFAULT; 

            // --- REGRA 1: COMMERCIAL BREAK (FUNDO CINZA) ---
            if (trackLow.includes("commercial") || artistLow.includes("commercial") || trackLow.includes("ad break")) {
                setMedia(IMG_COMMERCIAL, track, artist);
                return; 
            }

            // --- REGRA 2: SPOTS / JINGLES (FUNDO VERMELHO) ---
            if (trackLow.includes("spot") || artistLow.includes("spot") || trackLow.includes("station id") || artist === "Praise FM") {
                setMedia(IMG_SPOT, track, artist);
                return;
            }

            // --- REGRA 3: BUSCA NO LAST.FM (MÚSICA) ---
            
            const url = `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.track && data.track.album && data.track.album.image) {
                    const images = data.track.album.image;
                    const foundImg = images[images.length - 1]['#text'];
                    
                    if(foundImg) {
                        setMedia(foundImg, track, artist);
                        return;
                    }
                }
                
                // --- FALLBACK FINAL: SE FALHAR NO LAST.FM ---
                setMedia(fallbackImage, track, artist);

            } catch (e) { 
                setMedia(fallbackImage, track, artist);
            }
        }
    </script>
</body>
</html>
