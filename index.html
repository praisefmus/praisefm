<!-- Versão responsiva otimizada do seu HTML, mantendo o layout original (PC) e criando versão fluida e adaptada para celular.  -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Praise FM Brasil — Ouça ao Vivo</title>

    <!-- Preconnect & Fontes -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        /* ----------------------- */
        /* Variáveis Globais       */
        /* ----------------------- */
        :root {
            --primary-color: #ff527c;
            --secondary-color: #ffffff;
            --bg-color: #f0f4f8;
            --text-color: #333;
            --light-text-color: #666;
            --border-color: #eee;
            --shadow-main: 0 10px 30px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        /* ----------------------- */
        /* RESET                   */
        /* ----------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            min-height: 100vh;
        }

        /* ----------------------------- */
        /* CONTAINER GERAL (LAYOUT PC)   */
        /* ----------------------------- */
        .container {
            display: flex;
            flex-direction: row;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        /* ----------------------------- */
        /* PLAYER (ESQUERDA)             */
        /* ----------------------------- */
        .left-panel {
            flex: 2;
        }

        .player-container {
            background: var(--secondary-color);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow-main);
            text-align: center;
        }

        .show-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: var(--shadow-main);
            margin: 0 auto;
        }

        .show-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity .25s ease-in-out;
        }

        .now-playing {
            margin-top: 20px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .artist {
            font-size: 1.1rem;
            color: var(--light-text-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-play {
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            cursor: pointer;
            transition: .2s;
        }

        .btn-play:hover {
            transform: scale(1.08);
        }

        /* ----------------------------- */
        /* HISTÓRICO (DIREITA)           */
        /* ----------------------------- */
        .right-panel {
            flex: 1;
        }

        .history-container {
            background: var(--secondary-color);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-main);
            max-height: 600px;
            overflow-y: auto;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .history-item img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }

        /* ----------------------------- */
        /* 100% RESPONSIVO               */
        /* ----------------------------- */
        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .right-panel {
                width: 100%;
            }

            .player-container {
                width: 100%;
            }
        }

        @media (max-width: 500px) {
            .show-image {
                width: 150px;
                height: 150px;
            }

            .title {
                font-size: 1.4rem;
            }

            .artist {
                font-size: 1rem;
            }

            .controls {
                gap: 12px;
            }

            .btn-play {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

<body>
<div class="container">

    <!-- PAINEL ESQUERDO / PLAYER -->
    <div class="left-panel">
        <div class="player-container">
            <div class="show-image">
                <img id="coverImg" src="assets/img/logo.webp" alt="Capa do Programa">
            </div>

            <div class="now-playing">
                <h2 id="songTitle" class="title">Conectando…</h2>
                <p id="songArtist" class="artist">Aguarde</p>
            </div>

            <div class="controls">
                <button class="btn-play" id="playBtn" aria-label="Reproduzir áudio">
                    <i class="fas fa-play"></i>
                </button>
            </div>

            <audio id="audioPlayer" preload="none">
                <source src="https://stream-150.zeno.fm/eh6auq9qhc9uv?zs=yE2cM90rT5uMalyBZguZ_g" type="audio/mpeg">
            </audio>
        </div>
    </div>


    <!-- PAINEL DIREITO / HISTÓRICO -->
    <div class="right-panel">
        <div class="history-container">
            <h3 style="margin-bottom:15px; font-size:1.2rem; font-weight:600;">Tocadas Recentemente</h3>
            <div class="history-list" id="historyList" role="list"></div>
        </div>
    </div>
</div>

<script>
// -----------------------------
// PLAYER CONTROLS
// -----------------------------
const audioPlayer = document.getElementById("audioPlayer");
const playBtn = document.getElementById("playBtn");
const icon = playBtn.querySelector("i");

let playing = false;

playBtn.addEventListener("click", () => {
    playing ? audioPlayer.pause() : audioPlayer.play();
});

audioPlayer.addEventListener("play", () => {
    playing = true;
    icon.classList.replace("fa-play", "fa-pause");
});

audioPlayer.addEventListener("pause", () => {
    playing = false;
    icon.classList.replace("fa-pause", "fa-play");
});

// -----------------------------
// EVENTSOURCE: NOW PLAYING + HISTORY
// -----------------------------
function setupNowPlaying() {
    const eventSource = new EventSource("https://praisefm.onrender.com/events");

    eventSource.onmessage = function(event) {
        const data = JSON.parse(event.data);

        document.getElementById("songTitle").textContent = data.title;
        document.getElementById("songArtist").textContent = data.artist;

        const cover = document.getElementById("coverImg");
        cover.src = data.cover || "assets/img/logo.webp";

        // Atualiza histórico
        const historyList = document.getElementById("historyList");
        historyList.innerHTML = "";

        data.history.forEach(item => {
            const div = document.createElement("div");
            div.className = "history-item";

            div.innerHTML = `
                <img src="${item.cover || 'assets/img/logo.webp'}" alt="Capa">
                <div>
                    <strong>${item.title}</strong><br>
                    <span style="color:var(--light-text-color); font-size:0.85rem">${item.artist}</span>
                </div>
            `;

            historyList.appendChild(div);
        });
    }

    eventSource.onerror = function() {
        console.warn("Conexão perdida. Tentando reconectar…");
        setTimeout(setupNowPlaying, 5000);
    }
}
setupNowPlaying();
</script>

</body>
</html>
