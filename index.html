<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praise FM U.S. — Live Player</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="./image/favicon.png" />
    <link rel="apple-touch-icon" href="./image/apple-touch-icon.png" />

    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="player-container">

        <header class="header">
            <h1>Praise FM U.S.</h1>
            <p class="tagline">Praise & Worship</p>
        </header>

        <div class="cover-wrapper">
            <img id="coverArt" src="./image/logopraisefm.webp" alt="Cover" class="cover" />
        </div>

        <div class="nowplaying">
            <span id="statusText">LIVE • Connecting...</span>
            <h2 id="currentTitle">Loading...</h2>
        </div>

        <div class="controls">
            <button id="playButton" class="btn">Play</button>
            <input id="volumeControl" type="range" min="0" max="1" step="0.01" value="0.7" />
        </div>

        <section class="history">
            <h3>Recently Played</h3>
            <ul id="historyList"></ul>
        </section>

        <footer class="footer">
            LIVE • Audio Connected
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
