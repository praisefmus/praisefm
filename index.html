<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
<title>Praise FM — Praise & Worship</title>
<link rel="icon" href="./image/favicon-32x32.png">
<style>
:root{
  --accent:#ff4d00;
  --bg:#0b0b0b;
  --panel:#0f0f0f;
  --muted:#bdbdbd;
  --card:#111;
  --border:#222;
  --radius:12px;
  --shadow: 0 12px 30px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
html,body{height:100%}
body{
  background:var(--bg);
  color:#fff;
  padding:20px;
  padding-bottom:180px;
  -webkit-font-smoothing:antialiased;
}

/* Container */
.container{max-width:980px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:18px}

/* Header */
.header{ text-align:center }
.station-title{font-size:28px;font-weight:900;color:var(--accent)}
.station-desc{font-size:14px;color:var(--muted);margin-top:4px}

/* Program circle area */
.program-area{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
.program-circle{
  position:relative;
  width:clamp(260px,28vw,360px);
  height:clamp(260px,28vw,360px);
  border-radius:50%;
  overflow:hidden;
  background:var(--card);
  border:2px solid var(--border);
  box-shadow:var(--shadow);
}
.program-img{
  width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;z-index:2;
  transition:opacity .38s ease, transform .38s ease;
}

/* Progress ring (SVG) */
.progress-ring{ position:absolute; inset:0; transform:rotate(-90deg); z-index:3; pointer-events:none }
.progress-ring circle{ fill:transparent; stroke:var(--accent); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }

/* Program info */
.program-info{text-align:center;max-width:92%}
.program-title{font-weight:800;font-size:20px;margin-top:6px}
.program-host{font-size:13px;color:var(--muted);margin-top:4px}
.program-time{color:var(--accent);font-weight:700;margin-top:6px}

/* Now playing (marquee) */
.nowplaying-wrap{width:92%;overflow:hidden;margin-top:8px}
.marquee{display:inline-block;white-space:nowrap;padding-left:100%;animation:marquee 14s linear infinite}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-100%)}}

/* Play button */
.play-btn{margin-top:6px;background:var(--accent);border:none;color:#fff;padding:12px 18px;border-radius:999px;font-weight:800;cursor:pointer;box-shadow:0 10px 24px rgba(255,77,0,0.14)}

/* Recently played (BBC style) */
.recents{width:100%;margin-top:18px}
.recents h3{font-size:13px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.recents-list{display:flex;flex-direction:column;gap:6px}
.recent-item{display:grid;grid-template-columns:36px 56px 1fr;align-items:center;gap:8px;padding:8px;border-radius:8px;background:linear-gradient(180deg,#0b0b0b,#0d0d0d);border:1px solid var(--border)}
.recent-index{color:var(--muted);font-weight:700}
.recent-cover{width:56px;height:56px;border-radius:8px;object-fit:cover}
.recent-meta{font-size:14px}
.recent-title{font-weight:700}
.recent-artist{font-size:12px;color:var(--muted);margin-top:4px}

/* UP NEXT / Later Today area */
.schedule{width:100%;display:flex;gap:12px;margin-top:16px}
.card{background:var(--panel);border-radius:12px;padding:12px;border:1px solid var(--border);flex:1;min-width:0}
.card h4{font-size:13px;color:var(--muted);margin-bottom:8px}
.upnext-row{display:flex;gap:10px;align-items:center}
.upnext-cover{width:72px;height:72px;border-radius:8px;object-fit:cover}
.upnext-meta{flex:1;min-width:0}
.upnext-title{font-weight:800}
.upnext-desc{font-size:13px;color:var(--muted);margin-top:4px}

/* Bottom BBC player */
.bottom-player{
  position:fixed;left:16px;right:16px;bottom:18px;height:80px;background:linear-gradient(180deg,#0b0b0b,#0f0f0f);
  border-radius:14px;display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);box-shadow:0 16px 40px rgba(0,0,0,0.7);transform:translateY(120%);transition:transform .36s cubic-bezier(.2,.9,.2,1),opacity .2s;opacity:0;z-index:9999
}
.bottom-player.visible{transform:translateY(0);opacity:1}
.bp-cover{width:60px;height:60px;border-radius:8px;object-fit:cover}
.bp-meta{min-width:0}
.bp-title{font-weight:800}
.bp-sub{font-size:13px;color:var(--muted);margin-top:4px}
.bp-controls{display:flex;gap:12px;align-items:center;justify-content:center;flex:1}
.bp-btn{background:none;border:0;color:#fff;font-size:18px;cursor:pointer}
.bp-seek{width:240px;height:6px;background:#222;border-radius:6px;overflow:hidden}
.bp-progress{height:100%;background:var(--accent);width:0%}
.bp-volume{width:110px}

/* Responsive */
@media (max-width:820px){
  .schedule{flex-direction:column}
  .upnext-cover{width:56px;height:56px}
  .progress-ring circle{stroke-width:5}
  .bp-seek{width:120px}
  .program-title{font-size:18px}
}
@media (max-width:520px){
  body{padding:12px;padding-bottom:140px}
  .program-circle{width:200px;height:200px}
  .program-title{font-size:16px}
  .recents-list{gap:4px}
  .bp-seek{width:90px}
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="station-title">Praise FM</div>
    <div class="station-desc">Praise &amp; Worship</div>
  </header>

  <main class="program-area">
    <div class="program-circle" id="programCircle">
      <svg class="progress-ring" id="svgRing" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet">
        <circle id="progCircle" cx="120" cy="120" r="112"></circle>
      </svg>
      <img id="circleImg" class="program-img" src="/image/morningshowlogo.webp" alt="Program art">
    </div>

    <div class="program-info">
      <div id="programTime" class="program-time">--:-- - --:--</div>
      <div id="programTitle" class="program-title">Loading Program</div>
      <div id="programHost" class="program-host"></div>
      <div class="nowplaying-wrap"><div id="nowPlaying" class="marquee">Carregando...</div></div>
    </div>

    <button id="mainPlay" class="play-btn">▶ Play</button>
  </main>

  <section class="recents">
    <h3>Recent Tracks</h3>
    <div id="recentsList" class="recents-list"></div>
  </section>

  <section class="schedule">
    <div class="card" id="upNextCard">
      <h4>UP NEXT</h4>
      <div id="upNextRow" class="upnext-row">
        <img id="upNextCover" class="upnext-cover" src="/image/middaygracelogo.webp" alt="up next">
        <div class="upnext-meta">
          <div id="upNextTitle" class="upnext-title">—</div>
          <div id="upNextDesc" class="upnext-desc">—</div>
        </div>
      </div>
    </div>

    <div class="card" id="laterCard">
      <h4>Later Today</h4>
      <div id="laterList"></div>
    </div>
  </section>
</div>

<!-- bottom player -->
<div id="bottomPlayer" class="bottom-player" aria-hidden="true">
  <img id="bpCover" class="bp-cover" src="/image/morningshowlogo.webp" alt="cover">
  <div class="bp-meta">
    <div id="bpTitle" class="bp-title">Praise FM</div>
    <div id="bpSub" class="bp-sub">Live Stream</div>
  </div>

  <div class="bp-controls">
    <button id="bpRew" class="bp-btn" title="Rewind">⟲</button>
    <button id="bpPlay" class="bp-btn" title="Play">▶</button>
    <button id="bpFwd" class="bp-btn" title="Forward">⟳</button>
    <div class="bp-seek"><div id="bpProgress" class="bp-progress"></div></div>
  </div>

  <div style="width:14px"></div>
  <input id="bpVolume" class="bp-volume" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
</div>

<!-- audio element -->
<audio id="streamAudio" preload="none" src="https://stream.zeno.fm/hvwifp8ezc6tv"></audio>

<script>
/* ================== CONFIG & ASSETS ================== */
const TZ = "America/Chicago";
const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
const ZENO_ID = "hvwifp8ezc6tv";
const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";

/* Program definitions with hosts and descriptions */
const PROGRAMS = [
  { name: "Midnight Grace", host: "Praise FM Hosts", start:0, end:6, img:"/image/midnightgracelogo.webp", desc: "Worship to rest your soul." },
  { name: "Music Only", host: "", start:6, end:7, img:"/image/logopraisefm.webp", desc: "Music block" },
  { name: "Morning Show", host: "with Stancy Campbell", start:7, end:12, img:"/image/morningshowlogo.webp", desc: "Start your day with joy, community and praise!" },
  // 12:00 - 12:30 can be Future Artists or Classics depending on day; we'll handle via TIMES below
  { name: "Midday Grace", host: "with Michael Grace", start:12.5, end:16, img:"/image/middaygracelogo.webp", desc: "Inspiration and encouragement through your afternoon." },
  { name: "Praise FM Non Stop", host: "", start:16, end:17, img:"/image/praisefmnonstop.webp", desc: "Continuous praise" },
  { name: "Carpool", host: "with Rachael Harris", start:18, end:20, img:"/image/praisefmcarpoollogo.webp", desc: "Praise FM drives you home!" },
  { name: "Praise FM POP", host: "", start:22, end:22.5, img:"/image/praisefmpoplogo.webp", desc: "Today’s top Christian hits." }
];

/* Special 30-min shows */
const TIMES = [
  { name: "Future Artists", host: "with Sarah Jordan", days:[1,3,5], times:[{start:12,end:12.5},{start:20,end:20.5}], img:"/image/praisefmfutureartistslogo.webp", desc:"Discover the next voices of Praise FM." },
  { name: "Classics", host: "with Scott Turner", days:[2,4,6], times:[{start:12,end:12.5},{start:20,end:20.5}], img:"/image/praisefmclassiclogo.webp", desc:"Remember the worship that marked generations." },
  { name: "Living The Message", host: "", days:null, times:[{start:9,end:9.5},{start:10,end:10.5}], img:"/image/livingthemessage.webp", desc:"Daily messages to strengthen faith." },
  { name: "Sunday With Christ", host: "with Matt Riley", days:[0], times:[{start:7,end:12}], img:"/image/sundaywithchristlogo.webp", desc:"A special Sunday worship block." }
];

/* DOM */
const circleImg = document.getElementById("circleImg");
const progTitle = document.getElementById("programTitle");
const progHost = document.getElementById("programHost");
const progTime = document.getElementById("programTime");
const circle = document.getElementById("progCircle");
const svgRing = document.getElementById("svgRing");
const nowPlaying = document.getElementById("nowPlaying");
const mainPlay = document.getElementById("mainPlay");
const recentsList = document.getElementById("recentsList");
const upNextCover = document.getElementById("upNextCover");
const upNextTitle = document.getElementById("upNextTitle");
const upNextDesc = document.getElementById("upNextDesc");
const laterList = document.getElementById("laterList");
const bottomPlayer = document.getElementById("bottomPlayer");
const bpCover = document.getElementById("bpCover");
const bpTitle = document.getElementById("bpTitle");
const bpSub = document.getElementById("bpSub");
const bpPlay = document.getElementById("bpPlay");
const bpProgress = document.getElementById("bpProgress");
const bpVolume = document.getElementById("bpVolume");
const streamAudio = document.getElementById("streamAudio");

/* State */
let RECENTS = []; // {track,artist,cover}
const MAX_RECENTS = 4;
let progInterval = null;
let songInterval = null;

/* Helpers - Chicago time */
function nowChicago(){ return new Date(new Date().toLocaleString("en-US",{timeZone:TZ})); }
function getFloatHour(d){ return d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600; }

/* Utility to find current program including 30-min blocks and Sunday override */
function findProgram(now){
  const day = now.getDay(); // 0 sun
  const h = getFloatHour(now);

  // Check TIMES 30-min shows first (priority)
  for(const s of TIMES){
    if(s.times){
      for(const t of s.times){
        if(h >= t.start && h < t.end){
          if(s.days && !s.days.includes(day)) continue;
          return { name:s.name, host: s.host, start:t.start, end:t.end, img:s.img, desc:s.desc, isProgram:true };
        }
      }
    }
  }

  // Sunday special: Sunday With Christ replaces Morning Show when day==0 and falls in times
  for(const s of TIMES){
    if(s.name === "Sunday With Christ" && day === 0){
      for(const t of s.times){
        if(h >= t.start && h < t.end) return { name:s.name, host:s.host, start:t.start, end:t.end, img:s.img, desc:s.desc, isProgram:true };
      }
    }
  }

  // Check main PROGRAMS
  for(const p of PROGRAMS){
    if(h >= p.start && h < p.end){
      // If it's mid-day 12-12.5 we may be overridden by TIMES above
      return { name:p.name, host:p.host, start:p.start, end:p.end, img:p.img, desc:p.desc, isProgram: p.name !== "Music Only" };
    }
  }

  // fallback
  return { name:"Praise FM", host:"", start:0, end:24, img:"/image/logopraisefm.webp", desc:"Praise & Worship", isProgram:false };
}

/* Update UI for program + up next + later */
function updateProgramUI(){
  const now = nowChicago();
  const p = findProgram(now);

  // Title and host
  progTitle.textContent = p.host ? `${p.name} ${p.host}` : p.name;
  progHost.textContent = "";
  progTime.textContent = `${formatTime(p.start)} - ${formatTime(p.end)}`;

  // Program image fixed
  circleImg.src = p.img || "/image/logopraisefm.webp";
  bpCover.src = p.img || "/image/logopraisefm.webp";
  bpTitle.textContent = p.name;
  bpSub.textContent = p.host || "Praise FM Hosts";

  // Up next: find next item after current time
  const next = findNextProgram(now);
  if(next){
    upNextCover.src = next.img || "/image/logopraisefm.webp";
    upNextTitle.textContent = next.host ? `${next.name} ${next.host}` : next.name;
    upNextDesc.textContent = next.desc || "";
  } else {
    upNextCover.src = "/image/logopraisefm.webp";
    upNextTitle.textContent = "—";
    upNextDesc.textContent = "";
  }

  // Build later list (next 6 items)
  buildLaterList(now);
}

/* format float hour to HH:MM */
function formatTime(f){
  const h = Math.floor(f);
  const m = Math.round((f - h) * 60);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

/* find next program after now */
function findNextProgram(now){
  const day = now.getDay();
  const h = getFloatHour(now);
  let candidates = [];

  // gather all slots for today from TIMES and PROGRAMS
  for(const s of TIMES){
    if(s.times){
      for(const t of s.times){
        if(s.days && !s.days.includes(day)) continue;
        if(t.start > h) candidates.push({ name:s.name, host:s.host, start:t.start, end:t.end, img:s.img, desc:s.desc });
      }
    }
  }
  for(const p of PROGRAMS){
    if(p.start > h) candidates.push({ name:p.name, host:p.host, start:p.start, end:p.end, img:p.img, desc:p.desc });
  }
  candidates.sort((a,b)=>a.start-b.start);
  return candidates.length ? candidates[0] : null;
}

/* build Later Today list */
function buildLaterList(now){
  laterList.innerHTML = "";
  const day = now.getDay();
  const h = getFloatHour(now);
  let upcoming = [];

  // add TIMES occurrences today after now
  for(const s of TIMES){
    if(s.times){
      for(const t of s.times){
        if(s.days && !s.days.includes(day)) continue;
        if(t.start > h) upcoming.push({start:t.start,end:t.end,name:s.name,host:s.host,img:s.img,desc:s.desc});
      }
    }
  }
  // add PROGRAMS today after now
  for(const p of PROGRAMS){
    if(p.start > h) upcoming.push({start:p.start,end:p.end,name:p.name,host:p.host,img:p.img,desc:p.desc});
  }
  upcoming.sort((a,b)=>a.start-b.start);
  upcoming.slice(0,6).forEach(u=>{
    const el = document.createElement("div");
    el.style.padding="6px 0";
    el.innerHTML = `<div style="font-weight:800">${formatTime(u.start)} — ${formatTime(u.end)} · ${u.name} ${u.host||""}</div><div style="color:var(--muted);font-size:13px">${u.desc||""}</div>`;
    laterList.appendChild(el);
  });
}

/* ========== Progress ring (program progress) ========== */
function updateProgressRing(){
  const now = nowChicago();
  const p = findProgram(now);
  const svg = document.getElementById("svgRing");
  const circle = document.getElementById("progCircle");

  if(!p.isProgram){
    // hide ring; show music/product art instead
    svg.style.display="none";
    return;
  }
  svg.style.display="block";

  // compute progress
  const h = getFloatHour(now);
  const progMinutes = (p.end - p.start) * 60;
  const elapsed = (h - p.start) * 60;
  let progress = Math.max(0, Math.min(1, elapsed / progMinutes));

  // compute radius based on rendered size
  const bbox = svg.getBoundingClientRect();
  // use circle r attribute (we set default 112 for 240 viewBox). We'll calculate based on element width.
  const cw = bbox.width;
  const radius = (cw/2) - 8; // padding
  const circumference = 2 * Math.PI * radius;

  // set circle attributes to reflect size
  circle.setAttribute("cx", cw/2);
  circle.setAttribute("cy", cw/2);
  circle.setAttribute("r", radius);
  circle.style.strokeDasharray = `${circumference} ${circumference}`;
  circle.style.strokeDashoffset = String(Math.max(0, circumference - progress * circumference));
}

/* ========== Zeno metadata listening (streamTitle) ========== */
function setupZeno(){
  try {
    const es = new EventSource(`https://api.zeno.fm/mounts/metadata/subscribe/${ZENO_ID}`);
    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if(data.streamTitle){
          // typical format "Artist - Track" or "Artist - Track - extra"
          const parts = data.streamTitle.split(" - ");
          const artist = parts[0] ? parts[0].trim() : "";
          const track = parts.slice(1).join(" - ").trim();
          onTrackMetadata(artist, track);
        }
      } catch(err){}
    };
    es.onerror = ()=>{};
  } catch(e){
    console.warn("EventSource not available", e);
  }
}

/* ========== Track metadata handling ========== */
async function onTrackMetadata(artist, track){
  // filter non-musical metadata
  const low = (artist + " " + track).toLowerCase();
  const block = ["commercial","spot","station id","ad break","jingle","promo"];
  if(!track || block.some(b=>low.includes(b))){
    // no music — restore program image in bottom
    const p = findProgram(nowChicago());
    bpCover.src = p.img || "/image/logopraisefm.webp";
    nowPlaying.textContent = "";
    return;
  }

  // fetch cover from Last.fm (best effort)
  let cover = "/image/logopraisefm.webp";
  try {
    const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`);
    const data = await res.json();
    if(data && data.track){
      const imgs = data.track.album && data.track.album.image;
      if(imgs && imgs.length){
        const imgObj = imgs.find(i=>i.size==="extralarge") || imgs[imgs.length-1];
        if(imgObj && imgObj["#text"]) cover = imgObj["#text"];
      }
    }
  } catch(e){
    console.warn("Last.fm failed", e);
  }

  // update now playing marquee
  nowPlaying.innerHTML = `<div class="marquee">${artist} — ${track}</div>`;

  // update bottom player cover to music cover
  bpCover.src = cover;

  // add to recents (cover adds)
  addToRecents(track, artist, cover);
}

/* ========== Recents handling ========== */
function addToRecents(track, artist, cover){
  // block non-music
  const key = (track + artist).toLowerCase();
  const block = ["commercial","spot","promo","jingle"];
  if(block.some(b=> key.includes(b))) return;

  // dedupe top
  if(RECENTS.length && RECENTS[0].track === track && RECENTS[0].artist === artist) return;
  RECENTS.unshift({track,artist,cover});
  if(RECENTS.length > MAX_RECENTS) RECENTS.splice(MAX_RECENTS);
  renderRecents();
}
function renderRecents(){
  recentsList.innerHTML = "";
  RECENTS.forEach((r,i)=>{
    const div = document.createElement("div");
    div.className = "recent-item";
    div.innerHTML = `<div class="recent-index">${i+1}</div><img class="recent-cover" src="${r.cover}" alt=""><div class="recent-meta"><div class="recent-title">${r.track}</div><div class="recent-artist">${r.artist}</div></div>`;
    recentsList.appendChild(div);
  });
}

/* ========== Bottom player controls ========== */
function showBottomPlayer(){ bottomPlayer.classList.add("visible"); bottomPlayer.classList.add("visible"); bottomPlayer.setAttribute("aria-hidden","false"); }
function hideBottomPlayer(){ bottomPlayer.classList.remove("visible"); bottomPlayer.setAttribute("aria-hidden","true"); }

mainPlay.addEventListener("click", async ()=>{
  // play stream and show bottom
  try {
    if(streamAudio.src !== STREAM_URL) streamAudio.src = STREAM_URL;
    await streamAudio.play();
    showBottomPlayer();
    // update play buttons
    bpPlay.textContent = "❚❚";
    mainPlay.textContent = "Pause";
  } catch(e){
    // if autoplay blocked, just show bottom player so user can start there
    showBottomPlayer();
  }
});

bpPlay.addEventListener("click", ()=>{
  if(streamAudio.paused){ streamAudio.play(); bpPlay.textContent="❚❚"; mainPlay.textContent="Pause"; } else { streamAudio.pause(); bpPlay.textContent="▶"; mainPlay.textContent="Play"; }
});
bpRew.addEventListener("click", ()=>{ try{ streamAudio.currentTime = Math.max(0,(streamAudio.currentTime||0)-20); }catch(e){} });
bpFwd.addEventListener("click", ()=>{ try{ streamAudio.currentTime = (streamAudio.currentTime||0)+20; }catch(e){} });
bpVolume.addEventListener("input",(e)=>{ streamAudio.volume = Number(e.target.value); });

/* show scroll marquee only if text wider than container — handled by CSS animation */

/* ========= Initialization & intervals ========= */
function tick(){
  updateProgramUI();
  updateProgressRing();
  // no need to call metadata here; EventSource listens to Zeno
}
tick();
setInterval(tick, 60000); // update every minute

// Setup Zeno metadata listener
setupZeno();

// Expose helpers for console debugging
window.PraiseFM = { findProgram, updateProgramUI, updateProgressRing, addToRecents, RECENTS };

</script>
</body>
</html>
