<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praise FM - Chicago Live</title>
    
    <link rel="icon" type="image/png" href="imagem/favicon.png">

    <style>
        /* --- CSS (DESIGN) --- */
        :root {
            --primary-color: #fff;
            --secondary-color: rgba(255, 255, 255, 0.6);
            --accent-color: #ff3b30; /* Apple Red */
            --bg-gradient-1: #4a0e0e;
            --bg-gradient-2: #8b0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--primary-color);
        }

        /* Fundo com Blur Dinâmico */
        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, var(--bg-gradient-2), #000);
            filter: blur(60px);
            opacity: 0.8;
            transition: background 1s ease;
        }

        .player-container {
            width: 100%;
            max-width: 380px;
            height: 100%;
            max-height: 800px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: center;
            padding-bottom: 10px;
        }
        .grip {
            width: 40px;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* Arte do Álbum */
        .artwork-container {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            transform: scale(1);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background-color: #1a1a1a;
        }
        
        .artwork-container.paused {
            transform: scale(0.85);
            opacity: 0.8;
        }

        .artwork-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Informações da Faixa */
        .track-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .text-area {
            flex: 1;
            padding-right: 10px;
        }

        .song-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            font-size: 18px;
            color: var(--secondary-color);
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .more-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary-color);
            padding: 5px;
            font-size: 20px;
        }

        /* Barra de Progresso e Tempo */
        .progress-area {
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            position: relative;
        }

        .progress-bar-fill {
            width: 100%;
            height: 100%;
            background: var(--secondary-color);
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--secondary-color);
            margin-top: 8px;
            font-weight: 600;
        }

        /* Efeito LIVE Pulsando */
        @keyframes pulse-red {
            0% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); }
            50% { opacity: 0.5; text-shadow: none; }
            100% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); }
        }

        .live-badge {
            color: var(--accent-color);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse-red 2s infinite;
        }

        .chicago-time {
            font-variant-numeric: tabular-nums;
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .control-btn:active { transform: scale(0.9); }

        .play-btn { width: 70px; height: 70px; }
        .skip-btn { width: 40px; }

        /* Volume */
        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .volume-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            position: relative;
        }

        .volume-fill {
            position: absolute;
            height: 100%;
            background: #fff;
            border-radius: 3px;
            width: 80%;
        }

        .volume-slider {
            position: absolute;
            width: 100%;
            height: 100%;
            top:0;
            opacity:0;
            cursor:pointer;
        }

        /* Rodapé */
        .bottom-icons {
            display: flex;
            justify-content: space-around;
            color: var(--secondary-color);
        }
        
        svg { fill: currentColor; }
    </style>
</head>
<body>

    <div class="background-blur" id="bgBlur"></div>

    <div class="player-container">
        <div class="top-bar">
            <div class="grip"></div>
        </div>

        <div class="artwork-container paused" id="artContainer">
            <img src="imagem/logo.png" alt="Album Art" class="artwork-img" id="albumArt" onerror="this.src='imagem/logo.png'">
        </div>

        <div class="track-info">
            <div class="text-area">
                <div class="song-title" id="trackName">Praise FM</div>
                <div class="artist-name" id="artistName">Live from Chicago</div>
            </div>
            <button class="more-btn">•••</button>
        </div>

        <div class="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="time-info">
                <div class="live-badge">
                    <div class="live-dot"></div>
                    LIVE
                </div>
                <span class="chicago-time" id="clockDisplay">--:--</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn skip-btn">
                <svg width="35" height="35" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button class="control-btn play-btn" id="playPauseBtn">
                <svg id="iconPlay" width="55" height="55" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" style="display:none;" width="55" height="55" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <button class="control-btn skip-btn">
                <svg width="35" height="35" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>

        <div class="volume-area">
            <svg width="18" height="18" viewBox="0 0 24 24" style="opacity: 0.6;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <div class="volume-track">
                <div class="volume-fill" id="volFill"></div>
                <input type="range" min="0" max="1" step="0.01" value="0.8" id="volumeSlider" class="volume-slider">
            </div>
            <svg width="22" height="22" viewBox="0 0 24 24" style="opacity: 0.6;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>

        <div class="bottom-icons">
            <div class="bottom-icon">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 10h2v2H5zm0 4h2v2H5z"/></svg>
            </div>
            <div class="bottom-icon">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
            </div>
            <div class="bottom-icon">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
        const ZENO_ID = "hvwifp8ezc6tv"; // ID extraído da URL
        const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";
        const DEFAULT_IMAGE = "imagem/logo.png"; // Sua logo local

        // --- DOM ELEMENTS ---
        const audio = new Audio(STREAM_URL);
        const playPauseBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const artContainer = document.getElementById('artContainer');
        const volumeSlider = document.getElementById('volumeSlider');
        const volFill = document.getElementById('volFill');
        const albumArtEl = document.getElementById('albumArt');
        const trackNameEl = document.getElementById('trackName');
        const artistNameEl = document.getElementById('artistName');
        const bgBlur = document.getElementById('bgBlur');
        const clockDisplay = document.getElementById('clockDisplay');

        let isPlaying = false;

        // 1. Play/Pause
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                artContainer.classList.add('paused');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            } else {
                audio.play();
                isPlaying = true;
                artContainer.classList.remove('paused');
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            }
        });

        // 2. Volume
        volumeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audio.volume = val;
            volFill.style.width = (val * 100) + '%';
        });

        // 3. Relógio Chicago
        function updateChicagoTime() {
            const now = new Date();
            const options = { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true };
            clockDisplay.innerText = now.toLocaleTimeString('en-US', options);
        }
        setInterval(updateChicagoTime, 1000);
        updateChicagoTime();

        // 4. CONEXÃO ZENO FM (Recuperar Metadados)
        function setupZenoMetadata() {
            // URL oficial da Zeno para updates via SSE
            const zenoUrl = `https://api.zeno.fm/mounts/metadata/subscribe/${ZENO_ID}`;
            const eventSource = new EventSource(zenoUrl);

            eventSource.onmessage = function(e) {
                try {
                    const data = JSON.parse(e.data);
                    if (data.streamTitle) {
                        // Zeno envia "Artista - Musica"
                        const fullTitle = data.streamTitle;
                        const parts = fullTitle.split(' - ');
                        
                        let artist = "Praise FM";
                        let song = fullTitle;

                        if (parts.length >= 2) {
                            artist = parts[0].trim();
                            song = parts[1].trim();
                        }

                        // Atualiza Last.FM e Tela
                        updateTrackInfo(artist, song);
                    }
                } catch (error) {
                    console.log("Aguardando metadados...");
                }
            };
        }

        // 5. Last.fm API
        async function updateTrackInfo(artist, track) {
            // Atualiza texto na tela
            trackNameEl.innerText = track;
            artistNameEl.innerText = artist;

            if(artist === "Praise FM") {
                albumArtEl.src = DEFAULT_IMAGE;
                return;
            }

            const url = `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                let imgUrl = DEFAULT_IMAGE;

                if (data.track && data.track.album && data.track.album.image) {
                    const images = data.track.album.image;
                    const foundImg = images[images.length - 1]['#text'];
                    if(foundImg) imgUrl = foundImg;
                }

                // Evita recarregar se for a mesma imagem
                if(albumArtEl.src !== imgUrl) {
                    albumArtEl.src = imgUrl;
                }
                
                // Cor de fundo
                if(imgUrl !== DEFAULT_IMAGE) {
                     bgBlur.style.background = `radial-gradient(circle at 50% 30%, #5a1e1e, #000)`;
                } else {
                     bgBlur.style.background = `radial-gradient(circle at 50% 30%, #8b0000, #000)`;
                }

            } catch (e) { 
                albumArtEl.src = DEFAULT_IMAGE;
            }
        }

        // Iniciar ouvinte da Zeno
        setupZenoMetadata();
        
        // Setar imagem inicial
        albumArtEl.src = DEFAULT_IMAGE;

    </script>
</body>
</html>
