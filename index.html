<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praise FM - Live & On Demand</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0RNK6G5WWL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0RNK6G5WWL');
    </script>
    
    <link rel="icon" type="image/png" sizes="32x32" href="./image/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./image/favicon-16x16.png">
    <link rel="shortcut icon" type="image/x-icon" href="./image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="./image/apple-touch-icon.png">

    <style>
        /* --- CSS (ESTILO BBC SOUNDS DARK) --- */
        :root {
            --primary-color: #fff;
            --secondary-color: #b3b3b3;
            --accent-color: #ff4d00; /* Laranja BBC Sounds */
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--primary-color);
        }

        /* Fundo desfocado baseado na capa */
        .background-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 30%, #222, #000);
            filter: blur(80px); 
            opacity: 0.6; 
            transition: background 1s ease;
        }

        .player-container {
            width: 100%; max-width: 450px; height: 100%; max-height: 900px;
            padding: 30px 24px; display: flex; flex-direction: column;
            align-items: center;
            position: relative; overflow-y: auto; /* Permite rolar se a tela for pequena */
        }

        /* --- 1. CÍRCULO DO PROGRAMA (TOPO) --- */
        .program-area {
            margin-top: 20px;
            margin-bottom: 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .program-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: #000;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .program-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Anel Rotativo (Indicador de Live/Playing) */
        @keyframes spin { to { transform: rotate(360deg); } }

        .program-circle.is-playing::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--accent-color);
            border-right-color: var(--accent-color);
            animation: spin 2s linear infinite;
            z-index: -1;
        }

        /* Badge LIVE dentro do círculo ou abaixo */
        .program-label {
            margin-top: 15px;
            text-align: center;
        }
        .program-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .program-status { font-size: 12px; color: var(--accent-color); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; background-color: var(--accent-color); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }


        /* --- 2. CONTROLES (MEIO) --- */
        .controls-area {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .control-btn { background: none; border: none; color: #fff; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center;}
        .control-btn:active { transform: scale(0.95); }
        
        .play-btn { 
            width: 70px; height: 70px; 
            background: var(--accent-color); 
            border-radius: 50%; 
            box-shadow: 0 5px 15px rgba(255, 77, 0, 0.4);
            color: white;
        }
        .play-btn svg { fill: white; margin-left: 4px; } /* Ajuste visual do ícone play */
        .play-btn svg.pause-icon { margin-left: 0; }
        
        .skip-btn { opacity: 0.7; }
        .skip-btn:hover { opacity: 1; }


        /* --- 3. CARTÃO "NOW PLAYING" (MÚSICA) --- */
        .now-playing-card {
            width: 100%;
            background-color: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .song-cover {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #333;
            margin-right: 15px;
        }

        .song-info {
            flex: 1;
            overflow: hidden;
        }

        .song-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .song-artist { font-size: 14px; color: var(--secondary-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        .lyrics-btn { opacity: 0.5; cursor: pointer; background:none; border:none; color:white; }
        .lyrics-btn:hover { opacity: 1; }


        /* --- EXTRAS --- */
        .volume-container { width: 100%; display: flex; align-items: center; gap: 10px; margin-top: auto; margin-bottom: 20px; opacity: 0.7; }
        .volume-slider { flex: 1; accent-color: var(--accent-color); height: 4px; }
        
        .bottom-nav { display: flex; justify-content: space-around; width: 100%; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: var(--secondary-color); cursor: pointer; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary-color); }

        /* Responsivo */
        @media (min-width: 600px) {
            .player-container { border-radius: 20px; background: rgba(0,0,0,0.3); height: 90vh; }
        }
    </style>
</head>
<body>

    <div class="background-blur" id="bgBlur"></div>

    <div class="player-container">
        
        <div class="program-area">
            <div class="program-circle" id="programCircle">
                <img src="/image/logopraisefm.webp" id="programImg" class="program-img" alt="Program Logo">
            </div>
        </div>

        <div class="program-label">
            <div class="program-status"><div class="live-dot"></div> LIVE</div>
            <div class="program-name" id="programNameDisplay">Praise FM</div>
        </div>

        <div class="controls-area">
            <button class="control-btn skip-btn" onclick="skip(-15)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
            </button>
            
            <button class="control-btn play-btn" id="playPauseBtn">
                <svg id="iconPlay" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" style="display:none;" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="pause-icon"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <button class="control-btn skip-btn" onclick="skip(15)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
            </button>
        </div>

        <div class="now-playing-card">
            <img src="/image/logopraisefm.webp" id="songCover" class="song-cover" alt="Song Cover">
            <div class="song-info">
                <div class="song-title" id="trackTitle">Loading...</div>
                <div class="song-artist" id="trackArtist">Praise FM</div>
            </div>
            <button class="lyrics-btn" id="lyricsBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </button>
        </div>

        <div class="volume-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><span>Home</span></div>
            <div class="nav-item"><span>Schedule</span></div>
            <div class="nav-item"><span>My Sounds</span></div>
        </div>

    </div>
    
    <canvas id="colorCanvas" style="display:none;"></canvas>

    <script>
        // --- CONFIGURAÇÕES ---
        const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
        const ZENO_ID = "hvwifp8ezc6tv"; 
        const LASTFM_API_KEY = "7744c8f90ee053fc761e0e23bfa00b89";

        // --- IMAGENS LOCAIS (MINÚSCULAS) ---
        const IMG_DEFAULT = "/image/logopraisefm.webp"; 
        const IMG_COMMERCIAL = "/image/commercial break.png"; 
        const IMG_SPOT = "/image/spot.webp";

        const IMG_MIDDAY_GRACE = "/image/middaygracelogo.webp"; 
        const IMG_MIDNIGHT_GRACE = "/image/midnightgracelogo.webp";
        const IMG_MORNING_SHOW = "/image/morningshowlogo.webp";
        const IMG_CARPOOL = "/image/praisefmcarpoollogo.webp"; 
        const IMG_CLASSIC = "/image/praisefmclassiclogo.webp";
        const IMG_FUTURE_ARTISTS = "/image/praisefmfutureartistslogo.webp";
        const IMG_POP = "/image/praisefmpoplogo.webp";
        const IMG_SUNDAY_MORNING = "/image/sundaymorninglogo.webp";

        // --- DOM ELEMENTS ---
        const audio = new Audio(STREAM_URL);
        const playBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        
        const programCircle = document.getElementById('programCircle');
        const programImg = document.getElementById('programImg');
        const programNameDisplay = document.getElementById('programNameDisplay');
        
        const songCover = document.getElementById('songCover');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        
        const bgBlur = document.getElementById('bgBlur');
        const colorCanvas = document.getElementById('colorCanvas');
        const ctx = colorCanvas.getContext('2d', {willReadFrequently: true});

        let isPlaying = false;

        // --- FUNÇÃO DE ATUALIZAÇÃO VISUAL (SEPARAÇÃO CLARA) ---
        
        function updateDisplay(programImage, programName, songImage, songTitle, songArtist, isMusicalTrack) {
            // 1. Atualiza o Círculo do Programa (Topo)
            if (programImg.src !== programImage && !programImg.src.endsWith(programImage)) {
                programImg.src = programImage;
            }
            programNameDisplay.innerText = programName;

            // 2. Atualiza o Cartão da Música (Baixo)
            // Proxy apenas se for externo
            let safeSongImage = songImage;
            if (!songImage.startsWith('/image/') && !songImage.startsWith('data:')) {
                safeSongImage = 'https://corsproxy.io/?' + encodeURIComponent(songImage);
            }

            if (songCover.src !== safeSongImage && !songCover.src.endsWith(safeSongImage)) {
                songCover.src = safeSongImage;
                // Atualiza o fundo colorido baseado na capa da música
                updateBackground(safeSongImage);
            }
            trackTitle.innerText = songTitle;
            trackArtist.innerText = songArtist;

            // 3. Lógica do Anel Rotativo
            // Se for música (isMusicalTrack = true), o anel gira. 
            // Se for programa falado, o anel para.
            if (isMusicalTrack && isPlaying) {
                programCircle.classList.add('is-playing');
            } else {
                programCircle.classList.remove('is-playing');
            }
        }

        // --- FUNDO COLORIDO ---
        function updateBackground(imgUrl) {
            if(imgUrl.includes('/image/')) {
                bgBlur.style.background = `radial-gradient(circle at 50% 30%, #222, #000)`;
                return;
            }
            
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = imgUrl;
            img.onload = () => {
                try {
                    colorCanvas.width = 1; colorCanvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1);
                    const [r,g,b] = ctx.getImageData(0,0,1,1).data;
                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, rgb(${r},${g},${b}), #000)`;
                } catch(e) {}
            }
        }

        // --- LÓGICA PRINCIPAL (ZENO + LAST.FM) ---
        
        async function processMetadata(artist, track) {
            const artistLow = artist.toLowerCase();
            const trackLow = track.toLowerCase();
            
            // Estado Padrão: É música, logo do programa é o da rádio
            let currentProgramImg = IMG_DEFAULT;
            let currentProgramName = "Praise FM"; // Nome padrão do programa
            let currentSongImg = IMG_DEFAULT;
            let isMusic = true;

            console.log(`Zeno: ${artist} - ${track}`);

            // --- VERIFICAÇÃO DE PROGRAMAS (REGRA 3) ---
            const programMap = {
                "midday grace": [IMG_MIDDAY_GRACE, "Midday Grace"],
                "mid-day grace": [IMG_MIDDAY_GRACE, "Midday Grace"],
                "midday": [IMG_MIDDAY_GRACE, "Midday Grace"], // Capta "Midday"
                "midnight grace": [IMG_MIDNIGHT_GRACE, "Midnight Grace"],
                "morning show": [IMG_MORNING_SHOW, "The Morning Show"],
                "carpool": [IMG_CARPOOL, "Carpool"],
                "praise fm carpool": [IMG_CARPOOL, "Carpool"],
                "classic": [IMG_CLASSIC, "Praise FM Classic"],
                "future": [IMG_FUTURE_ARTISTS, "Future Artists"],
                "pop": [IMG_POP, "Praise FM Pop"],
                "sunday": [IMG_SUNDAY_MORNING, "Sunday Morning"]
            };

            let foundProgram = false;
            for (const key in programMap) {
                if (artistLow.includes(key) || trackLow.includes(key)) {
                    currentProgramImg = programMap[key][0];
                    currentProgramName = programMap[key][1];
                    
                    // Se é um programa, a capa de baixo também recebe o logo do programa
                    // e paramos de tratar como música (sem anel, sem busca last.fm)
                    currentSongImg = programMap[key][0];
                    isMusic = false; 
                    foundProgram = true;
                    break;
                }
            }

            // --- VERIFICAÇÃO DE COMERCIAIS/SPOTS ---
            if (trackLow.includes("commercial") || trackLow.includes("ad break")) {
                updateDisplay(IMG_COMMERCIAL, "Commercial Break", IMG_COMMERCIAL, "Commercial Break", "Praise FM", false);
                return;
            }
            if (trackLow.includes("station id") || trackLow.includes("spot")) {
                updateDisplay(IMG_SPOT, "Station ID", IMG_SPOT, "Station ID", "Praise FM", false);
                return;
            }

            // --- SE FOR PROGRAMA ENCONTRADO ---
            if (foundProgram) {
                updateDisplay(currentProgramImg, currentProgramName, currentSongImg, track, artist, false);
                return;
            }

            // --- SE FOR MÚSICA (LAST.FM) ---
            // Mantém o logo do programa como "Praise FM" (IMG_DEFAULT)
            // Busca capa da música para a parte de baixo
            
            try {
                const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&format=json`);
                const data = await res.json();
                
                if (data.track && data.track.album && data.track.album.image) {
                    const img = data.track.album.image.find(i => i.size === 'extralarge')['#text'];
                    if (img) currentSongImg = img;
                }
            } catch(e) { console.log("Erro LastFM", e); }

            updateDisplay(IMG_DEFAULT, "Praise FM", currentSongImg, track, artist, true);
        }

        // --- CONTROLES DE ÁUDIO ---
        
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                programCircle.classList.remove('is-playing');
            } else {
                // Garante a URL correta
                if (audio.src !== STREAM_URL) audio.src = STREAM_URL;
                
                audio.play().then(() => {
                    isPlaying = true;
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                    // Se for música, reativa o anel
                    if (document.getElementById('programNameDisplay').innerText === "Praise FM") {
                        programCircle.classList.add('is-playing');
                    }
                }).catch(e => {
                    console.error("Autoplay prevented", e);
                    trackTitle.innerText = "Click to Play";
                });
            }
        });

        // Volume
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Lyrics
        document.getElementById('lyricsBtn').addEventListener('click', () => {
            const q = `${trackArtist.innerText} ${trackTitle.innerText}`;
            window.open(`https://genius.com/search?q=${encodeURIComponent(q)}`, '_blank');
        });

        // Inicialização Zeno
        function setupZeno() {
            const es = new EventSource(`https://api.zeno.fm/mounts/metadata/subscribe/${ZENO_ID}`);
            es.onmessage = (e) => {
                try {
                    const d = JSON.parse(e.data);
                    if (d.streamTitle) {
                        const [artist, song] = d.streamTitle.split(' - ');
                        processMetadata(artist?.trim() || "Praise FM", song?.trim() || "");
                    }
                } catch(err) {}
            };
        }

        // Skip buttons (Simulação visual)
        function skip(sec) {
            // Em rádio ao vivo não dá pra pular, mas mantemos o botão visualmente
            if(isPlaying) {
                // Efeito de feedback visual
            }
        }

        setupZeno();
    </script>
</body>
</html>
