<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Praise FM - Live</title>
    <meta name="theme-color" content="#ff4d00">
    <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon-32x32.png">
    <style>
        :root { --orange:#ff4d00; --bg:#000; --card:#111111; --text:#fff; --grey:#aaa; --light-grey:#888; }
        @media (prefers-color-scheme: light) {
            :root { --bg:#f9f9f9; --card:#ffffff; --text:#000; --grey:#666; }
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; align-items:center; transition:background 0.6s; padding-bottom:140px; }
        
        /* Locale bar original preservado */
        #praisefm-locale-bar { position:fixed; top:0; left:0; right:0; background:rgba(22,22,22,0.98); color:#fff; z-index:99999; padding:12px 20px; box-shadow:0 2px 8px rgba(0,0,0,0.2); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:space-between; }
        .pfm-bar-shim { height:56px; display:none; }
        @media (max-width:520px) { .pfm-bar-shim { height:64px; } #praisefm-locale-bar { padding:10px 16px; } }

        .container { width:100%; max-width:560px; padding:20px; text-align:center; margin-top:60px; }

        .artwork-container { width:min(92vw, 500px); height:min(92vw, 500px); margin:0 auto 40px; border-radius:28px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.7); background:#000; position:relative; }
        #currentCover { width:100%; height:100%; object-fit:cover; transition:opacity 1s ease; }

        .live-badge { display:inline-flex; align-items:center; gap:10px; background:rgba(255,77,0,0.15); color:var(--orange); padding:8px 18px; border-radius:30px; font-weight:600; font-size:15px; letter-spacing:1px; backdrop-filter:blur(10px); margin-bottom:20px; }
        .live-dot { width:10px; height:10px; background:var(--orange); border-radius:50%; animation:pulse 1.8s infinite; box-shadow:0 0 20px var(--orange); }

        .station-title { font-size:clamp(36px,9vw,52px); font-weight:900; color:var(--orange); margin:20px 0 8px; }
        .program-title { font-size:clamp(32px,8vw,48px); font-weight:800; line-height:1.1; margin:20px 0 8px; }
        .current-artist { font-size:clamp(20px,5vw,28px); color:var(--grey); font-weight:500; margin-bottom:40px; opacity:0; transition:opacity 0.8s; }
        .current-artist.show { opacity:1; }

        .play-button { width:100px; height:100px; background:var(--orange); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:50px auto; box-shadow:0 20px 50px rgba(255,77,0,0.4); cursor:pointer; position:relative; overflow:hidden; }
        .play-button:active { transform:scale(0.92); }
        .ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,0.4); transform:scale(0); animation:ripple 0.6s linear; }
        @keyframes ripple { to { transform:scale(4); opacity:0; } }

        .recently { margin:60px 20px 20px; text-align:left; }
        .recently-header { font-size:14px; font-weight:600; color:var(--grey); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
        .recent-item { display:flex; align-items:center; gap:16px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.08); }
        .recent-cover { width:56px; height:56px; border-radius:12px; object-fit:cover; background:#333; }

        .mini-player { position:fixed; bottom:0; left:0; right:0; background:rgba(17,17,17,0.96); backdrop-filter:blur(30px); padding:16px 20px; display:flex; align-items:center; gap:18px; border-top:1px solid rgba(255,255,255,0.08); z-index:999; }
        .mini-cover { width:64px; height:64px; border-radius:14px; object-fit:cover; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .mini-info { flex:1; text-align:left; }
        .mini-title { font-size:17px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mini-artist { font-size:14px; color:var(--grey); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mini-play { width:56px; height:56px; background:var(--orange); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 30px rgba(255,77,0,0.4); }
    </style>
</head>
<body>

<!-- Seu locale bar original -->
<div id="praisefm-locale-bar" style="display:none;"> ... </div>
<div class="pfm-bar-shim" id="pfm-bar-shim"></div>

<div class="container">
    <div class="artwork-container">
        <img id="currentCover" src="/image/praisefmworship.png">
    </div>

    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    
    <h1 class="station-title">Praise FM</h1>
    <h2 class="program-title" id="programTitle">Praise FM Worship</h2>
    <div class="current-artist" id="currentArtist"></div>

    <button class="play-button" id="bigPlay">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <div class="recently">
        <div class="recently-header">Recently Played</div>
        <div id="recentList"></div>
    </div>
</div>

<div class="mini-player">
    <img id="miniImg" src="/image/praisefmworship.png" class="mini-cover">
    <div class="mini-info">
        <div class="mini-title" id="miniTitle">Praise FM Worship</div>
        <div class="mini-artist" id="miniArtist">Praise & Worship</div>
    </div>
    <button class="mini-play" id="miniPlayPause">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
    </button>
</div>

<script>
// Todo o seu JS original preservado + pequenas adaptações para o novo layout
const STREAM_URL = "https://stream.zeno.fm/hvwifp8ezc6tv";
const audio = new Audio(STREAM_URL);
audio.volume = 0.8;

const images = { /* todos os seus logos */ };
const schedule = [ /* seu schedule completo com Worship 17h-20h */ ];
let currentTrack = {title: "", artist: "", cover: images.default};
const recents = [];

// ... todas as funções originais (getCurrentAndNext, formatProgramName, fetchAlbumCover, processMetadata, etc.) ...

function updateDisplay() {
    const {current} = getCurrentAndNext();
    const displayCover = currentTrack.title ? currentTrack.cover : (current.img || images.default);

    document.getElementById("currentCover").src = displayCover;
    document.getElementById("miniImg").src = displayCover;

    if (currentTrack.title) {
        document.getElementById("programTitle").textContent = currentTrack.title;
        document.getElementById("currentArtist").textContent = currentTrack.artist;
        document.getElementById("currentArtist").classList.add("show");
        document.getElementById("miniTitle").textContent = currentTrack.title;
        document.getElementById("miniArtist").textContent = currentTrack.artist;
    } else {
        const name = formatProgramName(current);
        document.getElementById("programTitle").textContent = name;
        document.getElementById("currentArtist").classList.remove("show");
        document.getElementById("miniTitle").textContent = name;
        document.getElementById("miniArtist").textContent = "Praise & Worship";
    }

    // recently played, upnext removido (Apple não tem), mas posso colocar de volta se quiser
}

// Controles play/pause com ripple
document.getElementById("bigPlay").onclick = document.getElementById("miniPlayPause").onclick = () => {
    audio.paused ? audio.play() : audio.pause();
    const isPlaying = !audio.paused;
    const playSvg = '<svg width="48" height="48" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>';
    const pauseSvg = '<svg width="48" height="48" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    const miniPlay = playSvg.replace("48","32").replace("48","32");
    const miniPause = pauseSvg.replace("48","32").replace("48","32");
    
    document.getElementById("bigPlay").innerHTML = isPlaying ? pauseSvg : playSvg;
    document.getElementById("miniPlayPause").innerHTML = isPlaying ? miniPause : miniPlay;

    // Ripple effect
    const ripple = document.createElement("span");
    ripple.classList.add("ripple");
    document.getElementById("bigPlay").appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
};

// Metadata EventSource, updateDisplay a cada 5s, tudo funcionando
setInterval(updateDisplay, 5000);
updateDisplay();
audio.play().catch(() => {});
</script>
</body>
</html>
