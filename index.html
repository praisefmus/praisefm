<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Praise FM — Apple Music Style Player</title>

  <!-- FAVICONS (coloque os arquivos na pasta /image/) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/image/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/image/apple-touch-icon.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- dynamic blurred background taken from the cover -->
  <div id="bg" class="backdrop" aria-hidden="true"></div>

  <main class="page-wrap">
    <div class="player-card" role="region" aria-label="Praise FM Player">
      <div class="cover-area">
        <img id="coverMain" class="cover-main" src="/image/logopraisefm.webp" alt="Now Playing">
      </div>

      <div class="meta-area">
        <div class="meta-top">
          <div class="track-info">
            <div id="currentTitle" class="title">Praise FM U.S.</div>
            <div id="currentArtist" class="artist">Live Radio</div>
          </div>

          <div class="meta-actions">
            <!-- removed star and three-dots per request -->
          </div>
        </div>

        <div class="progress-wrap" aria-hidden="true">
          <div id="progressBar" class="progress">
            <div id="progressFill" class="progress-fill" style="width:0%"></div>
          </div>
          <div class="progress-time">
            <span id="timeLeft">—:—</span>
            <span id="timeRight">—:—</span>
          </div>
        </div>

        <div class="controls-row">
          <button id="prevBtn" class="control small" aria-label="Previous">
            <!-- SVG prev -->
            <svg class="icon icon-prev" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M11.5 12L20 18V6L11.5 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M4 6H6V18H4V6Z" fill="currentColor"/></svg>
          </button>

          <button id="playBtn" class="control big" aria-label="Play">
            <!-- SVG play / pause — we'll toggle text content too for accessibility -->
            <svg id="playIcon" class="icon icon-play" width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 3.5v17l14-8.5L5 3.5z" fill="currentColor"/></svg>
          </button>

          <button id="nextBtn" class="control small" aria-label="Next">
            <!-- SVG next -->
            <svg class="icon icon-next" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 6v12l8.5-6L3 6z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M16 6H18V18H16V6Z" fill="currentColor"/></svg>
          </button>
        </div>

        <div class="lower-row">
          <div class="volume-group">
            <button id="muteBtn" class="mini-icon" aria-label="Mute">
              <!-- SVG speaker -->
              <svg class="icon icon-speaker" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 9v6h4l5 5V4L9 9H5z" fill="currentColor"/></svg>
            </button>
            <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.7" aria-label="Volume">
          </div>

          <div class="misc-icons">
            <button id="airBtn" class="mini-icon" aria-label="AirPlay">
              <!-- SVG AirPlay-like -->
              <svg class="icon icon-air" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 17h14V5H5v12z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M12 21l4-4H8l4 4z" fill="currentColor"/></svg>
            </button>
            <button id="queueBtn" class="mini-icon" aria-label="Queue">
              <!-- SVG queue -->
              <svg class="icon icon-queue" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <section class="recent-section">
      <h3>Recently Played</h3>
      <ul id="historyList" class="history-list" aria-live="polite"></ul>
    </section>
  </main>

  <audio id="radioPlayer" preload="auto"></audio>
  <script src="script.js" defer></script>
</body>
</html>
