<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praise FM U.S. — Listen Live</title>

  <!-- SEO -->
  <meta name="description" content="Listen live to Praise FM U.S. — Praise & Worship Radio." />
  <meta name="theme-color" content="#ff527c" />

  <!-- FAVICONS -->
  <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/praisefmus/praisefm/main/image/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/praisefmus/praisefm/main/image/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/praisefmus/praisefm/main/image/apple-touch-icon.png" />

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0RNK6G5iWL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0RNK6G5iWL');
  </script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <section class="content">
    <header class="header">
      <button
        class="favorite-btn"
        id="favoriteBtn"
        title="Favorite this song"
        aria-label="Favorite this song"
        aria-pressed="false"
      >☆</button>
    </header>

    <h1 class="station-title">Praise FM U.S.</h1>
    <p class="station-desc">Praise & Worship</p>

    <figure class="show-image" id="showImage">
      <img
        id="coverImg"
        src=""
        alt="Album cover"
        width="200"
        height="200"
        loading="lazy"
      />
    </figure>

    <div class="show-info">
      <span class="live-indicator">LIVE • <span id="currentTime">—</span></span>
      <h2 class="show-title"><span id="currentTitle">Loading...</span></h2>
      <p class="show-date" id="currentDate">—</p>
    </div>

    <button class="play-button" id="playBtn" aria-label="Play radio">▶ Play</button>

    <div class="volume-control">
      <i class="fas fa-volume-up"></i>
      <input
        type="range"
        class="volume-slider"
        id="volumeSlider"
        min="0"
        max="1"
        step="0.01"
        value="0.7"
      />
    </div>

    <section class="history-section">
      <h3 class="history-title">Recently Played</h3>
      <ul class="history-list" id="historyList">
        <li style="text-align:center;color:#666;padding:16px;">No songs yet...</li>
      </ul>
    </section>

    <footer class="status" id="status">
      Connecting to stream... • Real-time updates
    </footer>
  </section>

  <audio id="radioPlayer" preload="auto"></audio>

  <script src="script.js" defer></script>
</body>
</html>
