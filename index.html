        /* --- CSS (DESIGN - DEFAULT) --- */
        :root {
            --primary-color: #fff;
            --secondary-color: rgba(255, 255, 255, 0.6);
            --accent-color: #ff3b30; /* Laranja/Vermelho (Cor do Anel) */
            --bg-dark: #1c1c1e;
            --bg-gradient-2: #282828; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--primary-color);
        }

        .background-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 30%, var(--bg-gradient-2), #000);
            filter: blur(60px); 
            opacity: 0.8; 
            transition: background 1s ease;
            background-image: linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 1px 1px;
        }

        .player-container {
            width: 100%; max-width: 380px; height: 100%; max-height: 800px;
            padding: 20px 24px; display: flex; flex-direction: column;
            justify-content: flex-start; 
            position: relative; overflow: hidden;
        }

        .top-bar { display: flex; justify-content: center; padding-bottom: 10px; }
        .grip { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; }


        /* --- NOVO LAYOUT DE ARTE E LOGO --- */

        .media-area {
            width: 100%;
            margin-top: 30px; 
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 1. LOGO DO PROGRAMA (GRANDE E REDONDO) - AGORA TUDO AQUI */
        .program-logo-container {
            width: 200px; /* Aumenta um pouco o tamanho */
            height: 200px; /* Aumenta um pouco o tamanho */
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background-color: #1a1a1a;
            margin-bottom: 25px; /* Ajusta margem para o texto que virá abaixo */
            position: relative; /* ESSENCIAL para o anel */
        }

        /* --- Rotating Ring Indicator (Laranja Rodando) --- */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .program-logo-container.is-song-playing::before {
            content: '';
            position: absolute;
            top: -12px; /* Aumenta o afastamento */
            left: -12px;
            right: -12px;
            bottom: -12px;
            border: 12px solid transparent; /* Aumenta a espessura da borda */
            border-top-color: var(--accent-color); 
            border-right-color: var(--accent-color); 
            border-radius: 50%;
            animation: spin 1.5s linear infinite; /* Rotação mais rápida */
            z-index: 0;
            opacity: 1; /* Garante visibilidade total */
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.7); /* Adiciona um brilho */
            transition: all 0.3s ease;
        }

        .program-logo-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: relative; 
            z-index: 1;
            transition: opacity 0.3s ease;
        }


        /* Removido artwork-container, artwork-img e track-info-mini */
        /* O texto da música e artista agora será global abaixo do círculo */
        .track-info-main {
            text-align: center;
            margin-bottom: 20px;
            overflow: hidden; /* Para garantir ellipsis se necessário */
            width: 100%;
        }

        .song-title-main { 
            font-size: 20px; 
            font-weight: 700; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .artist-name-main { 
            font-size: 16px; 
            color: var(--secondary-color); 
            font-weight: 500; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            line-height: 1.2;
        }


        /* Botão de Letras - agora fora de qualquer container de arte */
        .more-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            color: var(--primary-color); 
            padding: 5px; 
            font-size: 20px; 
            transition: color 0.3s; 
            margin-top: 10px; /* Ajusta a margem superior */
        }
        .more-btn:hover { color: var(--accent-color); }


        /* INFO (ÁREA CENTRAL QUE CONTINUA) */
        .track-info { 
            display: none; /* Mantido como estava */
        }

        /* PROGRESS */
        .progress-area { margin-bottom: 10px; position: relative; padding-top: 20px; } 
        .progress-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--accent-color); border-radius: 2px; transition: width 0.1s linear; }
        .seek-slider { position: absolute; top: 15px; width: 100%; height: 15px; opacity: 0; cursor: pointer; }

        .time-info { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--secondary-color); margin-top: 8px; font-weight: 600; }

        /* LIVE BADGE */
        @keyframes pulse-red { 0% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); } 50% { opacity: 0.5; text-shadow: none; } 100% { opacity: 1; text-shadow: 0 0 5px var(--accent-color); } }
        .live-badge { color: var(--accent-color); font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; background-color: var(--accent-color); border-radius: 50%; animation: pulse-red 2s infinite; }
        .chicago-time { font-variant-numeric: tabular-nums; }

        /* CONTROLS */
        .controls { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .control-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .control-btn:active { transform: scale(0.9); }
        .play-btn { width: 70px; height: 70px; }
        .skip-btn { width: 40px; }

        /* VOLUME */
        .volume-area { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .volume-track { flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; position: relative; }
        .volume-fill { position: absolute; height: 100%; background: #fff; border-radius: 3px; width: 80%; }
        .volume-slider { position: absolute; width: 100%; height: 100%; top:0; opacity:0; cursor:pointer; }

        /* FOOTER */
        .bottom-icons { display: flex; justify-content: space-around; color: var(--secondary-color); z-index: 10; margin-top: auto; } 
        .bottom-icon { cursor: pointer; padding: 10px; }

        /* --- DRAWER MENU (ON DEMAND) --- */
        .drawer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            transform: translateY(110%); transition: transform 0.3s ease-out;
            z-index: 20; display: flex; flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .drawer.open { transform: translateY(0); }

        .drawer-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .drawer-title { font-weight: 700; font-size: 18px; }
        .close-drawer { background: none; border: none; color: var(--accent-color); font-size: 16px; font-weight: 600; cursor: pointer; }

        .episode-list { flex: 1; overflow-y: auto; padding: 0 20px; }
        .episode-item {
            display: flex; align-items: center; padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .ep-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; margin-right: 15px; }
        .ep-info { flex: 1; }
        .ep-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .ep-desc { font-size: 12px; color: var(--secondary-color); }

        .back-to-live {
            display: none;
            margin-top: 5px;
            background-color: rgba(255, 59, 48, 0.2);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px; 
            align-self: flex-start;
        }

        svg { fill: currentColor; }

        /* --- Media Query para Telas de PC (Desktop/Laptops) --- */
        @media (min-width: 600px) {

            .player-container {
                max-width: 500px; 
                max-height: 90vh; 
                padding: 40px; 
                border-radius: 20px; 
                background-color: rgba(0, 0, 0, 0.2); 
                backdrop-filter: blur(15px); 
            }

            .program-logo-container {
                width: 280px; /* Aumenta mais para desktop */
                height: 280px;
            }

            .program-logo-container.is-song-playing::before {
                top: -15px; 
                left: -15px;
                right: -15px;
                bottom: -15px;
                border: 15px solid transparent;
                border-top-color: var(--accent-color); 
                border-right-color: var(--accent-color);
            }

            .song-title-main { 
                font-size: 24px; 
            }

            .artist-name-main { 
                font-size: 18px; 
            }

            .live-badge, .time-info span {
                font-size: 14px;
            }

            .play-btn { width: 80px; height: 80px; }
            .skip-btn { width: 50px; }
        }
    </style>
</head>

        // --- FUNÇÃO PARA ATIVAR/DESATIVAR O ANEL ROTATIVO ---
        function setProgramLogoActiveState(isActive) {
            if (isActive) {
                programLogoContainerEl.classList.add('is-song-playing');
            } else {
                programLogoContainerEl.classList.remove('is-song-playing');

        // --- FUNÇÃO setMedia ---
        // Apenas um parâmetro de imagem agora, que é a imagem principal do círculo
        function setMedia(mainImageUrl, trackTitle, artistName, audioSource = STREAM_URL) {
            trackNameEl.innerText = trackTitle;
            artistNameEl.innerText = artistName;

            // 1. ATUALIZA LOGO/CAPA PRINCIPAL (CÍRCULO GRANDE) 
            let finalImageUrl = mainImageUrl;

            // Só aplica o proxy se NÃO for uma URL LOCAL ou DATA URL

                finalImageUrl = 'https://corsproxy.io/?' + encodeURIComponent(mainImageUrl);
            }
            
            if (programLogoEl.src !== finalImageUrl) {
                programLogoEl.src = finalImageUrl;
                programLogoEl.alt = `${trackTitle} by ${artistName} artwork`;
            }

            // A lógica de updateBlurredBackground precisa da URL FINAL
            // Se a imagem for local (programa, spot, comercial), mantém o background escuro.
            if (finalImageUrl.includes('/image/') && !finalImageUrl.includes('logopraisefm.webp')) {
                bgBlur.style.background = `radial-gradient(circle at 50% 30%, #282828, #000)`; 
            } else {
                // Tenta obter a cor para capas do Last.fm ou logo padrão
                updateBlurredBackground(finalImageUrl);
            }

            if (audio.src !== audioSource) {
                audio.src = audioSource;
            }
        }

        // --- LISTENERS E FUNÇÕES AUXILIARES ---

            const currentSrc = programLogoEl.src;
            if (currentSrc) {
                // se a imagem for local (programa, spot, comercial), mantém o background escuro.

                    bgBlur.style.background = `radial-gradient(circle at 50% 30%, #282828, #000)`; 
                } else {
                    // tenta obter a cor para capas do last.fm ou logo padrão
                    updateBlurredBackground(currentSrc);
                }
